apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: inventario-dev
  labels:
    app.kubernetes.io/name: minio-create-bucket
    app.kubernetes.io/component: data-service
    app.kubernetes.io/part-of: inventario
    app.kubernetes.io/managed-by: raw-yaml
    inventario.io/environment: dev
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-create-bucket
        app.kubernetes.io/component: data-service
        app.kubernetes.io/part-of: inventario
        app.kubernetes.io/managed-by: raw-yaml
        inventario.io/environment: dev
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: minio-credentials
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set dev http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "Waiting for MinIO to become ready..."
                sleep 2
              done
              mc mb --ignore-existing dev/"$MINIO_BUCKET_NAME"
