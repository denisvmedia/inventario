# Non-sensitive runtime settings for the production baseline.
# Keep email in stub mode until you have real SMTP credentials and switch the provider.
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventario-config
  namespace: inventario-prod
  labels:
    app.kubernetes.io/name: inventario
    app.kubernetes.io/part-of: inventario
    app.kubernetes.io/component: config
data:
  INVENTARIO_RUN_ADDR: ":3333"
  INVENTARIO_RUN_PUBLIC_URL: "https://inventario.example.com"
  INVENTARIO_RUN_UPLOAD_LOCATION: "file:///data/uploads?create_dir=1"
  INVENTARIO_RUN_FILE_URL_EXPIRATION: "15m"
  INVENTARIO_RUN_MAX_CONCURRENT_EXPORTS: "3"
  INVENTARIO_RUN_MAX_CONCURRENT_IMPORTS: "1"
  INVENTARIO_RUN_THUMBNAIL_MAX_CONCURRENT_PER_USER: "5"
  INVENTARIO_RUN_THUMBNAIL_RATE_LIMIT_PER_MINUTE: "50"
  INVENTARIO_RUN_THUMBNAIL_SLOT_DURATION: "30m"
  # Feature flags. Mirror the Helm chart's `features:` block. Default
  # true since #1604 — the binary's env-default agrees, this entry is
  # explicit so an operator who wants to flip the kill-switch off has
  # an obvious place to do it without grepping for env vars.
  INVENTARIO_RUN_FEATURE_CURRENCY_MIGRATION: "true"
  INVENTARIO_RUN_EMAIL_PROVIDER: "stub"
  INVENTARIO_RUN_EMAIL_FROM: "inventario@example.com"
  INVENTARIO_RUN_EMAIL_REPLY_TO: "support@example.com"
  INVENTARIO_RUN_EMAIL_QUEUE_WORKERS: "5"
  INVENTARIO_RUN_EMAIL_QUEUE_MAX_RETRIES: "5"
  INVENTARIO_RUN_SMTP_HOST: "smtp.example.com"
  INVENTARIO_RUN_SMTP_PORT: "587"
  INVENTARIO_RUN_SMTP_USE_TLS: "true"
  INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_NAME: "Default Organization"
  INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_SLUG: "default"
  INVENTARIO_MIGRATE_DATA_ADMIN_EMAIL: "admin@example.com"
  INVENTARIO_MIGRATE_DATA_ADMIN_NAME: "System Administrator"
  SEED_DATABASE: "false"
  # Sentry error tracking (#844, PR #2183). BARE names — the app reads SENTRY_*
  # via cleanenv.ReadEnv with NO INVENTARIO_RUN_ prefix (the only such
  # divergence), so the non-secret knobs sit here alongside TZ. The DSN is a
  # CREDENTIAL: it is NOT set here. Sentry stays DISABLED until an operator wires
  # SENTRY_DSN — keep it in the Secret and add a secretKeyRef in deployment.yaml
  # (a commented stub is provided there). These two non-secret knobs are inert
  # while SENTRY_DSN is unset. tracesSampleRate mirrors the app's 0.2 default.
  SENTRY_ENVIRONMENT: "production"
  SENTRY_TRACES_SAMPLE_RATE: "0.2"
  TZ: "UTC"
