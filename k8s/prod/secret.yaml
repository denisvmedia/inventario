# Replace every placeholder before applying to a real cluster.
# Generate strong random values for the keys below, for example:
#   openssl rand -hex 32
apiVersion: v1
kind: Secret
metadata:
  name: inventario-secrets
  namespace: inventario-prod
  labels:
    app.kubernetes.io/name: inventario
    app.kubernetes.io/part-of: inventario
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  bootstrap-db-dsn: "postgres://postgres:replace-me@postgres.example.com:5432/inventario?sslmode=require"
  migrator-db-dsn: "postgres://inventario_migrator:replace-me@postgres.example.com:5432/inventario?sslmode=require"
  app-db-dsn: "postgres://inventario_app:replace-me@postgres.example.com:5432/inventario?sslmode=require"
  redis-url: "redis://:replace-me@redis.example.com:6379/0"
  jwt-secret: "REPLACE_WITH_64_HEX_CHARACTERS"
  file-signing-key: "REPLACE_WITH_64_HEX_CHARACTERS"
  bootstrap-username: "inventario_app"
  bootstrap-username-for-migrations: "inventario_migrator"
  admin-password: "REPLACE_WITH_STRONG_ADMIN_PASSWORD"
  smtp-username: "REPLACE_WITH_SMTP_USERNAME"
  smtp-password: "REPLACE_WITH_SMTP_PASSWORD"