name: Go Test

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Resolve which ecosystems this PR touches. See .github/filters.yml +
  # devdocs/ci/conditional-execution.md. On push events the test job
  # gates short-circuit and the filter result is unused.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: .github/filters.yml

  test:
    name: test
    runs-on: ubuntu-latest
    needs: changes
    # PR: only run when go-relevant paths changed (or any .github/** change
    # forces the conservative fallback). Push to master / tag push always
    # runs.
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v6

      - id: vars
        uses: ./.github/actions/vars

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.3
          cache: true
          cache-dependency-path: go/go.sum

      - name: Install dependencies
        run: go mod download
        working-directory: go

      - name: Run tests
        run: go test -v -race ./...
        working-directory: go
