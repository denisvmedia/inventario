name: Docker edge image

on:
  push:
    branches: [master]

concurrency:
  group: docker-edge
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: vars
        uses: ./.github/actions/vars

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.0
          cache: true
          cache-dependency-path: go/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.vars.outputs.node_version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Go dependencies
        run: go mod download
        working-directory: go

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (snapshot, docker only)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --snapshot --clean --skip=publish,sbom,sign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push edge and master images
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          # Intentional policy: pushes to master publish both `edge` and `master`.
          # `latest` stays release-only; `master` is just an additional branch-tracking alias.
          for TAG in edge master; do
            IMAGE_TAG="ghcr.io/denisvmedia/inventario:${TAG}"
            docker tag "ghcr.io/denisvmedia/inventario:SNAPSHOT-${SHORT_SHA}-amd64" "${IMAGE_TAG}-amd64"
            docker tag "ghcr.io/denisvmedia/inventario:SNAPSHOT-${SHORT_SHA}-arm64" "${IMAGE_TAG}-arm64"
            docker push "${IMAGE_TAG}-amd64"
            docker push "${IMAGE_TAG}-arm64"
            docker manifest create "${IMAGE_TAG}" "${IMAGE_TAG}-amd64" "${IMAGE_TAG}-arm64"
            docker manifest push "${IMAGE_TAG}"
          done
