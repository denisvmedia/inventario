name: Docker PR image

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: docker-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    # Fork pull_request runs receive a restricted GITHUB_TOKEN, so only same-repo PRs may publish GHCR images.
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: vars
        uses: ./.github/actions/vars

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache: true
          cache-dependency-path: go/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.vars.outputs.node_version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Go dependencies
        run: go mod download
        working-directory: go

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (snapshot, docker only)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --snapshot --clean --skip=publish,sbom,sign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete currently tagged PR image versions before re-publishing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: inventario
          PR_TAG: pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          owner_type="$(gh api "/users/${OWNER}" --jq '.type')"
          if [ "${owner_type}" = "Organization" ]; then
            package_api="/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          else
            package_api="/users/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          fi

          mapfile -t version_ids < <(
            gh api "${package_api}?per_page=100" --paginate \
              --jq '.[] | select(any((.metadata.container.tags // [])[]; . == env.PR_TAG or . == (env.PR_TAG + "-amd64") or . == (env.PR_TAG + "-arm64"))) | .id'
          )

          if [ "${#version_ids[@]}" -eq 0 ]; then
            echo "No currently tagged GHCR package versions found for ${PR_TAG}"
            exit 0
          fi

          for version_id in "${version_ids[@]}"; do
            gh api --method DELETE "${package_api}/${version_id}"
            echo "Deleted currently tagged package version ${version_id} for ${PR_TAG} before re-publish"
          done

      - name: Push PR image
        run: |
          PR_TAG="ghcr.io/denisvmedia/inventario:pr-${{ github.event.pull_request.number }}"
          # Delete-before-push keeps PR-tagged versions discoverable for cleanup instead of overwriting tags onto older GHCR versions.
          # GoReleaser snapshot produces SNAPSHOT-{commit} images; re-tag and push
          docker tag "ghcr.io/denisvmedia/inventario:SNAPSHOT-$(git rev-parse --short HEAD)-amd64" "${PR_TAG}-amd64"
          docker tag "ghcr.io/denisvmedia/inventario:SNAPSHOT-$(git rev-parse --short HEAD)-arm64" "${PR_TAG}-arm64"
          docker push "${PR_TAG}-amd64"
          docker push "${PR_TAG}-arm64"
          docker manifest create "${PR_TAG}" "${PR_TAG}-amd64" "${PR_TAG}-arm64"
          docker manifest push "${PR_TAG}"

      - name: Stage darwin/arm64 binary for e2e
        # goreleaser has already produced native binaries for every os/arch in
        # .goreleaser.yaml. Expose the darwin/arm64 one as a GHA artifact so the
        # macOS e2e lane can consume the exact shipped binary instead of
        # rebuilding (macos-latest runners are Apple Silicon).
        run: |
          set -euo pipefail
          BIN_DIR=$(ls -d dist/inventario_darwin_arm64*/ | head -1)
          mkdir -p dist-e2e
          cp "${BIN_DIR}inventario" dist-e2e/inventario
          chmod +x dist-e2e/inventario

      - name: Upload darwin/arm64 binary
        uses: actions/upload-artifact@v7
        with:
          name: inventario-darwin-arm64
          path: dist-e2e/inventario
          if-no-files-found: error
          retention-days: 7

  cleanup:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Delete PR image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: inventario
          PR_TAG: pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          owner_type="$(gh api "/users/${OWNER}" --jq '.type')"
          if [ "${owner_type}" = "Organization" ]; then
            package_api="/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          else
            package_api="/users/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          fi

          mapfile -t version_ids < <(
            gh api "${package_api}?per_page=100" --paginate \
              --jq '.[] | select(any((.metadata.container.tags // [])[]; . == env.PR_TAG or . == (env.PR_TAG + "-amd64") or . == (env.PR_TAG + "-arm64"))) | .id'
          )

          if [ "${#version_ids[@]}" -eq 0 ]; then
            echo "No GHCR package versions found for ${PR_TAG}"
            exit 0
          fi

          for version_id in "${version_ids[@]}"; do
            gh api --method DELETE "${package_api}/${version_id}"
            echo "Deleted package version ${version_id} for ${PR_TAG}"
          done
