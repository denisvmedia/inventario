name: Swagger Docs Sync

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  swagger-docs:
    name: Check Swagger Docs Sync
    runs-on: ubuntu-latest
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache: true

      - name: Install dependencies
        run: go mod download
        working-directory: go

      - name: Regenerate Swagger docs
        run: go tool swag init --output docs
        working-directory: go

      - name: Check for uncommitted changes in docs/
        run: |
          if ! git diff --exit-code -- docs/; then
            echo "Swagger docs are out of sync. Please run 'go tool swag init --output docs' and commit the changes." >&2
            exit 1
          fi
        working-directory: go
