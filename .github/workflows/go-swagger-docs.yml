name: Swagger Docs Sync

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go_swagger: ${{ steps.filter.outputs.go_swagger }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: .github/filters.yml

  swagger-docs:
    name: Check Swagger Docs Sync
    runs-on: ubuntu-latest
    needs: changes
    # `go_swagger` covers the full Go surface (`go/**` plus Makefile) —
    # `swag init` walks transitively imported packages, so a response-type
    # tweak under `go/services/` or `go/registry/` can shift the swagger
    # spec without touching an annotated handler. Mirroring the broad Go
    # surface avoids silent drift cases.
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.go_swagger == 'true' ||
      needs.changes.outputs.ci == 'true'
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: true

      - name: Install dependencies
        run: go mod download
        working-directory: go

      - name: Regenerate Swagger docs
        # `make swagger` is the dev convenience composite that also runs the
        # FE codegen step (and would require `npm install` in this Go-only
        # workflow). The dedicated FE drift check lives in
        # frontend-codegen-drift.yml; here we only need the Go-side
        # `swag init`, hence `swagger-backend`.
        run: make swagger-backend

      - name: Check for uncommitted changes in go/docs/
        run: |
          if ! git diff --exit-code -- go/docs/; then
            echo "Swagger docs are out of sync. Please run 'make swagger' and commit the changes." >&2
            exit 1
          fi

      - name: Check route coverage
        # TestSwaggerRouteCoverage walks the chi router returned by
        # apiserver.APIServer(...) and asserts every /api/v1/... route has a
        # matching swag annotation in docs/swagger.json — and that no
        # documented operation references a path that isn't registered.
        # See devdocs/backend/openapi.md.
        run: go test ./apiserver -run TestSwaggerRouteCoverage -count=1
        working-directory: go
