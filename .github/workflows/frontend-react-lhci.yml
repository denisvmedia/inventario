name: Frontend React Lighthouse CI

# Lighthouse CI gate for the new React frontend (#1420). Builds dist/,
# hands it to LHCI's built-in static server (`staticDistDir`, which
# does SPA fallback so unknown routes resolve to index.html), runs
# Lighthouse against the public placeholder pages, and gates merges on
# perf >= 0.85, a11y >= 0.95, best-practices >= 0.90.
#
# The lighthouserc.cjs `upload.target: 'temporary-public-storage'` line
# uploads each HTML report to LHCI's public storage and prints the URL
# in the job log — reviewers can drill in without re-running locally.
# (We tried treosh/lighthouse-ci-action@v12 first for its automatic PR
# comment, but the action runs `lhci autorun` from the repo root, which
# made `staticDistDir: './dist'` resolve to /dist instead of
# /frontend-react/dist; switching to a manual `npm run lhci` step keeps
# the relative path consistent with local runs.)

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - id: vars
        uses: ./.github/actions/vars

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.vars.outputs.node_version }}
          cache: 'npm'
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        # LHCI's staticDistDir (see lighthouserc.cjs) serves dist/
        # directly — no vite preview, no docker — so we just need
        # dist/ to exist before LHCI starts.
        run: npm run build

      - name: Run Lighthouse CI
        # `npm run lhci` -> `lhci autorun` from frontend-react/, so the
        # relative paths in lighthouserc.cjs (`staticDistDir: './dist'`)
        # resolve consistently with a local run. The asserts in the
        # config exit non-zero on a threshold breach and fail the step.
        run: npm run lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
