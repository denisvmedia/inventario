name: Docker Compose Smoke Test

on:
  push:
    branches: [master]
    paths:
      - 'docker-compose.yaml'
      - 'Dockerfile'
      - 'go/**'
      - 'frontend/**'
      - 'scripts/**'
      - 'init-scripts/**'
      - '.github/workflows/docker-compose-smoke-test.yml'
  pull_request:
    paths:
      - 'docker-compose.yaml'
      - 'Dockerfile'
      - 'go/**'
      - 'frontend/**'
      - 'scripts/**'
      - 'init-scripts/**'
      - '.github/workflows/docker-compose-smoke-test.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Use deterministic secrets so both init-data and the app agree on the JWT key.
      JWT_SECRET: "smoke-test-jwt-secret-exactly-32-chars!!"
      FILE_SIGNING_KEY: "smoke-test-file-signing-key-32chars!!"
      ADMIN_EMAIL: "admin@smoketest.example"
      ADMIN_PASSWORD: "SmokeTestPass1!"
      # Skip seeding — we only need the admin user created by `db migrate data`.
      SEED_DATABASE: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prepare host directories
        # The inventario-init-data container runs as a non-root user (UID 1001).
        # Docker auto-creates bind-mount directories as root, so we must pre-create
        # them with world-writable permissions before starting the stack.
        run: mkdir -p .docker/init-state && chmod 777 .docker/init-state

      - name: Build and start full stack
        # --wait blocks until every service is healthy / every one-shot container
        # exits 0. --wait-timeout gives 5 min for the Docker build + DB init.
        run: docker compose up --build --wait --wait-timeout 300

      - name: Verify Redis token blacklist is active
        run: |
          docker compose logs inventario | grep "Using Redis token blacklist"
          echo "Redis token blacklist confirmed in startup logs"

      - name: Smoke test — login, group-scoped endpoint, logout, blacklist
        run: |
          BASE="http://localhost:3333/api/v1"
          COOKIE_JAR=$(mktemp)

          echo "--- Login ---"
          RESP=$(curl -fsS -c "$COOKIE_JAR" \
            -X POST "$BASE/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}")

          TOKEN=$(echo "$RESP" | jq -r '.access_token')
          CSRF=$(echo "$RESP" | jq -r '.csrf_token')
          [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] \
            || { echo "ERROR: no access_token in login response"; echo "$RESP"; exit 1; }
          echo "access_token obtained"

          echo "--- Get user's groups ---"
          GROUPS_RESP=$(curl -fsS \
            "$BASE/groups" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.api+json")
          GROUP_SLUG=$(echo "$GROUPS_RESP" | jq -r '.data[0].attributes.slug // empty')

          if [ -z "$GROUP_SLUG" ]; then
            echo "No groups found, creating one..."
            CREATE_RESP=$(curl -fsS \
              -X POST "$BASE/groups" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/vnd.api+json" \
              -H "X-CSRF-Token: $CSRF" \
              -d '{"data":{"type":"groups","attributes":{"name":"Smoke Test Group"}}}')
            GROUP_SLUG=$(echo "$CREATE_RESP" | jq -r '.data.attributes.slug')
            [ -n "$GROUP_SLUG" ] && [ "$GROUP_SLUG" != "null" ] \
              || { echo "ERROR: failed to create group"; echo "$CREATE_RESP"; exit 1; }
            echo "Created group with slug: $GROUP_SLUG"
          else
            echo "Using existing group: $GROUP_SLUG"
          fi

          echo "--- GET /g/$GROUP_SLUG/locations with valid token (expect 200) ---"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            "$BASE/g/$GROUP_SLUG/locations" \
            -H "Authorization: Bearer $TOKEN")
          [ "$STATUS" = "200" ] \
            || { echo "ERROR: expected 200, got $STATUS"; exit 1; }
          echo "Got $STATUS — token is accepted, group-scoped route works"

          echo "--- GET /g/$GROUP_SLUG/locations without token (expect 401) ---"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$BASE/g/$GROUP_SLUG/locations")
          [ "$STATUS" = "401" ] \
            || { echo "ERROR: expected 401, got $STATUS"; exit 1; }
          echo "Got $STATUS — unauthenticated request is correctly rejected"

          echo "--- Logout (blacklists the access token in Redis) ---"
          curl -fsS -b "$COOKIE_JAR" \
            -X POST "$BASE/auth/logout" \
            -H "Authorization: Bearer $TOKEN" > /dev/null
          echo "Logout OK"

          echo "--- GET /g/$GROUP_SLUG/locations with the now-blacklisted token (expect 401) ---"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            "$BASE/g/$GROUP_SLUG/locations" \
            -H "Authorization: Bearer $TOKEN")
          [ "$STATUS" = "401" ] \
            || { echo "ERROR: expected 401 after logout, got $STATUS"; exit 1; }
          echo "Got $STATUS — blacklisted token is correctly rejected"

          rm -f "$COOKIE_JAR"
          echo "=== All smoke tests passed ==="

      - name: Print service logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
