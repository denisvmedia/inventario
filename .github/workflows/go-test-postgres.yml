name: Go Test PostgreSQL & Bootstrap

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: .github/filters.yml

  test-postgres:
    name: test-postgres-and-bootstrap
    runs-on: ubuntu-latest
    needs: changes
    # The full bootstrap + migrations + multi-user Postgres scenario is the
    # most expensive backend job (~6 min). Same gate as go-test: backend
    # changes only, or any .github/** change forces it back on.
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.ci == 'true'

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: inventario_test
          POSTGRES_USER: inventario_test
          POSTGRES_PASSWORD: test_password
          # Enable superuser privileges for the main test user
          POSTGRES_INITDB_ARGS: "--auth-host=trust"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - id: vars
        uses: ./.github/actions/vars

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.3
          cache: true
          cache-dependency-path: go/go.sum

      - name: Install dependencies
        run: go mod download
        working-directory: go

      - name: Build inventool
        run: go build -o ../bin/inventool ./cmd/inventool
        working-directory: go

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U inventario_test; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Set up PostgreSQL users and databases
        run: |
          # Connect as the superuser to create additional users and databases
          export PGPASSWORD=test_password

          # Use the existing inventario_test database (no need to create a separate one)

          # Create the main application users that bootstrap migrations expect
          psql -h localhost -p 5432 -U inventario_test -d inventario_test -c "
            CREATE USER inventario WITH PASSWORD 'inventario_password';
            CREATE USER inventario_migrator WITH PASSWORD 'inventario_migrator_password';
          "

          # Grant necessary privileges to the main users
          psql -h localhost -p 5432 -U inventario_test -d inventario_test -c "
            GRANT ALL PRIVILEGES ON DATABASE inventario_test TO inventario;
            GRANT ALL PRIVILEGES ON DATABASE inventario_test TO inventario_migrator;
          "

          # Grant superuser privileges to inventario_test user for bootstrap tests
          # (needed to create extensions and manage roles)
          psql -h localhost -p 5432 -U inventario_test -d inventario_test -c "
            ALTER USER inventario_test WITH SUPERUSER;
          "

          # Create a limited privilege user for testing transaction rollback
          # Grant minimal privileges (can connect but cannot create extensions)
          psql -h localhost -p 5432 -U inventario_test -d inventario_test -c "
            CREATE USER limited_user WITH PASSWORD 'limited_password' NOSUPERUSER NOCREATEDB NOCREATEROLE;
            GRANT CONNECT ON DATABASE inventario_test TO limited_user;
          "

          # Set up schema permissions on the test database
          psql -h localhost -p 5432 -U inventario_test -d inventario_test -c "
            -- Grant schema usage to main users
            GRANT ALL ON SCHEMA public TO inventario;
            GRANT ALL ON SCHEMA public TO inventario_migrator;

            -- Grant minimal schema access to limited user
            GRANT USAGE ON SCHEMA public TO limited_user;
          "

          echo "PostgreSQL users and databases set up successfully"

      - name: Run database migrations
        env:
          POSTGRES_TEST_DSN: "postgres://inventario_test:test_password@localhost:5432/inventario_test?sslmode=disable"
        run: |
          echo "Running database migrations..."
          go run ./cmd/inventario db bootstrap apply --db-dsn="$POSTGRES_TEST_DSN" --username="inventario" --username-for-migrations="inventario_migrator"
          go run ./cmd/inventario db migrate up --db-dsn="$POSTGRES_TEST_DSN"
        working-directory: go

      - name: Check for pending schema changes
        env:
          POSTGRES_TEST_DSN: "postgres://inventario_test:test_password@localhost:5432/inventario_test?sslmode=disable"
        working-directory: ./go
        run: |
          echo "Checking for Go model changes that lack a migration..."
          ../bin/inventool db migrations generate --check \
            --db-dsn "$POSTGRES_TEST_DSN" \
            --go-entities-dir ./models

      - name: Run PostgreSQL registry tests
        env:
          POSTGRES_TEST_DSN: "postgres://inventario_test:test_password@localhost:5432/inventario_test?sslmode=disable"
        run: go test -v -race ./registry/postgres/...
        working-directory: go

      - name: Run Bootstrap integration tests
        env:
          # Main DSN with superuser privileges for successful migration tests
          POSTGRES_TEST_DSN: "postgres://inventario_test:test_password@localhost:5432/inventario_test?sslmode=disable"
          # Limited DSN for testing transaction rollback scenarios
          POSTGRES_LIMITED_TEST_DSN: "postgres://limited_user:limited_password@localhost:5432/inventario_test?sslmode=disable"
        run: |
          echo "Running bootstrap integration tests..."
          echo "Main DSN: $POSTGRES_TEST_DSN"
          echo "Limited DSN: $POSTGRES_LIMITED_TEST_DSN"
          go test -v -race ./schema/bootstrap
        working-directory: go

      - name: Run seed data integration tests
        # seeddata's Postgres test sits behind the `integration` build tag
        # and was previously not run by any workflow. It exercises the full
        # seed against a real database — the only coverage that catches
        # driver.Valuer / JSONB-encoding regressions the in-memory registry
        # cannot.
        env:
          POSTGRES_TEST_DSN: "postgres://inventario_test:test_password@localhost:5432/inventario_test?sslmode=disable"
        run: go test -v -race -tags integration ./debug/seeddata/...
        working-directory: go

      - name: Run backup .inb integration tests
        # #534: the signed .inb round trips on a REAL database — the only
        # Go-level coverage of two postgres-only behaviours the in-memory
        # registry cannot exercise: (1) the group-scoped FileEntity create on
        # re-import (RoundTrip), and (2) full commodity field fidelity incl. the
        # write-once acquisition pair restored via the trusted context seam and
        # the cover-file cross-reference (FieldFidelity). Run these two by name
        # rather than the whole ./integration package — its other tests share a
        # DB and are not isolation-safe when run together (see #1953); these two
        # are mutually isolation-safe (idempotent setup, unique-tenant data).
        env:
          POSTGRES_TEST_DSN: "postgres://inventario_test:test_password@localhost:5432/inventario_test?sslmode=disable"
        run: go test -v -race -run 'TestINBBackupRoundTripPostgres|TestINBFieldFidelityRoundTripPostgres' ./integration/...
        working-directory: go
