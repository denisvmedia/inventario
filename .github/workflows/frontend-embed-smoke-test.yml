name: Frontend Embed Smoke Test

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      go: ${{ steps.filter.outputs.go }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: .github/filters.yml

  embed-smoke-test:
    name: embed smoke test
    runs-on: ubuntu-latest
    needs: changes
    # The test compiles the Go binary with `-tags with_frontend` against a
    # freshly-built dist/, so it must run whenever either half changes.
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.ci == 'true'
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - id: vars
        uses: ./.github/actions/vars

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.vars.outputs.node_version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.3
          cache: true
          cache-dependency-path: go/go.sum

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - name: Install Go dependencies
        run: go mod download
        working-directory: go

      - name: Run embed smoke test
        # Requires -tags with_frontend so frontend.GetDist() is compiled in.
        # The test reads dist/index.html, walks dist/ to confirm Vite
        # underscore-prefixed chunks are embedded (would fail if the
        # //go:embed directive missed the "all:" prefix), and asserts the
        # presence of frontend/public/_inventario-embed.txt as a stable
        # marker that the all: prefix is doing its job.
        run: go test -v -tags with_frontend -run TestFrontendEmbed ./apiserver/...
        working-directory: go
