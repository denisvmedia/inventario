name: Frontend Embed Smoke Test

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  embed-smoke-test:
    name: embed smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - id: vars
        uses: ./.github/actions/vars

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.vars.outputs.node_version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache: true
          cache-dependency-path: go/go.sum

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - name: Install Go dependencies
        run: go mod download
        working-directory: go

      - name: Run embed smoke test
        # Requires -tags with_frontend so frontend.GetDist() is compiled in.
        # The test reads dist/index.html, walks dist/ to confirm Vite
        # underscore-prefixed chunks are embedded (would fail if the
        # //go:embed directive missed the "all:" prefix), and asserts the
        # presence of frontend/public/_inventario-embed.txt as a stable
        # marker that the all: prefix is doing its job.
        run: go test -v -tags with_frontend -run TestFrontendEmbed ./apiserver/...
        working-directory: go
