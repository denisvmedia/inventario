# PR-preview status comment (#1858 epic).
#
# Posts (and maintains) a single sticky comment on PRs labeled `preview` so
# reviewers/contributors can see what hostname was deployed for the PR
# without spelunking the ApplicationSet status. The comment shows the
# deployed hostname as PLAIN TEXT (not a clickable link):
#
#   - The hostname is only resolvable via Tailscale MagicDNS from within
#     the tailnet; a public-internet PR reader couldn't reach it anyway.
#   - The Tailscale Operator's HTTP→HTTPS redirect uses same-host, but the
#     issued cert only covers the FQDN (`<short>.<tailnet>.ts.net`), so
#     clicking a short HTTP link in a browser hits a cert mismatch on the
#     resulting HTTPS redirect. A clickable link would be misleading.
#   - Tailnet members reach the preview via the FQDN they know — short
#     name + their browser's URL editing for protocol/suffix.
#
# A future "preview catalog" service (out of scope here) can take this
# hostname as input and serve a clickable, browser-aware redirect.
#
# Why a single sticky comment instead of one per push: PRs would otherwise
# accumulate dozens of "preview redeploying" notifications over their
# lifetime. The `marocchino/sticky-pull-request-comment` action finds the
# previous comment by `header` and edits it in place.
#
# Event mapping:
#   - `labeled` (label == preview)   → "🟢 Deploying" comment
#   - `synchronize` (label present)  → update SHA, "🟢 Re-deploying"
#   - `unlabeled` (label was preview)→ "🗑️ Preview torn down"
#   - `closed`   (label was present) → "🗑️ Preview torn down (PR closed)"
#
# The ApplicationSet's PR generator polls GitHub every 60s and tears down
# the per-PR Application; this workflow doesn't trigger any deploy/teardown
# action, it only mirrors state into a human-visible comment.
#
# Tailnet device cleanup is handled IN-CLUSTER by the hourly CronJob in
# infra/vm/cluster-extras/ts-orphan-cleanup.yaml — runs on the same
# operator-oauth credentials that the TS Operator itself already uses, so
# no GH Actions secrets need to be provisioned for the cleanup path.

name: PR preview status

on:
  pull_request:
    types: [labeled, unlabeled, synchronize, closed]

permissions:
  pull-requests: write
  contents: read

jobs:
  comment:
    name: Update preview comment
    # Run when:
    #   - the `preview` label is being added or removed (event.label.name)
    #   - the PR is being pushed-to OR closed AND already has the label
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'preview') ||
      (github.event.action == 'unlabeled' && github.event.label.name == 'preview') ||
      ((github.event.action == 'synchronize' || github.event.action == 'closed') &&
       contains(github.event.pull_request.labels.*.name, 'preview'))
    runs-on: ubuntu-latest
    steps:
      - name: Compose comment body
        id: body
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_ACTION: ${{ github.event.action }}
          IS_CLOSED: ${{ github.event.pull_request.state == 'closed' }}
          UNLABELED_PREVIEW: ${{ github.event.action == 'unlabeled' && github.event.label.name == 'preview' }}
        run: |
          set -euo pipefail
          short_sha="${PR_HEAD_SHA:0:7}"
          short_host="inv-vcl01-pr${PR_NUMBER}"

          # NOTE: do NOT hard-wrap paragraphs inside this heredoc. GitHub-
          # flavoured markdown renders every source newline as a `<br>` in
          # comments (unlike CommonMark, which collapses single newlines into
          # spaces). One paragraph = one long line; only blank lines between
          # logical paragraphs.
          if [ "$IS_CLOSED" = "true" ]; then
              status="🗑️ Preview torn down (PR closed)"
              body=$(cat <<EOF
          ### Inventario preview env

          ${status}

          The ApplicationSet pruned the per-PR Application within ~60s of the PR closing — Deployment, Postgres, Redis, MinIO, Ingress are all gone. The Tailscale device record for the proxy is removed in the next hourly run of the [\`ts-orphan-cleanup\` CronJob](https://github.com/${{ github.repository }}/blob/master/infra/vm/cluster-extras/ts-orphan-cleanup.yaml) (in-cluster, reuses the operator's OAuth credentials).
          EOF
          )
          elif [ "$UNLABELED_PREVIEW" = "true" ]; then
              status="🗑️ Preview torn down (\`preview\` label removed)"
              body=$(cat <<EOF
          ### Inventario preview env

          ${status}

          The ApplicationSet pruned the per-PR Application; the tailnet device record cleans up within the next hour (see [\`ts-orphan-cleanup\` CronJob](https://github.com/${{ github.repository }}/blob/master/infra/vm/cluster-extras/ts-orphan-cleanup.yaml)). Re-label the PR with \`preview\` to redeploy.
          EOF
          )
          else
              if [ "$EVENT_ACTION" = "synchronize" ]; then
                  status="🟢 Re-deploying \`${short_sha}\`"
              else
                  status="🟢 Deploying \`${short_sha}\`"
              fi
              body=$(cat <<EOF
          ### Inventario preview env

          ${status}

          - Deployed hostname (Tailscale MagicDNS, tailnet members only): \`${short_host}\`
          - Admin login: \`admin@example.com\` / \`PreviewAdmin123\` *(dev-only credential, gated behind Tailscale ACL)*
          - Head: \`${PR_HEAD_SHA}\`

          The hostname is shown as plain text on purpose: the Tailscale-issued TLS cert only covers the FQDN, and a short-hostname HTTP redirect ends up cert-mismatched. Tailnet members know how to combine \`<hostname>\` + their tailnet's MagicDNS suffix to reach the working HTTPS URL.

          Status reflects what ArgoCD has been asked to deploy, not whether the sync has completed yet. Allow ~3-5 minutes after a push for the docker build + ArgoCD sync to finish.

          ---
          <sub>Updated automatically by [pr-preview-status.yml](https://github.com/${{ github.repository }}/blob/master/.github/workflows/pr-preview-status.yml) on each PR event.</sub>
          EOF
          )
          fi

          # Emit multi-line output for the sticky-comment action.
          {
              echo "body<<__EOF__"
              echo "$body"
              echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Update sticky comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: inventario-preview
          number: ${{ github.event.pull_request.number }}
          message: ${{ steps.body.outputs.body }}
