name: Docker image

on:
  # Build on every PR, not just PRs targeting master — downstream consumers
  # (kind-smoke-test, e2e-tests) run on all PRs and pull the pr-<num> tag
  # this workflow publishes. Restricting to master broke PR-train branches
  # where the base is a feature branch (#1248).
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [master]
    tags: ['v*']

# PRs cancel each other per-PR; master push and each tag have their own
# group keyed by ref. Pull-request and push runs never collide because
# pull_request.number and github.ref are mutually exclusive.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # Resolve which ecosystems this PR touches. Skipped on PR `closed` events —
  # the cleanup job below has its own predicate and doesn't need this output.
  changes:
    name: Detect changes
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      image_inputs: ${{ steps.filter.outputs.image_inputs }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: .github/filters.yml

  build:
    name: Build ${{ matrix.platform }}
    needs: changes
    # Skip on PR close (cleanup job handles that). Skip on fork PRs — their
    # restricted GITHUB_TOKEN can't push to GHCR. On PRs from the same repo,
    # also skip when no image input changed (docs-only / helm-only / etc.) —
    # the `ci` filter forces it back on whenever a workflow file changes.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.action != 'closed' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       (needs.changes.outputs.image_inputs == 'true' ||
        needs.changes.outputs.ci == 'true'))
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            # Free for public repos since Jan 2025. Native arm64 build is
            # ~5-10x faster than QEMU emulation on ubuntu-latest.
            runner: ubuntu-24.04-arm
    env:
      IMAGE: ghcr.io/${{ github.repository }}
      # Inlined here so each matrix shard sees identical build args without a
      # separate meta job (which would add ~20s of wall-time we just saved).
      # VERSION resolution: PR -> pr-N, tag v1.2.3 -> v1.2.3 (github.ref_name
      # for tag pushes; v-prefix included since GHA expressions can't strip
      # without `replace`), master -> edge.
      VERSION: ${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || (startsWith(github.ref, 'refs/tags/v') && github.ref_name) || 'edge' }}
      COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
      BUILD_DATE: ${{ github.event.pull_request.updated_at || github.event.head_commit.timestamp }}
      # Tag releases share the edge cache scope: master HEAD usually equals
      # the tagged commit, so layers hit warm. Per-tag scopes would always
      # cold-start.
      CACHE_SCOPE_PREFIX: ${{ github.event.pull_request.number && 'inventario-pr' || 'inventario-edge' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        # push-by-digest creates an untagged image and returns its digest. The
        # merge job stitches the per-arch digests into one multi-arch manifest
        # list. No QEMU on either runner — each shard builds natively.
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE_PREFIX }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE_PREFIX }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          labels: |
            org.opencontainers.image.title=inventario
            org.opencontainers.image.source=https://github.com/denisvmedia/inventario
            org.opencontainers.image.revision=${{ env.COMMIT }}
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.licenses=MIT

      - name: Export digest
        # An empty file named after the digest is the standard hand-off pattern
        # from docker/build-push-action's docs: artifacts can't carry just a
        # string, so we encode it in the filename.
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  darwin-binary:
    name: Build darwin/arm64 binary for e2e
    needs: changes
    # The only consumer is e2e-tests-macos (webkit). That lane runs on
    # PRs only when the diff touches `frontend`, `e2e`, or `ci`, so this
    # job mirrors the same gate — a backend / k8s / Dockerfile-only PR
    # would otherwise spend ~3 minutes building a binary that nothing
    # downstream actually consumes. Push and tag events still build the
    # binary unconditionally (release / cache warming). Fork PRs and the
    # PR-close event are still skipped via the existing predicates.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.action != 'closed' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       (needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.e2e == 'true' ||
        needs.changes.outputs.ci == 'true'))
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || 'edge' }}
      COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
      # Same value the docker matrix passes to its build-arg, so `inventario
      # version` reports identical metadata across the macOS artifact and the
      # linux image for the same commit.
      BUILD_DATE: ${{ github.event.pull_request.updated_at || github.event.head_commit.timestamp }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - id: vars
        uses: ./.github/actions/vars

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: true
          cache-dependency-path: go/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.vars.outputs.node_version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        # Embedded by go build -tags=with_frontend (frontend/frontend.go uses
        # go:embed all:dist).
        run: npm run build
        working-directory: frontend

      - name: Build darwin/arm64 binary
        # macOS e2e lane (macos-latest == Apple Silicon) consumes this
        # artifact rather than rebuilding. Cross-compile from amd64 host is
        # native-fast for Go.
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: arm64
        run: |
          set -euo pipefail
          mkdir -p dist-e2e
          cd go/cmd/inventario
          go build \
            -tags=with_frontend \
            -trimpath \
            -ldflags="-s -w \
              -X github.com/denisvmedia/inventario/internal/version.Version=${VERSION} \
              -X github.com/denisvmedia/inventario/internal/version.Commit=${COMMIT} \
              -X github.com/denisvmedia/inventario/internal/version.Date=${BUILD_DATE}" \
            -o ../../../dist-e2e/inventario .
          chmod +x ../../../dist-e2e/inventario

      - name: Upload darwin/arm64 binary
        uses: actions/upload-artifact@v7
        with:
          name: inventario-darwin-arm64
          path: dist-e2e/inventario
          if-no-files-found: error
          retention-days: 7

  merge:
    name: Merge multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Compute tags
        id: meta
        # Four modes mirror the build job's VERSION resolution:
        #   - PR              -> pr-N                 + sha-<7>
        #   - master push     -> edge + master        + sha-<7>
        #   - tag refs/tags/v -> vX.Y.Z + vX.Y + vX + latest
        #                                             (matches the previous
        #                                              goreleaser docker_manifests
        #                                              block)
        # The sha-<7> tag is immutable per commit — consumers (kind-smoke,
        # e2e) pull it directly so they can't accidentally consume a previous
        # commit's image even if the pr-N tag moves unexpectedly.
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # On pull_request events github.sha is the synthetic merge commit,
          # not the HEAD of the PR branch — consumers see the HEAD SHA in
          # their own github context, so tag with that here.
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          SHORT_SHA="${COMMIT_SHA:0:7}"
          {
            echo "tags<<EOF"
            case "${GH_REF}" in
              refs/tags/v*)
                v_no_prefix="${REF_NAME#v}"
                major="${v_no_prefix%%.*}"
                major_minor="${v_no_prefix%.*}"
                echo "${IMAGE}:${REF_NAME}"
                echo "${IMAGE}:v${major_minor}"
                echo "${IMAGE}:v${major}"
                echo "${IMAGE}:latest"
                ;;
              *)
                if [ "${EVENT_NAME}" = "pull_request" ]; then
                  echo "${IMAGE}:pr-${PR_NUMBER}"
                else
                  echo "${IMAGE}:edge"
                  echo "${IMAGE}:master"
                fi
                echo "${IMAGE}:sha-${SHORT_SHA}"
                ;;
            esac
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # NB: there is deliberately NO "delete the previous PR version before
      # re-publishing" step here anymore. That step used to delete the GHCR
      # version tagged pr-<N> on every push — but that version also carried
      # the previous commit's sha-<7> tag, so it destroyed an image a running
      # preview env could still be pulling (it pins image.tag to that exact
      # sha until the ApplicationSet re-renders to the new head). That was the
      # root trigger of the #1971 "stuck, undeletable preview" deadlock and it
      # broke the in-code promise that sha-<7> is immutable per commit.
      #
      # Now every commit's image simply persists for the life of the PR
      # (imagetools below just moves the mutable pr-<N> tag onto the new
      # version; the prior version keeps its sha-<7> tag). All of a PR's
      # images — pr-<N> and every per-commit sha-<7> — are reclaimed in one
      # shot by the `cleanup` job when the PR closes.

      - name: Create multi-arch manifest list
        # Registry-side stitching: imagetools reads the per-arch manifests by
        # digest from GHCR and writes one manifest list under the new tag(s).
        # No layer pull, no rebuild.
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          tag_args=()
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            tag_args+=(--tag "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"
          src_args=()
          for f in *; do
            src_args+=("${IMAGE}@sha256:${f}")
          done
          docker buildx imagetools create "${tag_args[@]}" "${src_args[@]}"

      - name: Inspect resulting image
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools inspect "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"

  # Pin the just-published master image SHA for the master ArgoCD
  # ApplicationSet (infra/argocd/applicationset-master.yaml). That appset
  # uses a git-`files` generator instead of scmProvider (the repo owner is
  # a GitHub *user*, and scmProvider only lists *org* repos → 404), so the
  # master head SHA has to reach ArgoCD via git. We write it to a one-file
  # orphan branch `argocd/master-pin`; the generator reads it and templates
  # image.tag + chart revision, so each master push is a real manifest diff
  # ArgoCD auto-syncs on. Master-push only; the pin branch never re-triggers
  # this workflow (it fires on push to master / tags), so there is no loop.
  pin-master-image:
    name: Pin master image for ArgoCD
    needs: merge
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Force-push the master image pin to argocd/master-pin
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHORT_SHA="${COMMIT_SHA:0:7}"
          PIN_BRANCH="argocd/master-pin"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Recreate the orphan branch from scratch each run so it holds
          # exactly one file and carries no master history.
          git checkout --orphan "$PIN_BRANCH"
          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx >/dev/null 2>&1 || true

          mkdir -p infra/argocd
          printf '{\n  "sha": "%s",\n  "imageTag": "sha-%s"\n}\n' \
            "$COMMIT_SHA" "$SHORT_SHA" > infra/argocd/master-image.json

          git add infra/argocd/master-image.json
          git commit -m "chore(argocd): pin master image sha-${SHORT_SHA}"
          git push -f origin "$PIN_BRANCH"
          echo "Pinned inv-vcl01-master image to sha-${SHORT_SHA}"

  cleanup:
    name: Cleanup PR images
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Needed to list the PR's commits so we know which sha-<7> tags belong
      # to this PR (and only this PR).
      pull-requests: read
    steps:
      - name: Delete all GHCR image versions published by this PR
        # Reclaim every image this PR ever published — the final pr-<N>
        # version AND each per-commit sha-<7> version (we stopped deleting
        # those on push; see the merge job). We enumerate the PR's commits to
        # derive exactly which sha-<7> tags are ours, so we never touch
        # master/edge/tag images or another PR's images.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
          PACKAGE_NAME: inventario
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # Tags this PR may have published: pr-<N> + sha-<7> for every commit
          # on the PR (paginated, so long PRs are fully covered). Commits that
          # were rebased/force-pushed away aren't in this list; any image they
          # left behind is swept later by time-based GHCR retention, not here.
          declare -A pr_tags=( ["pr-${PR_NUMBER}"]=1 )
          while IFS= read -r full_sha; do
            [ -z "$full_sha" ] && continue
            pr_tags["sha-${full_sha:0:7}"]=1
          done < <(
            gh api "/repos/${REPO}/pulls/${PR_NUMBER}/commits?per_page=100" --paginate \
              --jq '.[].sha'
          )

          owner_type="$(gh api "/users/${OWNER}" --jq '.type')"
          if [ "${owner_type}" = "Organization" ]; then
            package_api="/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          else
            package_api="/users/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          fi

          # Pass 1 — collect the version ids to delete. We must NOT delete
          # inside the `gh api --paginate` stream: removing a version from an
          # earlier page shifts the remaining pages, so later matches would be
          # skipped and survive cleanup. Drain the full listing first, then
          # delete in pass 2. A version is ours if ANY of its tags is one of
          # ours — the multi-arch manifest list carries both pr-<N> and its
          # sha-<7>; intermediate per-commit versions carry only sha-<7>.
          versions_to_delete=()
          while IFS=$'\t' read -r version_id tags_csv; do
            [ -z "$version_id" ] && continue
            IFS=',' read -ra tags <<< "${tags_csv}"
            for t in "${tags[@]}"; do
              if [ -n "${pr_tags[$t]:-}" ]; then
                versions_to_delete+=("${version_id}"$'\t'"${tags_csv}")
                break
              fi
            done
          done < <(
            gh api "${package_api}?per_page=100" --paginate \
              --jq '.[] | [(.id|tostring), ((.metadata.container.tags // []) | join(","))] | @tsv'
          )

          # Pass 2 — delete the collected versions.
          deleted=0
          if [ "${#versions_to_delete[@]}" -gt 0 ]; then
            for row in "${versions_to_delete[@]}"; do
              IFS=$'\t' read -r version_id tags_csv <<< "${row}"
              gh api --method DELETE "${package_api}/${version_id}"
              echo "Deleted package version ${version_id} (tags: ${tags_csv:-<none>})"
              deleted=$((deleted + 1))
            done
          fi

          echo "Deleted ${deleted} package version(s) for PR #${PR_NUMBER}."
