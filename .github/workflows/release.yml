name: Release

on:
  # Tag push -> real release: uploads binaries/archives to a GitHub Release.
  push:
    tags:
      - 'v*'
  # PR -> dry-run: validate goreleaser config + binaries can still be built
  # before they're irreversibly tagged. Path filter narrows triggers to
  # changes that can plausibly break the goreleaser pipeline.
  pull_request:
    branches: [master]
    paths:
      - '.goreleaser.yaml'
      - 'go/**'
      - 'frontend/**'
      - 'Makefile'
      - '.github/workflows/release.yml'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  goreleaser:
    # Docker images are built and pushed by docker.yml on the same tag push
    # (push: tags: ['v*']). This job only owns binaries, archives and the
    # GitHub Release, so QEMU/Buildx/ghcr login are not needed here.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: vars
        uses: ./.github/actions/vars

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache: true
          cache-dependency-path: go/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.vars.outputs.node_version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Go dependencies
        run: go mod download
        working-directory: go

      - name: Run GoReleaser
        # PR runs the snapshot dry-run (no GitHub Release upload, no signing,
        # no SBOM); tag push runs the real release.
        uses: goreleaser/goreleaser-action@v7
        with:
          # Pin goreleaser CLI to v2.x (avoids the action's `latest`
          # default-warning and shields PRs from a surprise major bump).
          version: '~> v2'
          args: ${{ github.event_name == 'pull_request' && 'release --snapshot --clean --skip=publish,sbom,sign' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
