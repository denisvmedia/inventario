name: Go Lint

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v6

      - id: vars
        uses: ./.github/actions/vars

      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache: true
          cache-dependency-path: go/go.sum

      - name: nolintguard
        run: |
          echo "Running nolintguard..."
          cd go && go tool nolintguard ./...

      - name: qtlint
        run: |
          echo "Running qtlint..."
          cd go && go tool qtlint ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=30m
          # Pin to v2.11.4 — `vars` action doesn't output a
          # `golangci_lint_version`, so leaving it parameterised resolved
          # to `latest`, which started flagging pre-existing gosec/govet/
          # modernize issues the moment v2.12.0 was released. Pinning
          # keeps CI deterministic; bump in a separate PR alongside the
          # corresponding code fixes.
          version: v2.11.4
          working-directory: go
