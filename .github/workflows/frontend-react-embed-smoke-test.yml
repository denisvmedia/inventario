name: Frontend React Embed Smoke Test

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  embed-smoke-test:
    name: embed smoke test (React)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - id: vars
        uses: ./.github/actions/vars

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.vars.outputs.node_version }}
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
          cache: true
          cache-dependency-path: go/go.sum

      - name: Build React frontend
        run: npm ci && npm run build
        working-directory: frontend-react

      - name: Install Go dependencies
        run: go mod download
        working-directory: go

      - name: Run React embed smoke test
        # Requires -tags with_frontend so frontendreact.GetDist() is compiled in.
        # Lives in its own package (./apiserver/frontendreactembed) so it does
        # not drag in apiserver_with_frontend.go's dependency on the legacy
        # frontend bundle — the React workflow only builds frontend-react/.
        # The test reads dist/index.html and verifies the title and the absence
        # of bolt.new artifacts; it also walks dist/assets to confirm Vite
        # underscore-prefixed chunks are embedded (would fail if the
        # //go:embed directive missed the "all:" prefix).
        run: go test -v -tags with_frontend ./apiserver/frontendreactembed/...
        working-directory: go
