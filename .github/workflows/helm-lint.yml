name: Helm Lint

on:
  push:
    branches:
      - master
    paths:
      - 'helm/**'
      - '.github/workflows/helm-lint.yml'
  pull_request:
    paths:
      - 'helm/**'
      - '.github/workflows/helm-lint.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint Helm chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart with production-style values
        run: >-
          helm lint helm/inventario
          --set-string secrets.dbDsn='postgres://user:pass@pg-host:5432/inventario?sslmode=require'
          --set-string secrets.jwtSecret='testtesttesttesttesttesttesttest'
          --set-string secrets.fileSigningKey='testtesttesttesttesttesttesttest'
          --set setupJob.initData.adminPassword=test

      - name: Render chart with production-style values
        run: >-
          helm template inventario helm/inventario
          --set-string secrets.dbDsn='postgres://user:pass@pg-host:5432/inventario?sslmode=require'
          --set-string secrets.jwtSecret='testtesttesttesttesttesttesttest'
          --set-string secrets.fileSigningKey='testtesttesttesttesttesttesttest'
          --set setupJob.initData.adminPassword=test
          > /tmp/inventario-production-render.yaml

      - name: Render chart with existing secret
        run: >-
          helm template inventario helm/inventario
          --set-string secrets.existingSecret=inventario-runtime
          > /tmp/inventario-existing-secret-render.yaml

      - name: Lint chart with demo services enabled
        run: >-
          helm lint helm/inventario
          --set demo.postgresql.enabled=true
          --set demo.redis.enabled=true
          --set demo.minio.enabled=true
          --set setupJob.initData.adminPassword=demo-secret

      - name: Render chart with demo services enabled
        run: >-
          helm template inventario helm/inventario
          --set demo.postgresql.enabled=true
          --set demo.redis.enabled=true
          --set demo.minio.enabled=true
          --set setupJob.initData.adminPassword=demo-secret
          > /tmp/inventario-demo-render.yaml

      - name: Render chart in split mode (apiserver + all worker groups)
        run: >-
          helm template inventario helm/inventario
          --set-string secrets.dbDsn='postgres://user:pass@pg-host:5432/inventario?sslmode=require'
          --set-string secrets.jwtSecret='testtesttesttesttesttesttesttest'
          --set-string secrets.fileSigningKey='testtesttesttesttesttesttesttest'
          --set setupJob.initData.adminPassword=test
          --set run.all.enabled=false
          --set run.apiserver.enabled=true
          --set run.workers.archive.enabled=true
          --set run.workers.emails.enabled=true
          --set run.workers.housekeeping.enabled=true
          --set run.workers.media.enabled=true
          > /tmp/inventario-split-all-render.yaml

      - name: Render chart in split mode (apiserver only)
        run: >-
          helm template inventario helm/inventario
          --set-string secrets.dbDsn='postgres://user:pass@pg-host:5432/inventario?sslmode=require'
          --set-string secrets.jwtSecret='testtesttesttesttesttesttesttest'
          --set-string secrets.fileSigningKey='testtesttesttesttesttesttesttest'
          --set setupJob.initData.adminPassword=test
          --set run.all.enabled=false
          --set run.apiserver.enabled=true
          > /tmp/inventario-split-apiserver-render.yaml

      - name: Render chart in split mode (worker-groups subset + HPA stubs)
        run: >-
          helm template inventario helm/inventario
          --set-string secrets.dbDsn='postgres://user:pass@pg-host:5432/inventario?sslmode=require'
          --set-string secrets.jwtSecret='testtesttesttesttesttesttesttest'
          --set-string secrets.fileSigningKey='testtesttesttesttesttesttesttest'
          --set setupJob.initData.adminPassword=test
          --set run.all.enabled=false
          --set run.apiserver.enabled=true
          --set run.apiserver.autoscaling.enabled=true
          --set run.workers.media.enabled=true
          --set run.workers.media.autoscaling.enabled=true
          --set run.workers.archive.enabled=true
          > /tmp/inventario-split-workers-subset-render.yaml

      - name: Verify missing DSN is rejected
        run: |
          set -euo pipefail

          if helm template inventario helm/inventario \
            > /tmp/inventario-missing-dsn-render.yaml \
            2> /tmp/inventario-missing-dsn-error.log; then
            echo "Expected helm template to fail when neither secrets.dbDsn nor secrets.existingSecret is set." >&2
            exit 1
          fi

          cat /tmp/inventario-missing-dsn-error.log
          grep -Eq 'dbDsn|existingSecret|DSN' /tmp/inventario-missing-dsn-error.log

      - name: Verify run.all + run.apiserver mutual exclusion is rejected
        run: |
          set -euo pipefail

          if helm template inventario helm/inventario \
            --set-string secrets.dbDsn='postgres://user:pass@pg-host:5432/inventario?sslmode=require' \
            --set-string secrets.jwtSecret='testtesttesttesttesttesttesttest' \
            --set-string secrets.fileSigningKey='testtesttesttesttesttesttesttest' \
            --set setupJob.initData.adminPassword=test \
            --set run.apiserver.enabled=true \
            > /tmp/inventario-mutex-render.yaml \
            2> /tmp/inventario-mutex-error.log; then
            echo "Expected helm template to fail when run.all and run.apiserver are both enabled." >&2
            exit 1
          fi

          cat /tmp/inventario-mutex-error.log
          grep -Eq 'mutually exclusive' /tmp/inventario-mutex-error.log

      - name: Verify no-topology configuration is rejected
        run: |
          set -euo pipefail

          if helm template inventario helm/inventario \
            --set-string secrets.dbDsn='postgres://user:pass@pg-host:5432/inventario?sslmode=require' \
            --set-string secrets.jwtSecret='testtesttesttesttesttesttesttest' \
            --set-string secrets.fileSigningKey='testtesttesttesttesttesttesttest' \
            --set setupJob.initData.adminPassword=test \
            --set run.all.enabled=false \
            > /tmp/inventario-no-topology-render.yaml \
            2> /tmp/inventario-no-topology-error.log; then
            echo "Expected helm template to fail when neither run.all nor a split role is enabled." >&2
            exit 1
          fi

          cat /tmp/inventario-no-topology-error.log
          grep -Eq 'No run topology' /tmp/inventario-no-topology-error.log

      - name: Verify workers-only configuration is rejected
        run: |
          set -euo pipefail

          if helm template inventario helm/inventario \
            --set-string secrets.dbDsn='postgres://user:pass@pg-host:5432/inventario?sslmode=require' \
            --set-string secrets.jwtSecret='testtesttesttesttesttesttesttest' \
            --set-string secrets.fileSigningKey='testtesttesttesttesttesttesttest' \
            --set setupJob.initData.adminPassword=test \
            --set run.all.enabled=false \
            --set run.workers.media.enabled=true \
            > /tmp/inventario-workers-only-render.yaml \
            2> /tmp/inventario-workers-only-error.log; then
            echo "Expected helm template to fail when any worker is enabled without run.apiserver." >&2
            exit 1
          fi

          cat /tmp/inventario-workers-only-error.log
          grep -Eq 'Workers-only mode is not supported' /tmp/inventario-workers-only-error.log

      - name: Render chart in split mode with a long release name (name-collision guard)
        run: |
          set -euo pipefail

          # 53-char release name (helm's max). Combined with the
          # 10-char `-inventario` chart-name suffix, the unpatched
          # `inventario.fullname | trunc 63` would consume every
          # available char, so the role suffixes (`-worker-<group>`
          # up to 20 chars, or `-apiserver` 10 chars) would be sliced
          # off by the trailing `trunc 63` and every resource would
          # collapse to the same name.
          # inventario.splitBaseName pre-truncates the base so the
          # suffix is never lost to the trailing trunc 63 — every
          # Deployment/Service/HPA name in this render must remain
          # unique.
          helm template inventario-long-release-name-collision-check-helmlint helm/inventario \
            --set-string secrets.dbDsn='postgres://user:pass@pg-host:5432/inventario?sslmode=require' \
            --set-string secrets.jwtSecret='testtesttesttesttesttesttesttest' \
            --set-string secrets.fileSigningKey='testtesttesttesttesttesttesttest' \
            --set setupJob.initData.adminPassword=test \
            --set run.all.enabled=false \
            --set run.apiserver.enabled=true \
            --set run.workers.archive.enabled=true \
            --set run.workers.emails.enabled=true \
            --set run.workers.housekeeping.enabled=true \
            --set run.workers.media.enabled=true \
            > /tmp/inventario-long-release-render.yaml

          # Extract every Deployment name in the render and require uniqueness.
          # Without the splitBaseName pre-truncation, the -apiserver and -worker-*
          # suffixes would collapse onto inventario.fullname and onto each other.
          dep_names="$(awk '
            /^kind: Deployment$/ { in_kind=1; next }
            in_kind && /^metadata:/ { in_meta=1; next }
            in_meta && /^  name: / { print $2; in_kind=0; in_meta=0; next }
            /^---/ { in_kind=0; in_meta=0 }
          ' /tmp/inventario-long-release-render.yaml)"

          echo "Rendered Deployment names:"
          echo "$dep_names"

          dup_count="$(echo "$dep_names" | sort | uniq -d | wc -l)"
          if [ "$dup_count" -ne 0 ]; then
            echo "Duplicate Deployment names detected in long-release split render — name truncation collapsed the role suffix." >&2
            echo "$dep_names" | sort | uniq -d >&2
            exit 1
          fi

          # apiserver + 4 workers = 5 split-mode Deployments expected.
          expected=5
          actual="$(echo "$dep_names" | grep -c .)"
          if [ "$actual" -ne "$expected" ]; then
            echo "Expected ${expected} unique split-mode Deployment names, got ${actual}." >&2
            exit 1
          fi

      - name: Verify empty-HPA-metrics configuration is rejected
        run: |
          set -euo pipefail

          # autoscaling.enabled=true with both target* nulled and metrics=[]
          # would render `spec.metrics:` with no items — invalid for
          # autoscaling/v2. inventario.hpaMetrics fails the render instead.
          if helm template inventario helm/inventario \
            --set-string secrets.dbDsn='postgres://user:pass@pg-host:5432/inventario?sslmode=require' \
            --set-string secrets.jwtSecret='testtesttesttesttesttesttesttest' \
            --set-string secrets.fileSigningKey='testtesttesttesttesttesttesttest' \
            --set setupJob.initData.adminPassword=test \
            --set run.all.autoscaling.enabled=true \
            --set run.all.autoscaling.targetCPUUtilizationPercentage=null \
            --set run.all.autoscaling.targetMemoryUtilizationPercentage=null \
            > /tmp/inventario-empty-hpa-render.yaml \
            2> /tmp/inventario-empty-hpa-error.log; then
            echo "Expected helm template to fail when autoscaling.enabled=true but no metrics are configured." >&2
            exit 1
          fi

          cat /tmp/inventario-empty-hpa-error.log
          grep -Eq 'no metrics are configured' /tmp/inventario-empty-hpa-error.log

      - name: Render chart with HPA metrics supplied only via the extensible list
        run: >-
          helm template inventario helm/inventario
          --set-string secrets.dbDsn='postgres://user:pass@pg-host:5432/inventario?sslmode=require'
          --set-string secrets.jwtSecret='testtesttesttesttesttesttesttest'
          --set-string secrets.fileSigningKey='testtesttesttesttesttesttesttest'
          --set setupJob.initData.adminPassword=test
          --set run.all.autoscaling.enabled=true
          --set run.all.autoscaling.targetCPUUtilizationPercentage=null
          --set run.all.autoscaling.metrics[0].type=External
          --set run.all.autoscaling.metrics[0].external.metric.name=inventario_jobs_pending
          --set run.all.autoscaling.metrics[0].external.target.type=AverageValue
          --set-string run.all.autoscaling.metrics[0].external.target.averageValue=5
          > /tmp/inventario-hpa-external-render.yaml

      - name: Render chart with setupJob.argocdMode (combined + demo)
        run: |
          set -euo pipefail

          # argocdMode rearranges the setup work into three coordinated
          # resources (#1884 approach A): a bootstrap-only Job at sync-wave
          # -5, app Deployment(s) with a `migrate` init container at wave 0,
          # and a post-Deployment init-data Job at sync-wave +5. The render
          # checks below pin every required annotation, init-container name,
          # and Job-step move so a future refactor can't silently break the
          # ordering that the in-place ArgoCD upgrade story depends on.
          helm template inventario helm/inventario \
            --set demo.postgresql.enabled=true \
            --set demo.redis.enabled=true \
            --set demo.minio.enabled=true \
            --set setupJob.argocdMode=true \
            --set setupJob.initData.seedDatabase=true \
            --set setupJob.initData.adminPassword=demo-secret \
            > /tmp/inventario-argocd-combined-render.yaml

          # Setup Job:
          # - declares sync-wave "-5" (runs before the app Deployment)
          # - keeps the bootstrap init container
          # - drops the migrate + init-data steps (they live elsewhere now)
          setup_job_block="$(awk '
            /^# Source: inventario\/templates\/job-setup.yaml/ { in_block=1 }
            in_block { print }
            in_block && /^# Source: / && !/job-setup\.yaml/ { exit }
          ' /tmp/inventario-argocd-combined-render.yaml)"

          echo "$setup_job_block" | grep -Eq '"argocd.argoproj.io/sync-wave": "-5"' \
            || { echo "setup Job missing sync-wave -5" >&2; echo "$setup_job_block" >&2; exit 1; }
          echo "$setup_job_block" | grep -Eq '"argocd.argoproj.io/sync-options": "Force=true,Replace=true"' \
            || { echo "setup Job missing Force=true,Replace=true" >&2; exit 1; }
          echo "$setup_job_block" | grep -Eq '- name: bootstrap' \
            || { echo "setup Job missing bootstrap init container" >&2; exit 1; }
          if echo "$setup_job_block" | grep -Eq '- name: migrate'; then
            echo "setup Job must not contain a migrate init container in argocdMode" >&2
            exit 1
          fi
          if echo "$setup_job_block" | grep -Eq '- name: init-data'; then
            echo "setup Job must not contain an init-data init container in argocdMode" >&2
            exit 1
          fi

          # App Deployment: must carry the `migrate` init container.
          deployment_block="$(awk '
            /^# Source: inventario\/templates\/deployment.yaml/ { in_block=1 }
            in_block { print }
            in_block && /^# Source: / && !/templates\/deployment\.yaml/ { exit }
          ' /tmp/inventario-argocd-combined-render.yaml)"

          echo "$deployment_block" | grep -Eq '^      initContainers:' \
            || { echo "combined Deployment missing initContainers block" >&2; exit 1; }
          echo "$deployment_block" | grep -Eq '- name: migrate' \
            || { echo "combined Deployment missing migrate init container" >&2; exit 1; }
          echo "$deployment_block" | grep -Eq 'inventario db migrate up' \
            || { echo "combined Deployment migrate container missing migrate-up command" >&2; exit 1; }

          # init-data Job: separate template, sync-wave +5, hosts init-data.
          init_data_block="$(awk '
            /^# Source: inventario\/templates\/job-init-data.yaml/ { in_block=1 }
            in_block { print }
            in_block && /^# Source: / && !/job-init-data\.yaml/ { exit }
          ' /tmp/inventario-argocd-combined-render.yaml)"

          test -n "$init_data_block" \
            || { echo "argocdMode render is missing the init-data Job" >&2; exit 1; }
          echo "$init_data_block" | grep -Eq '"argocd.argoproj.io/sync-wave": "5"' \
            || { echo "init-data Job missing sync-wave 5" >&2; exit 1; }
          echo "$init_data_block" | grep -Eq '- name: init-data' \
            || { echo "init-data Job missing init-data init container" >&2; exit 1; }

      - name: Render chart with setupJob.argocdMode (split + external services)
        run: |
          set -euo pipefail

          # Split-mode parity: every Deployment (apiserver + each worker
          # group) must include the migrate init container in argocdMode,
          # since they all go through verifySchemaMatchesBinary at startup.
          helm template inventario helm/inventario \
            --set-string secrets.dbDsn='postgres://user:pass@pg-host:5432/inventario?sslmode=require' \
            --set-string secrets.jwtSecret='testtesttesttesttesttesttesttest' \
            --set-string secrets.fileSigningKey='testtesttesttesttesttesttesttest' \
            --set setupJob.argocdMode=true \
            --set setupJob.initData.adminPassword=test \
            --set run.all.enabled=false \
            --set run.apiserver.enabled=true \
            --set run.workers.archive.enabled=true \
            --set run.workers.emails.enabled=true \
            --set run.workers.housekeeping.enabled=true \
            --set run.workers.media.enabled=true \
            > /tmp/inventario-argocd-split-render.yaml

          # Every Deployment must contain a migrate init container.
          deployment_count="$(grep -c '^kind: Deployment$' /tmp/inventario-argocd-split-render.yaml)"
          migrate_count="$(grep -c '^        - name: migrate$' /tmp/inventario-argocd-split-render.yaml)"
          if [ "$deployment_count" -ne "$migrate_count" ]; then
            echo "Expected migrate init container in every Deployment: ${deployment_count} Deployments, ${migrate_count} migrate containers." >&2
            grep -nE '^kind: Deployment|^        - name: migrate' /tmp/inventario-argocd-split-render.yaml >&2 || true
            exit 1
          fi

      - name: Render chart with setupJob.argocdMode=false (regression check)
        run: |
          set -euo pipefail

          # Non-argocdMode must keep the legacy behavior: single setup Job
          # with bootstrap + migrate + init-data, no migrate init container
          # on the Deployment, no separate init-data Job.
          helm template inventario helm/inventario \
            --set demo.postgresql.enabled=true \
            --set demo.redis.enabled=true \
            --set demo.minio.enabled=true \
            --set setupJob.initData.adminPassword=demo-secret \
            > /tmp/inventario-non-argocd-render.yaml

          if grep -q 'templates/job-init-data.yaml' /tmp/inventario-non-argocd-render.yaml; then
            echo "Non-argocdMode must not render the init-data Job." >&2
            exit 1
          fi

          # The combined Deployment must NOT have a migrate init container
          # outside argocdMode (it would re-run migrate on every pod restart
          # for `helm install` consumers that already get it via the Helm
          # hook).
          deployment_block="$(awk '
            /^# Source: inventario\/templates\/deployment.yaml/ { in_block=1 }
            in_block { print }
            in_block && /^# Source: / && !/templates\/deployment\.yaml/ { exit }
          ' /tmp/inventario-non-argocd-render.yaml)"

          if echo "$deployment_block" | grep -Eq '- name: migrate'; then
            echo "Non-argocdMode Deployment must not carry a migrate init container." >&2
            exit 1
          fi

          # The setup Job in non-argocdMode keeps the legacy three-step shape.
          setup_job_block="$(awk '
            /^# Source: inventario\/templates\/job-setup.yaml/ { in_block=1 }
            in_block { print }
            in_block && /^# Source: / && !/job-setup\.yaml/ { exit }
          ' /tmp/inventario-non-argocd-render.yaml)"

          for step in bootstrap migrate init-data; do
            echo "$setup_job_block" | grep -Eq "- name: ${step}" \
              || { echo "Non-argocdMode setup Job missing ${step} init container" >&2; exit 1; }
          done
