    - LoginOutcomeBadPassword
    - LoginOutcomeAccountLocked
    - LoginOutcomeAccountDisabled
    - LoginOutcomeEmailNotVerified
    - LoginOutcomeMFARequired
    - LoginOutcomeBadMFA
    - LoginOutcomeMFAAdminReset
  models.Plan:
    properties:
      allows_api_access:
        type: boolean
      allows_restore:
        type: boolean
      id:
        type: string
      max_exports_per_month:
        type: integer
      max_groups:
        type: integer
      max_items:
        type: integer
      max_locations:
        type: integer
      max_members_per_group:
        type: integer
      max_storage_bytes:
        type: integer
      name:
        type: string
    type: object
  models.PlanUsage:
    properties:
      items:
        type: integer
      locations:
        type: integer
      storage_bytes:
        type: integer
    type: object
  models.RestoreOperation:
    properties:
      area_count:
        type: integer
      binary_data_size:
        type: integer
      commodity_count:
        type: integer
      completed_date:
        type: string
      created_date:
        type: string
      description:
        type: string
      error_count:
        type: integer
      error_message:
        type: string
      export_id:
        type: string
      file_count:
        type: integer
      id:
        type: string
      image_count:
        type: integer
      invoice_count:
        type: integer
      location_count:
        description: Statistics
        type: integer
      manual_count:
        type: integer
      options:
        $ref: '#/definitions/models.RestoreOptions'
      started_date:
        type: string
      status:
        $ref: '#/definitions/models.RestoreStatus'
      steps:
        description: Related steps (not stored in DB, loaded separately)
        items:
          $ref: '#/definitions/models.RestoreStep'
        type: array
      uuid:
        type: string
    type: object
  models.RestoreOptions:
    properties:
      dry_run:
        type: boolean
      include_file_data:
        type: boolean
      strategy:
        type: string
    type: object
  models.RestoreStatus:
    enum:
    - pending
    - running
    - completed
    - failed
    type: string
    x-enum-varnames:
    - RestoreStatusPending
    - RestoreStatusRunning
    - RestoreStatusCompleted
    - RestoreStatusFailed
  models.RestoreStep:
    properties:
      created_date:
        type: string
      duration:
        description: Duration in milliseconds
        type: integer
      id:
        type: string
      name:
        type: string
      reason:
        description: Reason for error or skip
        type: string
      restore_operation_id:
        type: string
      result:
        $ref: '#/definitions/models.RestoreStepResult'
      updated_date:
        type: string
      uuid:
        type: string
    type: object
  models.RestoreStepResult:
    enum:
    - todo
    - in_progress
    - success
    - error
    - skipped
    type: string
    x-enum-varnames:
    - RestoreStepResultTodo
    - RestoreStepResultInProgress
    - RestoreStepResultSuccess
    - RestoreStepResultError
    - RestoreStepResultSkipped
  models.SettingsObject:
    properties:
      appearanceDefaultItemsView:
        description: Per-user appearance preferences.
        type: string
      appearancePreferredDisplayCurrency:
        type: string
      defaultDateFormat:
        type: string
      notificationsChannelEmail:
        description: |-
          Channel toggles act as a master switch per delivery channel: when
          false, no category-level notification is delivered through that
          channel regardless of the per-category toggle.
        type: boolean
      notificationsChannelPush:
        type: boolean
      notificationsMaintenanceReminder:
        type: boolean
      notificationsPriceDrop:
        type: boolean
      notificationsWarrantyExpiry:
        description: |-
          Notification category toggles. Each category controls a class of
          outbound notifications (warranty expiry mailers, weekly digests,
          etc.). Transactional senders — password reset, email verification —
          never consult these and so cannot be opted out.
        type: boolean
      notificationsWeeklyDigest:
        type: boolean
      showDebugInfo:
        type: boolean
      theme:
        type: string
    type: object
  models.Tag:
    properties:
      color:
        allOf:
        - $ref: '#/definitions/models.TagColor'
        description: Color is one of the curated TagColor values.
      created_at:
        type: string
      id:
        type: string
      label:
        description: Label is the human-readable display name.
        type: string
      slug:
        description: |-
          Slug is the kebab-cased identifier referenced from
          commodities.tags / files.tags JSONB arrays. Unique per group.
        type: string
      updated_at:
        type: string
      uuid:
        type: string
    type: object
  models.TagColor:
    enum:
    - amber
    - green
    - blue
    - orange
    - red
    - muted
    type: string
    x-enum-varnames:
    - TagColorAmber
    - TagColorGreen
    - TagColorBlue
    - TagColorOrange
    - TagColorRed
    - TagColorMuted
  models.User:
    properties:
      created_at:
        type: string
      default_group_id:
        description: |-
          DefaultGroupID is the user's preferred landing group after login.
          Nullable: when unset, the login flow falls back to "first group the user
          created, else first group they were invited to" (#1263). ON DELETE SET NULL
          so removing a group silently clears the preference instead of blocking the delete.
        type: string
      email:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      last_login_at:
        type: string
      name:
        type: string
      updated_at:
        type: string
      uuid:
        type: string
    type: object
  registry.StorageBreakdown:
    properties:
      documents:
        type: integer
      exports:
        type: integer
      images:
        type: integer
      invoices:
        type: integer
      other:
        type: integer
    type: object
  registry.TagStats:
    properties:
      files_tagged:
        type: integer
      files_untagged:
        type: integer
      items_tagged:
        type: integer
      items_untagged:
        type: integer
      tags_total:
        type: integer
    type: object
  registry.TagUsage:
    properties:
      commodities:
        type: integer
      files:
        type: integer
    type: object
  services.StorageUsage:
    properties:
      breakdown:
        $ref: '#/definitions/registry.StorageBreakdown'
      quota_bytes:
        type: integer
      used_bytes:
        type: integer
    type: object
info:
  contact:
    email: ask@artprima.cz
    name: Inventario Support
    url: https://github.com/denisvmedia/inventario/issues
  description: This is an Inventario daemon.
  license:
    name: MIT
  title: Inventario API
  version: "1.0"
paths:
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Change the authenticated user's password. All existing sessions
        are invalidated on success.
      parameters:
      - description: Change password request
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Change password
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user with email and password. Issues an access token
        in the response body and sets a refresh token as an httpOnly cookie.
      parameters:
      - description: Login credentials
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.LoginResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized - invalid credentials
          schema:
            type: string
        "403":
          description: Forbidden - account disabled
          schema:
            type: string
        "429":
          description: Too Many Requests - account locked
          schema:
            type: string
      summary: Login
      tags:
      - auth
  /auth/login/mfa:
    post:
      consumes:
      - application/json
      description: Exchange a short-lived mfa_token + TOTP/backup code for an access
        token.
      parameters:
      - description: MFA challenge response
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.LoginMFARequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.LoginResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Complete login with MFA
      tags:
      - auth
  /auth/logout:
    post:
      description: Revoke the current session's access token and clear the refresh
        token cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.LogoutResponse'
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      description: Return the currently authenticated user's profile. Also refreshes
        the CSRF token in the X-CSRF-Token response header.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Get current user
      tags:
      - auth
    put:
      consumes:
      - application/json
      description: |-
        Update the authenticated user's profile. The name field is required;
        default_group_id (#1263, #1592) is optional — send a group UUID the
        user is a member of to set, or null to clear (only allowed when the
        user has zero memberships; otherwise rejected with 400). Email, role,
        tenant_id, and is_active are ignored even if submitted.
      parameters:
      - description: Profile update request
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/jsonapi.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Update current user profile
      tags:
      - auth
  /auth/mfa/disable:
    post:
      consumes:
      - application/json
      description: Remove the user's MFA enrollment. Requires password + a current
        TOTP code or unused backup code.
      parameters:
      - description: Disable request
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.MFADisableRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Disable MFA
      tags:
      - auth
  /auth/mfa/regenerate-backup-codes:
    post:
      consumes:
      - application/json
      description: Invalidate the existing backup codes and return a fresh set. Requires
        a current TOTP code.
      parameters:
      - description: Current TOTP code
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.MFAVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.MFAVerifyResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Regenerate MFA backup codes
      tags:
      - auth
  /auth/mfa/setup:
    post:
      description: Generate a TOTP secret for the authenticated user and return the
        QR provisioning URL. Does not enable MFA yet — a follow-up call to /auth/mfa/verify
        is required.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.MFASetupResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Begin MFA enrollment
      tags:
      - auth
  /auth/mfa/status:
    get:
      description: Return whether the authenticated user has TOTP enrolled and enabled.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.MFAStatusResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Get MFA status
      tags:
      - auth
  /auth/mfa/verify:
    post:
      consumes:
      - application/json
      description: Verify the first TOTP code, enable MFA, and return single-use backup
        codes (shown ONCE).
      parameters:
      - description: Verification code
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.MFAVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.MFAVerifyResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized — invalid code
          schema:
            type: string
      summary: Complete MFA enrollment
      tags:
      - auth
  /auth/refresh:
    post:
      description: Issue a new short-lived access token using the refresh token stored
        in the httpOnly cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.LoginResponse'
        "401":
          description: Unauthorized - missing, invalid, or expired refresh token
          schema:
            type: string
        "501":
          description: Not Implemented - refresh tokens not supported
          schema:
            type: string
      summary: Refresh access token
      tags:
      - auth
  /currencies:
    get:
      consumes:
      - application/vnd.api+json
      description: get list of supported currencies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
      summary: Get supported currencies
      tags:
      - currencies
  /debug:
    get:
      consumes:
      - application/json
      description: get debug information about file storage, database driver, and
        operating system
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/debug.Info'
      summary: Get debug information
      tags:
      - debug
  /files/download/files/{fileID}:
    get:
      description: Download the original file content by file ID. Requires a valid
        signed URL token.
      parameters:
      - description: File ID
        in: path
        name: fileID
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: File content
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Download original file
      tags:
      - files
  /files/download/thumbnails/{fileID}/{size}:
    get:
      description: Download a JPEG thumbnail for the specified file. Returns a placeholder
        image while the thumbnail is being generated.
      parameters:
      - description: File ID
        in: path
        name: fileID
        required: true
        type: string
      - description: Thumbnail size
        enum:
        - small
        - medium
        in: path
        name: size
        required: true
        type: string
      produces:
      - image/jpeg
      responses:
        "200":
          description: Thumbnail image
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Download file thumbnail
      tags:
      - files
  /forgot-password:
    post:
      consumes:
      - application/json
      description: Send a password-reset link to the given email address. Always returns
        200 to prevent email enumeration.
      parameters:
      - description: Email address
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "429":
          description: Too Many Requests
          schema:
            type: string
      summary: Request a password reset
      tags:
      - auth
  /g/{groupSlug}/areas:
    get:
      consumes:
      - application/vnd.api+json
      description: get areas, optionally filtered to a single location.
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Restrict the result to areas inside the given location ID. Unknown
          / cross-tenant IDs return an empty list rather than 4xx.
        in: query
        name: location_id
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 50, max 100)
        in: query
        name: per_page
        type: integer
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.AreasResponse'
      summary: List areas
      tags:
      - areas
    post:
      consumes:
      - application/vnd.api+json
      description: add by area data
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Area object
        in: body
        name: area
        required: true
        schema:
          $ref: '#/definitions/jsonapi.AreaRequest'
      produces:
      - application/vnd.api+json
      responses:
        "201":
          description: Area created
          schema:
            $ref: '#/definitions/jsonapi.AreaResponse'
        "404":
          description: Area not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "422":
          description: User-side request problem
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Create a new area
      tags:
      - areas
  /g/{groupSlug}/areas/{areaID}:
    delete:
      consumes:
      - application/vnd.api+json
      description: Delete by area ID
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Area ID
        in: path
        name: areaID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "204":
          description: No content
        "404":
          description: Area not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Delete an area
      tags:
      - areas
    get:
      consumes:
      - application/vnd.api+json
      description: get area by ID
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Area ID
        in: path
        name: areaID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.AreaResponse'
      summary: Get an area
      tags:
      - areas
    put:
      consumes:
      - application/vnd.api+json
      description: Update by area data
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Area ID
        in: path
        name: areaID
        required: true
        type: string
      - description: Area object
        in: body
        name: area
        required: true
        schema:
          $ref: '#/definitions/jsonapi.AreaRequest'
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.AreaResponse'
        "404":
          description: Area not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "422":
          description: User-side request problem
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Update a area
      tags:
      - areas
  /g/{groupSlug}/commodities:
    get:
      consumes:
      - application/vnd.api+json
      description: get commodities
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 50, max 100)
        in: query
        name: per_page
        type: integer
      - collectionFormat: multi
        description: Filter by commodity type; repeat to OR
        in: query
        items:
          type: string
        name: type
        type: array
      - collectionFormat: multi
        description: Filter by status (in_use, sold, lost, disposed, written_off);
          repeat to OR
        in: query
        items:
          type: string
        name: status
        type: array
      - description: Filter by exact area ID
        in: query
        name: area_id
        type: string
      - description: Case-insensitive substring match on name + short_name
        in: query
        name: q
        type: string
      - description: Include drafts and non-in_use commodities (default false hides
          them)
        in: query
        name: include_inactive
        type: boolean
      - description: Sort field — name|registered_date|purchase_date|current_price|original_price|count,
          prefix with '-' for descending
        in: query
        name: sort
        type: string
      - collectionFormat: multi
        description: Filter by computed warranty status (active, expiring, expired,
          none); repeat to OR
        in: query
        items:
          type: string
        name: warranty_status
        type: array
      - description: Restrict to commodities whose warranty expires strictly before
          YYYY-MM-DD
        in: query
        name: warranty_expires_before
        type: string
      - description: 'Filter by current loan state: true = only currently lent (open
          loan), false = only currently not-lent'
        in: query
        name: lent_out
        type: boolean
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.CommoditiesResponse'
      summary: List commodities
      tags:
      - commodities
    post:
      consumes:
      - application/vnd.api+json
      description: Add a new commodity
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Commodity object
        in: body
        name: commodity
        required: true
        schema:
          $ref: '#/definitions/jsonapi.CommodityRequest'
      produces:
      - application/vnd.api+json
      responses:
        "201":
          description: Commodity created
          schema:
            $ref: '#/definitions/jsonapi.CommodityResponse'
        "422":
          description: User-side request problem
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Create a new commodity
      tags:
      - commodities
  /g/{groupSlug}/commodities/{commodityID}:
    delete:
      consumes:
      - application/vnd.api+json
      description: Delete a commodity by ID and all its linked files
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Commodity ID
        in: path
        name: commodityID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "204":
          description: No content
        "404":
          description: Commodity not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Delete a commodity
      tags:
      - commodities
    get:
      consumes:
      - application/vnd.api+json
      description: get commodity by ID
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Commodity ID
        in: path
        name: commodityID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
