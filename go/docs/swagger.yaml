info:
  contact:
    email: ask@artprima.cz
    name: Inventario Support
    url: https://github.com/denisvmedia/inventario/issues
  description: This is an Inventario daemon.
  license:
    name: MIT
  title: Inventario API
  version: "1.0"
paths:
  /areas:
    get:
      consumes:
      - application/vnd.api+json
      description: get areas
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 50, max 100)
        in: query
        name: per_page
        type: integer
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.AreasResponse'
      summary: List areas
      tags:
      - areas
    post:
      consumes:
      - application/vnd.api+json
      description: add by area data
      parameters:
      - description: Area object
        in: body
        name: area
        required: true
        schema:
          $ref: '#/definitions/jsonapi.AreaRequest'
      produces:
      - application/vnd.api+json
      responses:
        "201":
          description: Area created
          schema:
            $ref: '#/definitions/jsonapi.AreaResponse'
        "404":
          description: Area not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "422":
          description: User-side request problem
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Create a new area
      tags:
      - areas
  /areas/{id}:
    delete:
      consumes:
      - application/vnd.api+json
      description: Delete by area ID
      parameters:
      - description: Area ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "204":
          description: No content
        "404":
          description: Area not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Delete an area
      tags:
      - areas
    get:
      consumes:
      - application/vnd.api+json
      description: get area by ID
      parameters:
      - description: Area ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.AreaResponse'
      summary: Get an area
      tags:
      - areas
    put:
      consumes:
      - application/vnd.api+json
      description: Update by area data
      parameters:
      - description: Area ID
        in: path
        name: id
        required: true
        type: string
      - description: Area object
        in: body
        name: area
        required: true
        schema:
          $ref: '#/definitions/jsonapi.AreaRequest'
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.AreaResponse'
        "404":
          description: Area not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "422":
          description: User-side request problem
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Update a area
      tags:
      - areas
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Change the authenticated user's password. All existing sessions
        are invalidated on success.
      parameters:
      - description: Change password request
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Change password
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user with email and password. Issues an access token
        in the response body and sets a refresh token as an httpOnly cookie.
      parameters:
      - description: Login credentials
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.LoginResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized - invalid credentials
          schema:
            type: string
        "403":
          description: Forbidden - account disabled
          schema:
            type: string
        "429":
          description: Too Many Requests - account locked
          schema:
            type: string
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Revoke the current session's access token and clear the refresh
        token cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.LogoutResponse'
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      description: Return the currently authenticated user's profile. Also refreshes
        the CSRF token in the X-CSRF-Token response header.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Get current user
      tags:
      - auth
    put:
      consumes:
      - application/json
      description: |-
        Update the authenticated user's profile. The name field is required;
        default_group_id (#1263) is optional — send null to clear or a
        group UUID the user is a member of to set. Email, role, tenant_id,
        and is_active are ignored even if submitted.
      parameters:
      - description: Profile update request
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/jsonapi.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Update current user profile
      tags:
      - auth
  /auth/refresh:
    post:
      description: Issue a new short-lived access token using the refresh token stored
        in the httpOnly cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.LoginResponse'
        "401":
          description: Unauthorized - missing, invalid, or expired refresh token
          schema:
            type: string
        "501":
          description: Not Implemented - refresh tokens not supported
          schema:
            type: string
      summary: Refresh access token
      tags:
      - auth
  /commodities:
    get:
      consumes:
      - application/vnd.api+json
      description: get commodities
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 50, max 100)
        in: query
