      summary: Get a tag
      tags:
      - tags
    patch:
      consumes:
      - application/vnd.api+json
      description: Patch label/color/slug. Slug change rewrites JSONB references.
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Tag ID
        in: path
        name: tagID
        required: true
        type: string
      - description: Tag patch payload
        in: body
        name: tag
        required: true
        schema:
          $ref: '#/definitions/jsonapi.TagUpdateRequest'
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.TagResponse'
        "404":
          description: Tag not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "409":
          description: Slug already in use
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "422":
          description: User-side request problem
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Update a tag
      tags:
      - tags
  /g/{groupSlug}/tags/autocomplete:
    get:
      consumes:
      - application/vnd.api+json
      description: Top-N tags matching the query, ranked by usage desc + created_at
        desc.
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Substring match against label and slug
        in: query
        name: q
        type: string
      - default: 10
        description: Maximum suggestions returned
        in: query
        name: limit
        type: integer
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.TagAutocompleteResponse'
      summary: Autocomplete tag suggestions
      tags:
      - tags
  /g/{groupSlug}/tags/stats:
    get:
      consumes:
      - application/vnd.api+json
      description: Returns total tags, plus tagged/untagged counts on commodities
        and files for the current group.
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.TagStatsResponse'
      summary: Tag adoption stats
      tags:
      - tags
  /g/{groupSlug}/upload-slots/check:
    get:
      consumes:
      - application/vnd.api+json
      description: Check if user can start an upload for a specific operation
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Operation name
        example: image_upload
        in: query
        name: operation
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: Upload capacity available
          schema:
            $ref: '#/definitions/jsonapi.UploadStatusResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "429":
          description: Too many concurrent uploads
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Check upload capacity
      tags:
      - upload-slots
  /g/{groupSlug}/upload-slots/status:
    get:
      consumes:
      - application/vnd.api+json
      description: Get current upload status for a specific operation
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Operation name
        example: image_upload
        in: query
        name: operation
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: Upload status retrieved successfully
          schema:
            $ref: '#/definitions/jsonapi.UploadStatusResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Get upload status
      tags:
      - upload-slots
  /g/{groupSlug}/uploads/file:
    post:
      consumes:
      - multipart/form-data
      description: Upload a single file of any type. The file is stored and a file
        entity is created without a linked entity.
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/vnd.api+json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/jsonapi.FileResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Upload a file
      tags:
      - uploads
  /g/{groupSlug}/uploads/restores:
    post:
      consumes:
      - multipart/form-data
      description: Upload an XML backup file to be used for a restore operation.
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: XML backup file to upload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.UploadResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Upload restore file
      tags:
      - uploads
  /groups:
    get:
      consumes:
      - application/vnd.api+json
      description: Returns all active location groups the authenticated user is a
        member of
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.LocationGroupsResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: List user's groups
      tags:
      - groups
    post:
      consumes:
      - application/vnd.api+json
      description: Creates a new location group with a random non-guessable slug.
        The creator becomes the group admin.
      parameters:
      - description: Group data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/jsonapi.LocationGroupRequest'
      produces:
      - application/vnd.api+json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/jsonapi.LocationGroupResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Create a group
      tags:
      - groups
  /groups/{groupID}:
    delete:
      consumes:
      - application/json
      description: Initiates async deletion of a location group. Requires typing the
        group name AND the caller's current password. Requires group admin role. Failed
        attempts are audit-logged.
      parameters:
      - description: Group ID
        in: path
        name: groupID
        required: true
        type: string
      - description: Deletion confirmation (confirm_word + password)
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/jsonapi.GroupDeleteRequest'
      produces:
      - application/vnd.api+json
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden - not a group admin
          schema:
            type: string
        "404":
          description: Group not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "422":
          description: Invalid confirmation word or password
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Delete group
      tags:
      - groups
    get:
      consumes:
      - application/vnd.api+json
      description: Returns details of a location group. Requires group membership.
      parameters:
      - description: Group ID
        in: path
        name: groupID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.LocationGroupResponse'
        "403":
          description: Forbidden - not a group member
          schema:
            type: string
        "404":
          description: Group not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Get group details
      tags:
      - groups
    patch:
      consumes:
      - application/vnd.api+json
      description: 'Updates a location group''s name and icon. The group_currency
        field is set once at creation and cannot be changed here — see issue #202
        for the currency-migration tool. Requires group admin role.'
      parameters:
      - description: Group ID
        in: path
        name: groupID
        required: true
        type: string
      - description: Group data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/jsonapi.LocationGroupRequest'
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.LocationGroupResponse'
        "403":
          description: Forbidden - not a group admin
          schema:
            type: string
        "404":
          description: Group not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Update group
      tags:
      - groups
  /groups/{groupID}/invites:
    get:
      consumes:
      - application/vnd.api+json
      description: Returns all non-expired, unused invite links for a group. Requires
        group admin role.
      parameters:
      - description: Group ID
        in: path
        name: groupID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.GroupInvitesResponse'
        "403":
          description: Forbidden - not a group admin
          schema:
            type: string
      summary: List active invites
      tags:
      - groups
    post:
      consumes:
      - application/vnd.api+json
      description: |-
        Creates an invite. When the request body carries `email`, the BE persists invitee_email on
        the row and dispatches an email via EmailService; when empty, the invite remains a copy-paste
        token. `role` (viewer / user / admin) defaults to "user"; owner-by-invite is rejected — owner
        is a transfer-of-ownership operation. Requires group admin role.
      parameters:
      - description: Group ID
        in: path
        name: groupID
        required: true
        type: string
      - description: Optional invitee email + role
        in: body
        name: data
        schema:
          $ref: '#/definitions/jsonapi.GroupInviteCreateRequest'
      produces:
      - application/vnd.api+json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/jsonapi.GroupInviteResponse'
        "403":
          description: Forbidden - not a group admin
          schema:
            type: string
        "422":
          description: Invalid email / role
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Create invite
      tags:
      - groups
  /groups/{groupID}/invites/{inviteID}:
    delete:
      consumes:
      - application/vnd.api+json
      description: Deletes an unused invite link. Cannot revoke an already-used invite.
        Requires group admin role.
      parameters:
      - description: Group ID
        in: path
        name: groupID
        required: true
        type: string
      - description: Invite ID
        in: path
        name: inviteID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden - not a group admin
          schema:
            type: string
        "422":
          description: Cannot revoke a used invite
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Revoke invite
      tags:
      - groups
  /groups/{groupID}/invites/{inviteID}/resend:
    post:
      consumes:
      - application/vnd.api+json
      description: Mints a new token and expiry on an email-flow invite, then dispatches
        a fresh email. Legacy token-only invites cannot be resent — create a new invite
        or recopy the URL. Requires group admin role.
      parameters:
      - description: Group ID
        in: path
        name: groupID
        required: true
        type: string
      - description: Invite ID
        in: path
        name: inviteID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.GroupInviteResponse'
        "403":
          description: Forbidden - not a group admin
          schema:
            type: string
        "404":
          description: Invite not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "422":
          description: Invite already used, belongs to another group, or has no invitee
            email
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Resend invite
      tags:
      - groups
  /groups/{groupID}/leave:
    post:
      consumes:
      - application/vnd.api+json
      description: Removes the current user from a location group. Cannot leave if
        you are the last admin.
      parameters:
      - description: Group ID
        in: path
        name: groupID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden - not a group member
          schema:
            type: string
        "422":
          description: Cannot leave as the last admin
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Leave group
      tags:
      - groups
  /groups/{groupID}/members:
    get:
      consumes:
      - application/vnd.api+json
      description: Returns all members of a location group with their roles and joined
        user data (id / name / email). Requires group membership.
      parameters:
      - description: Group ID
        in: path
        name: groupID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.MembershipsWithUsersResponse'
        "403":
          description: Forbidden - not a group member
          schema:
            type: string
      summary: List group members
      tags:
      - groups
  /groups/{groupID}/members/{memberUserID}:
    delete:
      consumes:
      - application/vnd.api+json
      description: Removes a user from a location group. Cannot remove the last admin.
        Requires group admin role.
      parameters:
      - description: Group ID
        in: path
        name: groupID
        required: true
        type: string
      - description: User ID of the member to remove
        in: path
        name: memberUserID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden - not a group admin
          schema:
            type: string
        "422":
          description: Cannot remove the last admin
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Remove group member
      tags:
      - groups
    patch:
      consumes:
      - application/vnd.api+json
      description: Changes a member's role (admin/user) within a location group. Cannot
        demote the last admin. Requires group admin role.
      parameters:
      - description: Group ID
        in: path
        name: groupID
        required: true
        type: string
      - description: User ID of the member
        in: path
        name: memberUserID
        required: true
        type: string
      - description: New role
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/jsonapi.GroupMembershipRoleRequest'
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.GroupMembershipResponse'
        "403":
          description: Forbidden - not a group admin
          schema:
            type: string
        "422":
          description: Cannot demote the last admin
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Update member role
      tags:
      - groups
  /invites/{token}:
    get:
      description: Returns public information about an invite link including group
        name and whether it has expired or been used. Does not require authentication.
      parameters:
      - description: Invite token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.InviteInfoResponse'
        "404":
          description: Invite not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Get invite info
      tags:
      - invites
  /invites/{token}/accept:
    post:
      consumes:
      - application/vnd.api+json
      description: Accepts a single-use invite link and joins the group as a user.
        Requires authentication.
      parameters:
      - description: Invite token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/jsonapi.GroupMembershipResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Invite not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "422":
          description: Invite expired, already used, or user already a member
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Accept invite
      tags:
      - invites
  /register:
    post:
      consumes:
      - application/json
      description: 'Create a user. Valid invite_token: account active, no email verification
        (caller still POSTs /invites/{token}/accept after login). Without an invite:
        mode decides (open, approval, or 403 closed).'
      parameters:
      - description: Registration data (optionally including invite_token)
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK - registration accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request - invalid body, expired/used invite, or invalid
            password
          schema:
            type: string
        "403":
          description: Forbidden - registrations are closed and no valid invite was
            supplied
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
        "503":
          description: Service Unavailable - registration mode is misconfigured or
            invite-based registration is not wired
          schema:
            type: string
      summary: Register a new user
      tags:
      - registration
  /resend-verification:
    post:
      consumes:
      - application/json
      description: Issue a new email verification link for an unverified account.
        Always responds with success to prevent email enumeration.
      parameters:
      - description: Email to resend verification to
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.ResendVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
      summary: Resend verification email
      tags:
      - registration
  /reset-password:
    post:
      consumes:
      - application/json
      description: Validate a password-reset token and update the user's password.
        Invalidates all existing sessions.
      parameters:
      - description: Reset token and new password
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request - missing, invalid, or expired token
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Reset password using a token
      tags:
      - auth
  /seed:
    post:
      consumes:
      - application/json
      description: Seed the database with example data. Optionally specify user_email
        and tenant_slug in request body.
      parameters:
      - description: Seed options (optional)
        in: body
        name: body
        schema:
          $ref: '#/definitions/apiserver.SeedRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.SeedResponse'
      summary: Seed database
      tags:
      - admin
  /system:
    get:
      consumes:
      - application/json
      description: get comprehensive system information including version, runtime
        metrics, and settings
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.SystemInfo'
      summary: Get system information
      tags:
      - system
  /users/me/login-history:
    get:
      description: Returns the authenticated user's most recent login attempts (default
        100, max 500). Also returns failed_last_7d for the optional banner.
      parameters:
      - description: Cap on number of events returned (default 100, max 500)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.LoginHistoryResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: List login history
      tags:
      - users-me
  /users/me/sessions:
    delete:
      description: Revoke every refresh token for the authenticated user except the
        one bound to the current refresh cookie.
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Revoke all other sessions
      tags:
      - users-me
    get:
      description: Returns the authenticated user's active refresh-token sessions,
        with a flag identifying the session bound to the current refresh cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.SessionsListResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: List active sessions
      tags:
      - users-me
  /users/me/sessions/{id}:
    delete:
      description: Mark a single refresh token as revoked. Returns 404 if the id does
        not belong to the authenticated user.
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
      summary: Revoke one session
      tags:
      - users-me
  /verify-email:
    get:
      description: Activate a user account using the verification token sent by email.
      parameters:
      - description: Email verification token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request - missing, invalid, or expired token
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Verify email address
      tags:
      - registration
swagger: "2.0"
