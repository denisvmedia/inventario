  models.CommodityLoan:
    properties:
      borrower_contact:
        description: |-
          BorrowerContact is free-form (phone / email / @handle). No
          validation — the field is for the user's own reference.
        type: string
      borrower_name:
        description: |-
          BorrowerName is required and free-form. Capped at 200 chars to
          match the soft cap the FE already enforces on similar text
          fields and to leave room in DB indexes if we later add one.
        type: string
      borrower_note:
        description: |-
          BorrowerNote is a free-form aide-mémoire ("works in the office
          downstairs"). Capped at 1000 chars.
        type: string
      commodity_id:
        description: |-
          CommodityID — the lent item. ON DELETE CASCADE is added manually
          to the generated migration: hard-deleting a commodity drops its
          loan history (no orphan rows). Soft delete is not currently a
          commodity capability, so this is the only path that touches loans.
        type: string
      created_at:
        type: string
      due_back_at:
        description: |-
          DueBackAt is the optional expected-return date. Nullable for
          open-ended loans ("when you're done with it").
        type: string
      id:
        type: string
      lent_at:
        description: |-
          LentAt is the date the item left. Required. Stored as TEXT in
          YYYY-MM-DD format to match the project's other date fields
          (purchase_date, registered_date, last_modified_date).
        type: string
      reminder_sent_due_soon:
        type: boolean
      reminder_sent_overdue:
        description: |-
          ReminderSentOverdue + ReminderSentDueSoon are idempotency flags
          for the reminder worker (separate sub-issue, not exposed in the
          base feature's UI). Columns ship with the base table so the
          worker doesn't need a second migration to land. Set by the
          worker only — zero on every Create.
        type: boolean
      returned_at:
        description: |-
          ReturnedAt closes out the loan. Nullable until the item comes
          back. The "open vs returned" semantics derive from this field
          alone — there is no explicit status enum.
        type: string
      updated_at:
        type: string
      uuid:
        type: string
    type: object
  models.CommodityService:
    properties:
      commodity_id:
        description: |-
          CommodityID — the item being serviced. ON DELETE CASCADE is added
          manually to the generated migration; mirrors commodity_loans.
        type: string
      cost_amount:
        description: |-
          CostAmount is the optional repair bill. Bare decimal.Decimal —
          zero means "no cost recorded" (per the codebase's existing
          price-field convention). Pair-validated with CostCurrency:
          either both unset or both set.
        type: number
      cost_currency:
        description: |-
          CostCurrency is the ISO 4217 code for CostAmount. Empty means
          "no cost recorded" — see CostAmount. Stored as a plain string
          (not Currency) so the empty-string "unset" form doesn't trip the
          Currency type's auto-Validatable contract; ISO 4217 is enforced
          in ValidateWithContext only when a value is supplied.
        type: string
      created_at:
        type: string
      expected_return_at:
        description: |-
          ExpectedReturnAt is the optional ETA from the workshop. Nullable
          for open-ended estimates ("we'll call when ready").
        type: string
      id:
        type: string
      provider_contact:
        description: |-
          ProviderContact is free-form (phone / email / address). No
          validation — for the user's own reference.
        type: string
      provider_name:
        description: |-
          ProviderName is required and free-form ("Apple Authorized Service",
          "Bob's Repair Shop"). Capped at 200 chars to match similar BE text
          caps and leave room for indexes if we later add one.
        type: string
      reason:
        description: |-
          Reason is free-form ("screen replacement", "warranty diagnostics").
          Optional, but UI-prominent. Capped at 1000 chars.
        type: string
      reminder_sent_due_soon:
        type: boolean
      reminder_sent_overdue:
        description: |-
          ReminderSentOverdue + ReminderSentDueSoon are idempotency flags
          for the reminder worker (separate sub-issue #1509-equivalent for
          services). Set by the worker only — zero on every Create.
        type: boolean
      returned_at:
        description: |-
          ReturnedAt closes out the service row. Nullable until the item
          comes back. The "open vs returned" semantics derive from this
          field alone.
        type: string
      sent_at:
        description: |-
          SentAt is the date the item left for service. Required. Stored as
          TEXT in YYYY-MM-DD format to match other date fields.
        type: string
      updated_at:
        type: string
      uuid:
        type: string
    type: object
