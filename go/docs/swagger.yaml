        required: true
        type: string
      - description: Image ID
        in: path
        name: imageID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "204":
          description: No content
        "404":
          description: Commodity or image not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Delete an image for a commodity
      tags:
      - commodities
    get:
      consumes:
      - application/vnd.api+json
      description: get data of an image for a commodity
      parameters:
      - description: Commodity ID
        in: path
        name: commodityID
        required: true
        type: string
      - description: Image ID
        in: path
        name: imageID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.ImageResponse'
        "404":
          description: Commodity or image not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Get image data
      tags:
      - commodities
    put:
      consumes:
      - application/vnd.api+json
      description: update an image's path
      parameters:
      - description: Commodity ID
        in: path
        name: commodityID
        required: true
        type: string
      - description: Image ID
        in: path
        name: imageID
        required: true
        type: string
      - description: Update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/jsonapi.CommodityFileUpdateRequest'
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
