      imported:
        type: boolean
      include_file_data:
        type: boolean
      invoice_count:
        type: integer
      location_count:
        type: integer
      manual_count:
        type: integer
      selected_items:
        items:
          $ref: '#/definitions/models.ExportSelectedItem'
        type: array
      status:
        $ref: '#/definitions/models.ExportStatus'
      type:
        $ref: '#/definitions/models.ExportType'
      uuid:
        type: string
    type: object
  models.ExportSelectedItem:
    properties:
      area_id:
        description: 'For commodities: which area they belong to'
        type: string
      id:
        type: string
      include_all:
        type: boolean
      location_id:
        description: Relationship fields for preserving hierarchy snapshot
        type: string
      name:
        type: string
      type:
        $ref: '#/definitions/models.ExportSelectedItemType'
    type: object
  models.ExportSelectedItemType:
    enum:
    - location
    - area
    - commodity
    type: string
    x-enum-varnames:
    - ExportSelectedItemTypeLocation
    - ExportSelectedItemTypeArea
    - ExportSelectedItemTypeCommodity
  models.ExportStatus:
    enum:
    - pending
    - in_progress
    - completed
    - failed
    type: string
    x-enum-varnames:
    - ExportStatusPending
    - ExportStatusInProgress
    - ExportStatusCompleted
    - ExportStatusFailed
  models.ExportType:
    enum:
    - full_database
    - selected_items
    - locations
    - areas
    - commodities
    - imported
    type: string
    x-enum-varnames:
    - ExportTypeFullDatabase
    - ExportTypeSelectedItems
    - ExportTypeLocations
    - ExportTypeAreas
    - ExportTypeCommodities
    - ExportTypeImported
  models.FileCategory:
    enum:
    - photos
    - invoices
    - documents
    - other
    type: string
    x-enum-varnames:
    - FileCategoryPhotos
    - FileCategoryInvoices
    - FileCategoryDocuments
    - FileCategoryOther
  models.FileEntity:
    properties:
      category:
        allOf:
        - $ref: '#/definitions/models.FileCategory'
        description: |-
          Category is the user-meaningful classification surfaced in the UI
          (Photos/Invoices/Documents/Other).
      created_at:
        description: CreatedAt is when the file was created
        type: string
      description:
        description: Description is an optional description of the file
        type: string
      ext:
        description: |-
          Ext is the file extension including the dot.
          Example: ".pdf"
        type: string
      id:
        type: string
      linked_entity_id:
        description: LinkedEntityID is the ID of the linked entity (commodity or export)
        type: string
      linked_entity_meta:
        description: |-
          LinkedEntityMeta contains metadata about the link type
          For commodities: "images", "invoices", "manuals"
          For exports: "xml-1.0" (version of the export file format)
        type: string
      linked_entity_type:
        description: LinkedEntityType indicates what type of entity this file is linked
          to (commodity, export, or empty for standalone files)
        type: string
      mime_type:
        description: |-
          MIMEType is the MIME type of the file.
          Example: "application/pdf"
        type: string
      original_path:
        description: |-
          OriginalPath is the original filename as uploaded by the user.
          Example: "invoice.pdf"
        type: string
      path:
        description: |-
          Path is the filename without extension. This is the only field that can be modified by the user.
          Example: "invoice-2023"
        type: string
      tags:
        description: Tags are optional tags for categorization and search
        items:
          type: string
        type: array
      title:
        description: Title is the user-defined title for the file
        type: string
      type:
        allOf:
        - $ref: '#/definitions/models.FileType'
        description: Type represents the category of the file (image, document, etc.)
      updated_at:
        description: UpdatedAt is when the file was last updated
        type: string
      uuid:
        type: string
    type: object
  models.FileType:
    enum:
    - image
    - document
    - video
    - audio
    - archive
    - other
    type: string
    x-enum-varnames:
    - FileTypeImage
    - FileTypeDocument
    - FileTypeVideo
    - FileTypeAudio
    - FileTypeArchive
    - FileTypeOther
  models.GroupInvite:
    properties:
      created_at:
        type: string
      created_by:
        description: CreatedBy is the user ID of the admin who generated the invite.
        type: string
      expires_at:
        description: ExpiresAt is when the invite link becomes invalid.
        type: string
      group_id:
        description: GroupID references the group this invite is for.
        type: string
      id:
        type: string
      token:
        description: Token is a cryptographically random, URL-safe string used in
          the invite link.
        type: string
      used_at:
        description: UsedAt is when the invite was accepted (null if unused).
        type: string
      used_by:
        description: UsedBy is the user ID of the person who accepted the invite (null
          if unused).
        type: string
      uuid:
        type: string
    type: object
  models.GroupMembership:
    properties:
      group_id:
        description: GroupID references the location group this membership belongs
          to.
        type: string
      id:
        type: string
      joined_at:
        description: JoinedAt is when the user joined the group.
        type: string
      member_user_id:
        description: |-
          MemberUserID references the user who is a member of the group.
          Named MemberUserID (not UserID) to make it explicit that this is the
          *subject* of the membership row — the user being admitted to the
          group — and not metadata about who created the membership. Use
          the same helper `WithCreatedByUserID` pattern that other entities
          use when you need the creator-of-record; it's a separate concept.
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.GroupRole'
        description: Role is the user's role within this group (admin or user).
      uuid:
        type: string
    type: object
  models.GroupRole:
    enum:
    - admin
    - user
    type: string
    x-enum-varnames:
    - GroupRoleAdmin
    - GroupRoleUser
  models.Location:
    properties:
      address:
        type: string
      id:
        type: string
      name:
        type: string
      uuid:
        type: string
    type: object
  models.LocationGroup:
    properties:
      created_at:
        type: string
      created_by:
        description: CreatedBy is the user ID of the group creator.
        type: string
      icon:
        description: |-
          Icon is an optional emoji from the curated set in
          models.ValidGroupIcons. Empty string means "no icon". Issue #1255.
        type: string
      id:
        type: string
      main_currency:
        description: |-
          MainCurrency is the ISO-4217 code the group values its inventory in. It is
          a property of the group (not the user) because a user can belong to
          groups valued in different currencies. Admins change it via the group's
          update endpoint; changing it triggers a reprice of the group's commodities.
        type: string
      name:
        description: Name is a human-readable display name visible only to group members.
        type: string
      slug:
        description: |-
          Slug is a non-human-readable, randomly generated identifier used in URLs.
          It must be infeasible to guess or brute-force (22+ chars, base64url).
          Immutable after creation (this decision may be revisited — see issue #1219 §2).
        type: string
      status:
        allOf:
        - $ref: '#/definitions/models.LocationGroupStatus'
        description: Status indicates whether the group is active or pending deletion.
      updated_at:
        type: string
      uuid:
        type: string
    type: object
  models.LocationGroupStatus:
    enum:
    - active
    - pending_deletion
    type: string
    x-enum-varnames:
    - LocationGroupStatusActive
    - LocationGroupStatusPendingDeletion
  models.RestoreOperation:
    properties:
      area_count:
        type: integer
      binary_data_size:
        type: integer
      commodity_count:
        type: integer
      completed_date:
        type: string
      created_date:
        type: string
      description:
        type: string
      error_count:
        type: integer
      error_message:
        type: string
      export_id:
        type: string
      file_count:
        type: integer
      id:
        type: string
      image_count:
        type: integer
      invoice_count:
        type: integer
      location_count:
        description: Statistics
        type: integer
      manual_count:
        type: integer
      options:
        $ref: '#/definitions/models.RestoreOptions'
      started_date:
        type: string
      status:
        $ref: '#/definitions/models.RestoreStatus'
      steps:
        description: Related steps (not stored in DB, loaded separately)
        items:
          $ref: '#/definitions/models.RestoreStep'
        type: array
      uuid:
        type: string
    type: object
  models.RestoreOptions:
    properties:
      dry_run:
        type: boolean
      include_file_data:
        type: boolean
      strategy:
        type: string
    type: object
  models.RestoreStatus:
    enum:
    - pending
    - running
    - completed
    - failed
    type: string
    x-enum-varnames:
    - RestoreStatusPending
    - RestoreStatusRunning
    - RestoreStatusCompleted
    - RestoreStatusFailed
  models.RestoreStep:
    properties:
      created_date:
        type: string
      duration:
        description: Duration in milliseconds
        type: integer
      id:
        type: string
      name:
        type: string
      reason:
        description: Reason for error or skip
        type: string
      restore_operation_id:
        type: string
      result:
        $ref: '#/definitions/models.RestoreStepResult'
      updated_date:
        type: string
      uuid:
        type: string
    type: object
  models.RestoreStepResult:
    enum:
    - todo
    - in_progress
    - success
    - error
    - skipped
    type: string
    x-enum-varnames:
    - RestoreStepResultTodo
    - RestoreStepResultInProgress
    - RestoreStepResultSuccess
    - RestoreStepResultError
    - RestoreStepResultSkipped
  models.SettingsObject:
    properties:
      defaultDateFormat:
        type: string
      showDebugInfo:
        type: boolean
      theme:
        type: string
    type: object
  models.Tag:
    properties:
      color:
        allOf:
        - $ref: '#/definitions/models.TagColor'
        description: Color is one of the curated TagColor values.
      created_at:
        type: string
      id:
        type: string
      label:
        description: Label is the human-readable display name.
        type: string
      slug:
        description: |-
          Slug is the kebab-cased identifier referenced from
          commodities.tags / files.tags JSONB arrays. Unique per group.
        type: string
      updated_at:
        type: string
      uuid:
        type: string
    type: object
  models.TagColor:
    enum:
    - amber
    - green
    - blue
    - orange
    - red
    - muted
    type: string
    x-enum-varnames:
    - TagColorAmber
    - TagColorGreen
    - TagColorBlue
    - TagColorOrange
    - TagColorRed
    - TagColorMuted
  models.User:
    properties:
      created_at:
        type: string
      default_group_id:
        description: |-
          DefaultGroupID is the user's preferred landing group after login.
          Nullable: when unset, the login flow falls back to "first group the user
          created, else first group they were invited to" (#1263). ON DELETE SET NULL
          so removing a group silently clears the preference instead of blocking the delete.
        type: string
      email:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      last_login_at:
        type: string
      name:
        type: string
      updated_at:
        type: string
      uuid:
        type: string
    type: object
  registry.TagStats:
    properties:
      files_tagged:
        type: integer
      files_untagged:
        type: integer
      items_tagged:
        type: integer
      items_untagged:
        type: integer
      tags_total:
        type: integer
    type: object
  registry.TagUsage:
    properties:
      commodities:
        type: integer
      files:
        type: integer
    type: object
info:
  contact:
    email: ask@artprima.cz
    name: Inventario Support
    url: https://github.com/denisvmedia/inventario/issues
  description: This is an Inventario daemon.
  license:
    name: MIT
  title: Inventario API
  version: "1.0"
paths:
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Change the authenticated user's password. All existing sessions
        are invalidated on success.
      parameters:
      - description: Change password request
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Change password
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user with email and password. Issues an access token
        in the response body and sets a refresh token as an httpOnly cookie.
      parameters:
      - description: Login credentials
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.LoginResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized - invalid credentials
          schema:
            type: string
        "403":
          description: Forbidden - account disabled
          schema:
            type: string
        "429":
          description: Too Many Requests - account locked
          schema:
            type: string
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Revoke the current session's access token and clear the refresh
        token cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.LogoutResponse'
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      description: Return the currently authenticated user's profile. Also refreshes
        the CSRF token in the X-CSRF-Token response header.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Get current user
      tags:
      - auth
    put:
      consumes:
      - application/json
      description: |-
        Update the authenticated user's profile. The name field is required;
        default_group_id (#1263) is optional — send null to clear or a
        group UUID the user is a member of to set. Email, role, tenant_id,
        and is_active are ignored even if submitted.
      parameters:
      - description: Profile update request
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/jsonapi.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Update current user profile
      tags:
      - auth
  /auth/refresh:
    post:
      description: Issue a new short-lived access token using the refresh token stored
        in the httpOnly cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apiserver.LoginResponse'
        "401":
          description: Unauthorized - missing, invalid, or expired refresh token
          schema:
            type: string
        "501":
          description: Not Implemented - refresh tokens not supported
          schema:
            type: string
      summary: Refresh access token
      tags:
      - auth
  /currencies:
    get:
      consumes:
      - application/vnd.api+json
      description: get list of supported currencies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
      summary: Get supported currencies
      tags:
      - currencies
  /debug:
    get:
      consumes:
      - application/json
      description: get debug information about file storage, database driver, and
        operating system
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/debug.Info'
      summary: Get debug information
      tags:
      - debug
  /files/download/files/{fileID}:
    get:
      description: Download the original file content by file ID. Requires a valid
        signed URL token.
      parameters:
      - description: File ID
        in: path
        name: fileID
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: File content
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Download original file
      tags:
      - files
  /files/download/thumbnails/{fileID}/{size}:
    get:
      description: Download a JPEG thumbnail for the specified file. Returns a placeholder
        image while the thumbnail is being generated.
      parameters:
      - description: File ID
        in: path
        name: fileID
        required: true
        type: string
      - description: Thumbnail size
        enum:
        - small
        - medium
        in: path
        name: size
        required: true
        type: string
      produces:
      - image/jpeg
      responses:
        "200":
          description: Thumbnail image
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Download file thumbnail
      tags:
      - files
  /forgot-password:
    post:
      consumes:
      - application/json
      description: Send a password-reset link to the given email address. Always returns
        200 to prevent email enumeration.
      parameters:
      - description: Email address
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/apiserver.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            type: string
        "429":
          description: Too Many Requests
          schema:
            type: string
      summary: Request a password reset
      tags:
      - auth
  /g/{groupSlug}/areas:
    get:
      consumes:
      - application/vnd.api+json
      description: get areas, optionally filtered to a single location.
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Restrict the result to areas inside the given location ID. Unknown
          / cross-tenant IDs return an empty list rather than 4xx.
        in: query
        name: location_id
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 50, max 100)
        in: query
        name: per_page
        type: integer
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.AreasResponse'
      summary: List areas
      tags:
      - areas
    post:
      consumes:
      - application/vnd.api+json
      description: add by area data
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Area object
        in: body
        name: area
        required: true
        schema:
          $ref: '#/definitions/jsonapi.AreaRequest'
      produces:
      - application/vnd.api+json
      responses:
        "201":
          description: Area created
          schema:
            $ref: '#/definitions/jsonapi.AreaResponse'
        "404":
          description: Area not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "422":
          description: User-side request problem
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Create a new area
      tags:
      - areas
  /g/{groupSlug}/areas/{areaID}:
    delete:
      consumes:
      - application/vnd.api+json
      description: Delete by area ID
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Area ID
        in: path
        name: areaID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "204":
          description: No content
        "404":
          description: Area not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Delete an area
      tags:
      - areas
    get:
      consumes:
      - application/vnd.api+json
      description: get area by ID
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Area ID
        in: path
        name: areaID
        required: true
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.AreaResponse'
      summary: Get an area
      tags:
      - areas
    put:
      consumes:
      - application/vnd.api+json
      description: Update by area data
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Area ID
        in: path
        name: areaID
        required: true
        type: string
      - description: Area object
        in: body
        name: area
        required: true
        schema:
          $ref: '#/definitions/jsonapi.AreaRequest'
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.AreaResponse'
        "404":
          description: Area not found
          schema:
            $ref: '#/definitions/jsonapi.Errors'
        "422":
          description: User-side request problem
          schema:
            $ref: '#/definitions/jsonapi.Errors'
      summary: Update a area
      tags:
      - areas
  /g/{groupSlug}/commodities:
    get:
      consumes:
      - application/vnd.api+json
      description: get commodities
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 50, max 100)
        in: query
        name: per_page
        type: integer
      - collectionFormat: multi
        description: Filter by commodity type; repeat to OR
        in: query
        items:
          type: string
        name: type
        type: array
      - collectionFormat: multi
        description: Filter by status (in_use, sold, lost, disposed, written_off);
          repeat to OR
        in: query
        items:
          type: string
        name: status
        type: array
      - description: Filter by exact area ID
        in: query
        name: area_id
        type: string
      - description: Case-insensitive substring match on name + short_name
        in: query
        name: q
        type: string
      - description: Include drafts and non-in_use commodities (default false hides
          them)
        in: query
        name: include_inactive
        type: boolean
      - description: Sort field — name|registered_date|purchase_date|current_price|original_price|count,
          prefix with '-' for descending
        in: query
        name: sort
        type: string
      produces:
      - application/vnd.api+json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/jsonapi.CommoditiesResponse'
      summary: List commodities
      tags:
      - commodities
    post:
      consumes:
      - application/vnd.api+json
      description: Add a new commodity
      parameters:
      - description: Group slug
        in: path
        name: groupSlug
        required: true
        type: string
      - description: Commodity object
        in: body
        name: commodity
        required: true
        schema:
          $ref: '#/definitions/jsonapi.CommodityRequest'
      produces:
      - application/vnd.api+json
      responses:
        "201":
          description: Commodity created
          schema:
            $ref: '#/definitions/jsonapi.CommodityResponse'
        "422":
          description: User-side request problem
          schema:
            $ref: '#/definitions/jsonapi.Errors'
