# infra/vm/secrets/secrets.example.yaml
#
# Schema reference for the sops-encrypted bundle the bootstrap reads.
# This file is SAFE TO COMMIT — placeholders only. The real, sops-encrypted
# bundle (infra/vm/secrets/secrets.enc.yaml) is owned by #1854 and is
# .gitignore'd until that issue lands the production layout.
#
# Sops `--output-type json` mode is what bootstrap.sh consumes. The bundle
# must therefore parse as YAML AND survive a YAML→JSON round-trip — keep keys
# simple (no anchors / merges / tags).

admin:
  # Inventario super-admin password used by the chart's setup Job on first
  # install to seed the admin user (idempotent thereafter — the user owns
  # rotation from the app UI). Materialized by
  # infra/vm/scripts/apply-secrets.sh into inv-vcl01-master/inventario-admin
  # under key SETUP_ADMIN_PASSWORD; the master ArgoCD Application points
  # `secrets.existingSecret` at it (#1883). Per-PR previews use a shared
  # well-known dev password inlined in the PR ApplicationSet template.
  #
  # `email` is informational — the chart sources the admin email from
  # values, not from the sops bundle. Keep this field so the bundle stays
  # the single source of truth for "who is the admin" in the docs.
  email: admin@example.invalid
  password: ""

jwt:
  # Runtime JWT signing key for the Inventario app on the PERSISTENT envs
  # (inv-vcl01-master + inv-vcl01-longevity). Materialized by
  # infra/vm/scripts/apply-secrets.sh into the inventario-admin Secret under
  # key INVENTARIO_RUN_JWT_SECRET; the chart loads that whole Secret via
  # envFrom, so the apiserver signs tokens with this value.
  #
  # OPTIONAL but strongly recommended for these long-lived envs. When empty,
  # each apiserver pod generates a fresh RANDOM secret at startup, so every
  # redeploy/restart invalidates all sessions AND makes any back-office MFA
  # enrollment undecryptable (the TOTP secret is encrypted with an HKDF subkey
  # of this value). Set it ONCE and keep it stable — rotating it logs everyone
  # out and invalidates existing back-office MFA enrollments.
  #
  # Accepts a 32+ byte plaintext string or 64+ hex chars. Generate with:
  #   openssl rand -hex 32
  #
  # Per-PR previews (inv-vcl01-pr{N}) are NOT covered — they are disposable and
  # keep the ephemeral per-pod secret.
  secret: ""

tailscale:
  # One-shot reusable auth key from the Tailscale admin console.
  # Used only on first bootstrap; after that tailscaled is authenticated.
  auth_key: ""
  # OAuth client for the Tailscale Kubernetes Operator.
  # Required OAuth scopes (granted in the admin UI at
  # https://login.tailscale.com/admin/settings/oauth — set both checkboxes on
  # one client; the hourly TS device cleanup CronJob in #1858 reuses these
  # same credentials):
  #   - Auth Keys → Write, tag: tag:k8s (operator mints ephemeral auth keys
  #     for proxy pods).
  #   - Devices → Core: Read + Write, tag: tag:k8s (operator manages its own
  #     device record, cleanup CronJob deletes orphaned proxy device records).
  oauth_client_id: ""
  oauth_client_secret: ""
  # MagicDNS suffix of the tailnet — used by helm overlays (#1856) for tls.hosts[].
  tailnet_name: ""

github:
  # GitHub App used by ArgoCD's repo-server (git clone via repo-creds) AND the
  # ApplicationSet PR-generator (list open PRs). Permissions required:
  #   Repository: Contents=Read, Metadata=Read, Pull requests=Read
  # No write permissions. See #1854 for the App creation walkthrough.
  app_id: ""
  app_installation_id: ""
  app_private_key: ""
  # Owner-level URL the repo-creds Secret advertises (matches any repo under it).
  url: https://github.com/denisvmedia

# Velero backup of the persistent longevity namespace (#1865). Consumed by
# infra/vm/vm-install.sh (helm install + the cloud-credentials /
# velero-repo-credentials Secrets). Backend is Cloudflare R2 (S3-compatible).
# Leave the whole block empty to skip the Velero install entirely — the
# preview-env core works without it. Walkthrough: infra/SECRETS.md
# §"Velero / Cloudflare R2".
velero:
  # kopia File System Backup repository password. Materialized as
  # velero/velero-repo-credentials (key repository-password). MUST be set and
  # MUST stay stable forever: a restore on a fresh VM re-derives the kopia repo
  # from this password, so a fresh Velero install with a DIFFERENT password
  # cannot decrypt prior backups. Treat it exactly like the age key — back it
  # up in your password manager, never rotate it after the first backup.
  # Generate once with e.g. `openssl rand -base64 32`.
  encryption_key: ""
  # R2 bucket name (create it in the Cloudflare dashboard → R2).
  s3_bucket: ""
  # R2 S3 API endpoint: https://<accountid>.r2.cloudflarestorage.com
  # (Cloudflare dashboard → R2 → "Use the S3 API" / bucket settings).
  s3_endpoint: ""
  # R2 ignores the region, but the AWS SDK requires a non-empty value.
  # Leave empty to default to "auto" (Cloudflare's documented placeholder).
  s3_region: ""
  # R2 API token (Access Key ID + Secret Access Key) with Object Read & Write
  # on the bucket above. Created under R2 → "Manage R2 API Tokens".
  s3_access_key: ""
  s3_secret_key: ""
