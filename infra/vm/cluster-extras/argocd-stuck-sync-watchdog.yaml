# In-cluster watchdog that recovers ArgoCD preview syncs stuck on an unpullable
# image — it terminates the wedged operation AND re-kicks the follow-up sync, so
# preview environments self-heal without a manual `argocd app terminate-op` /
# `argocd app sync`.
#
# Why this exists:
#   PR previews are generated by the ArgoCD `pullRequest` generator and pin
#   `image.tag` to `sha-<head_short_sha>` the instant the PR head moves —
#   independently of whether that image has been published. docker.yml builds
#   the image asynchronously with `concurrency: cancel-in-progress: true`, so
#   when a second commit is pushed while the first is still building, the
#   first commit's build is CANCELLED and its `sha-<7>` is never published.
#   ArgoCD has meanwhile started a sync at that first SHA; its wave -5 setup
#   Job can never pull the missing image, so the sync operation wedges in
#   `Running` forever (each retry re-creates the Job at the same dead SHA),
#   and ArgoCD never advances to the current head (whose image DOES exist).
#   With the setup Job's 15-min activeDeadlineSeconds x 10 retries, the
#   natural recovery is hours away — effectively stuck until someone runs
#   `argocd app terminate-op` by hand.
#
# What it does (two passes per run, over the preview envs):
#   1. TERMINATE — Applications whose sync operation has been `Running` longer
#      than WEDGE_THRESHOLD_SECONDS AND that have a workload pod stuck in
#      ImagePullBackOff/ErrImagePull: terminate the op (patch
#      status.operationState.phase = Terminating — what `argocd app terminate-op`
#      does). This un-sticks an op wedged on a never-published `sha-<7>`.
#   2. RESYNC — Applications that are OutOfSync with a Failed/Error op and
#      nothing currently running: request a fresh sync (set `.operation` — what
#      `argocd app sync` does). This is the follow-up the terminate pass needs:
#      once an op is terminated (or fails), ArgoCD's automated `selfHeal` only
#      retries on a back-off that GROWS with each failure, so a preview can sit
#      Degraded for many minutes even after its image finally publishes. A
#      user-initiated sync bypasses that back-off and picks the now-pullable
#      image up promptly. Across two ~5-min ticks a wedged preview goes
#      terminate -> (next tick) resync -> Healthy, with no manual step.
#
# Why the terminate gate needs two conditions (op age + ImagePullBackOff):
#   The image-pull-stuck pod distinguishes "wedged on a never-published sha-<7>"
#   from "a legitimately slow but progressing sync". Demo deps
#   (postgres/minio/redis) are cached images, so only the app's own `sha-<7>`
#   can trip ImagePullBackOff. The age gate avoids killing a sync that just
#   started. Terminating is safe even if it ever fires on a still-building
#   image: ArgoCD re-syncs the same head and the op age resets, so it can't
#   thrash. The resync pass is likewise only what `selfHeal` would eventually
#   do anyway — just without the punitive back-off — and is scoped to OutOfSync
#   previews, so a Synced/Healthy app is never touched.
#
# Scope:
#   Only acts on Applications whose destination namespace starts with
#   PREVIEW_NS_PREFIX (default `inv-vcl01-`), i.e. the preview envs. It is
#   intentionally NOT scoped away from master/longevity — those never wedge
#   (their image tag only advances via the build-published master-pin), so
#   the ImagePullBackOff condition is never satisfied for them anyway.
#
# Talks to the Kubernetes API directly via the mounted ServiceAccount token
# (curl + jq, mirroring ts-orphan-cleanup) so the image carries no kubectl
# binary / pinned tools image.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-stuck-sync-watchdog
  namespace: argocd
---
# Patch ArgoCD Applications in the argocd namespace: terminate-op (a patch of
# status.operationState.phase) AND request-sync (a patch of .operation). Both
# are a `patch` of the MAIN `applications` resource.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-stuck-sync-watchdog
  namespace: argocd
rules:
  # The Application CRD ships subresources:{} (no /status subresource), so
  # terminating an op is a patch of `status` on the MAIN `applications`
  # resource — exactly what `argocd app terminate-op` does server-side.
  # (If a future ArgoCD ever enables the status subresource, add
  # `applications/status` here and target it in watchdog.sh.)
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-stuck-sync-watchdog
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-stuck-sync-watchdog
subjects:
  - kind: ServiceAccount
    name: argocd-stuck-sync-watchdog
    namespace: argocd
---
# Read pods cluster-wide: preview namespaces (inv-vcl01-pr<N>) are dynamic,
# so the ImagePullBackOff probe can't be bound to a fixed namespace set.
# Read-only; no write anywhere outside the argocd Role above.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-stuck-sync-watchdog-pods-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-stuck-sync-watchdog-pods-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-stuck-sync-watchdog-pods-reader
subjects:
  - kind: ServiceAccount
    name: argocd-stuck-sync-watchdog
    namespace: argocd
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-stuck-sync-watchdog
  namespace: argocd
data:
  watchdog.sh: |
    #!/bin/sh
    # Recover ArgoCD preview syncs stuck on an unpullable image (see header):
    # (1) terminate a wedged op, (2) request a fresh sync to bypass selfHeal
    # back-off. Failures are surfaced via FAILMARK + exit 1 at the end.
    set -eu

    API="https://kubernetes.default.svc"
    SA="/var/run/secrets/kubernetes.io/serviceaccount"
    TOKEN="$(cat "$SA/token")"
    CA="$SA/ca.crt"
    THRESHOLD="${WEDGE_THRESHOLD_SECONDS:-600}"
    NS_PREFIX="${PREVIEW_NS_PREFIX:-inv-vcl01-}"
    # Hardcoded, NOT an env knob: the ServiceAccount/Role/RoleBinding in this
    # manifest are bound to the `argocd` namespace, so overriding this would
    # just RBAC-fail the patches. ArgoCD runs in `argocd` here.
    ARGO_NS="argocd"

    # A failed patch records this marker; it's checked at the end to FAIL the Job
    # so a persistent RBAC/API problem surfaces instead of silently no-op'ing.
    # (The per-app loop runs in a subshell, so a shell flag wouldn't survive —
    # use a file.)
    FAILMARK=/tmp/patch_failed
    rm -f "$FAILMARK"

    # --fail makes a non-2xx (apiserver unreachable / RBAC denied) a non-zero
    # curl exit, so we can tell a real API failure from a valid-but-empty result.
    api_get() {
        curl -sS --fail --cacert "$CA" -H "Authorization: Bearer $TOKEN" "$API$1"
    }

    # Merge-patch an Application; log, and on a non-2xx WARN + set FAILMARK.
    # Args: <api-path> <merge-patch-json> <log-label>
    kube_patch() {
        _code="$(curl -sS -o /tmp/patch.out -w '%{http_code}' --cacert "$CA" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/merge-patch+json" \
            -X PATCH "$API$1" -d "$2" || echo 000)"
        if [ "$_code" = "200" ] || [ "$_code" = "201" ]; then
            echo "  $3 -> HTTP $_code OK"
        else
            echo "  WARN: $3 -> HTTP $_code: $(cat /tmp/patch.out 2>/dev/null)" >&2
            touch "$FAILMARK"
        fi
    }

    # Fetch all Applications. A fetch/RBAC failure must FAIL the run LOUDLY
    # (ERROR + exit 1), never be swallowed into a false "nothing to do" — else
    # the watchdog could silently stop working when the cluster is unhealthy.
    # (`if !` keeps `set -e` from aborting without our message.)
    if ! apps_json="$(api_get "/apis/argoproj.io/v1alpha1/namespaces/$ARGO_NS/applications")"; then
        echo "ERROR: failed to list Applications in '$ARGO_NS' (apiserver unreachable or RBAC denied) — failing the run." >&2
        exit 1
    fi

    # Decide one action per preview app. Emit "name<TAB>ns<TAB>action":
    #   terminate : op Running past THRESHOLD (maybe wedged on an unpullable
    #               image — confirmed below by an ImagePullBackOff pod).
    #   resync    : OutOfSync with a Failed/Error op and nothing running, i.e. it
    #               tried, failed, and is now waiting on selfHeal's growing
    #               back-off; kick a fresh sync so a now-publishable image is
    #               picked up promptly.
    # `try fromdateiso8601 catch empty` drops a malformed startedAt for one app;
    # a jq failure on the already-fetched JSON is a real anomaly left to abort
    # loudly under set -e.
    candidates="$(printf '%s' "$apps_json" | jq -r --argjson thr "$THRESHOLD" --arg pfx "$NS_PREFIX" '
        .items[]
        | select((.spec.destination.namespace // "") | startswith($pfx))
        | . as $a
        | ( if   ($a.status.operationState.phase == "Running")
                 and ((($a.status.operationState.startedAt // empty) | (try fromdateiso8601 catch empty)) < (now - $thr))
            then "terminate"
            elif ($a.status.sync.status == "OutOfSync")
                 and (($a.status.operationState.phase // "") | test("Failed|Error"))
            then "resync"
            else empty end ) as $action
        | "\($a.metadata.name)\t\($a.spec.destination.namespace)\t\($action)"
    ')"

    if [ -z "$candidates" ]; then
        echo "No terminable/resyncable preview apps under '${NS_PREFIX}*'. Nothing to do."
        exit 0
    fi

    printf '%s\n' "$candidates" | while IFS="$(printf '\t')" read -r name ns action; do
        [ -n "$name" ] && [ -n "$ns" ] && [ -n "$action" ] || continue
        app_path="/apis/argoproj.io/v1alpha1/namespaces/$ARGO_NS/applications/$name"

        case "$action" in
        terminate)
            # Only terminate if a workload pod is actually stuck pulling its
            # image (the wedge signal). `|| echo 0` so a vanished namespace is
            # "not stuck", not an error.
            stuck="$( (api_get "/api/v1/namespaces/$ns/pods" | jq '
                [ .items[].status
                  | ((.containerStatuses // []) + (.initContainerStatuses // []))
                  | .[]?
                  | select(((.state.waiting.reason) // "") | test("ImagePullBackOff|ErrImagePull"))
                ] | length') 2>/dev/null || echo 0)"
            if [ "${stuck:-0}" -le 0 ]; then
                echo "app=$name ns=$ns: op Running > ${THRESHOLD}s but no image-pull-stuck pods — leaving it (likely a legitimate slow sync)."
                continue
            fi
            echo "app=$name ns=$ns: op Running > ${THRESHOLD}s with ${stuck} image-pull-stuck pod(s) -> terminating the wedged op."
            # CRD has no /status subresource, so patch status on the main
            # resource (what `argocd app terminate-op` does). The resync pass
            # picks it up on a later tick once the op is no longer Running.
            kube_patch "$app_path" '{"status":{"operationState":{"phase":"Terminating"}}}' "terminate-op"
            ;;
        resync)
            echo "app=$name ns=$ns: OutOfSync with a failed op and nothing running -> requesting a fresh sync (bypasses selfHeal back-off)."
            # Set .operation with no explicit revision -> ArgoCD resolves the
            # app's targetRevision (the current PR head), honoring its sync
            # waves/options. Equivalent to `argocd app sync`.
            kube_patch "$app_path" '{"operation":{"initiatedBy":{"username":"stuck-sync-watchdog"},"sync":{}}}' "request-sync"
            ;;
        esac
    done

    if [ -f "$FAILMARK" ]; then
        rm -f "$FAILMARK"
        echo "One or more Application patches failed (see WARN above) — failing the Job to surface it." >&2
        exit 1
    fi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: argocd-stuck-sync-watchdog
  namespace: argocd
spec:
  # Every 5 minutes — combined with the default 10-min WEDGE_THRESHOLD that
  # bounds recovery to ~10-15 min, vs the hours the natural retry loop takes.
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: argocd-stuck-sync-watchdog
          automountServiceAccountToken: true
          containers:
            - name: watchdog
              image: alpine:3.20
              imagePullPolicy: IfNotPresent
              env:
                # Operation must be Running at least this long before we act,
                # so a freshly-started (legitimate) sync is never touched.
                - name: WEDGE_THRESHOLD_SECONDS
                  value: "600"
                - name: PREVIEW_NS_PREFIX
                  value: "inv-vcl01-"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  apk add --no-cache curl jq >/dev/null
                  exec /bin/sh /script/watchdog.sh
              volumeMounts:
                - name: script
                  mountPath: /script
                  readOnly: true
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
          volumes:
            - name: script
              configMap:
                name: argocd-stuck-sync-watchdog
                defaultMode: 0755
