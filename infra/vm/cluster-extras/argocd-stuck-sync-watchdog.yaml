# In-cluster watchdog that auto-terminates ArgoCD sync operations wedged on an
# unpullable image, so preview environments self-heal without a manual
# `argocd app terminate-op`.
#
# Why this exists:
#   PR previews are generated by the ArgoCD `pullRequest` generator and pin
#   `image.tag` to `sha-<head_short_sha>` the instant the PR head moves —
#   independently of whether that image has been published. docker.yml builds
#   the image asynchronously with `concurrency: cancel-in-progress: true`, so
#   when a second commit is pushed while the first is still building, the
#   first commit's build is CANCELLED and its `sha-<7>` is never published.
#   ArgoCD has meanwhile started a sync at that first SHA; its wave -5 setup
#   Job can never pull the missing image, so the sync operation wedges in
#   `Running` forever (each retry re-creates the Job at the same dead SHA),
#   and ArgoCD never advances to the current head (whose image DOES exist).
#   With the setup Job's 15-min activeDeadlineSeconds x 10 retries, the
#   natural recovery is hours away — effectively stuck until someone runs
#   `argocd app terminate-op` by hand.
#
# What it does:
#   Every few minutes, find Applications whose sync operation has been
#   `Running` longer than WEDGE_THRESHOLD_SECONDS AND that have at least one
#   workload pod stuck in ImagePullBackOff/ErrImagePull, then terminate the
#   operation (patch status.operationState.phase = Terminating — the same
#   thing `argocd app terminate-op` does). With automated `selfHeal` on, the
#   controller then starts a FRESH sync at the current desired head, whose
#   image has by now been published, and the preview comes up.
#
# Why the two conditions together (op age + ImagePullBackOff):
#   The image-pull-stuck pod is the signal that distinguishes "wedged on a
#   never-published sha-<7>" from "a legitimately slow but progressing sync".
#   The demo dependencies (postgres/minio/redis) are cached images, so only
#   the app's own `sha-<7>` image can trip ImagePullBackOff. The age gate
#   avoids killing a sync that just started. Terminating is also safe if it
#   ever fires on a still-building (legitimate) image: ArgoCD just re-syncs
#   at the same head, and because the op's age resets, the watchdog won't
#   re-terminate it until WEDGE_THRESHOLD_SECONDS elapse again — so it can't
#   thrash, and it self-limits.
#
# Scope:
#   Only acts on Applications whose destination namespace starts with
#   PREVIEW_NS_PREFIX (default `inv-vcl01-`), i.e. the preview envs. It is
#   intentionally NOT scoped away from master/longevity — those never wedge
#   (their image tag only advances via the build-published master-pin), so
#   the ImagePullBackOff condition is never satisfied for them anyway.
#
# Talks to the Kubernetes API directly via the mounted ServiceAccount token
# (curl + jq, mirroring ts-orphan-cleanup) so the image carries no kubectl
# binary / pinned tools image.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-stuck-sync-watchdog
  namespace: argocd
---
# Patch ArgoCD Applications in the argocd namespace (read + terminate-op).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-stuck-sync-watchdog
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applications/status"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-stuck-sync-watchdog
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-stuck-sync-watchdog
subjects:
  - kind: ServiceAccount
    name: argocd-stuck-sync-watchdog
    namespace: argocd
---
# Read pods cluster-wide: preview namespaces (inv-vcl01-pr<N>) are dynamic,
# so the ImagePullBackOff probe can't be bound to a fixed namespace set.
# Read-only; no write anywhere outside the argocd Role above.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-stuck-sync-watchdog-pods-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-stuck-sync-watchdog-pods-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-stuck-sync-watchdog-pods-reader
subjects:
  - kind: ServiceAccount
    name: argocd-stuck-sync-watchdog
    namespace: argocd
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-stuck-sync-watchdog
  namespace: argocd
data:
  watchdog.sh: |
    #!/bin/sh
    # Terminate ArgoCD sync ops wedged on an unpullable image (see header).
    set -eu

    API="https://kubernetes.default.svc"
    SA="/var/run/secrets/kubernetes.io/serviceaccount"
    TOKEN="$(cat "$SA/token")"
    CA="$SA/ca.crt"
    THRESHOLD="${WEDGE_THRESHOLD_SECONDS:-600}"
    NS_PREFIX="${PREVIEW_NS_PREFIX:-inv-vcl01-}"
    ARGO_NS="${ARGOCD_NAMESPACE:-argocd}"

    api_get() {
        curl -sS --cacert "$CA" -H "Authorization: Bearer $TOKEN" "$API$1"
    }

    # Candidate apps: operation Running, started older than THRESHOLD seconds,
    # destination namespace under the preview prefix. Emit "name<TAB>namespace".
    candidates="$(api_get "/apis/argoproj.io/v1alpha1/namespaces/$ARGO_NS/applications" \
        | jq -r --argjson thr "$THRESHOLD" --arg pfx "$NS_PREFIX" '
            .items[]
            | select(.status.operationState.phase == "Running")
            | select((.spec.destination.namespace // "") | startswith($pfx))
            | select(((.status.operationState.startedAt // empty) | fromdateiso8601) < (now - $thr))
            | "\(.metadata.name)\t\(.spec.destination.namespace)"
        ')"

    if [ -z "$candidates" ]; then
        echo "No sync operations Running > ${THRESHOLD}s under '${NS_PREFIX}*'. Nothing to do."
        exit 0
    fi

    printf '%s\n' "$candidates" | while IFS="$(printf '\t')" read -r name ns; do
        [ -n "$name" ] && [ -n "$ns" ] || continue

        # Count workload pods stuck pulling their image. `|| echo 0` so a
        # namespace that vanished mid-run (or any transient API error) is
        # treated as "not stuck" rather than aborting the whole run.
        stuck="$( (api_get "/api/v1/namespaces/$ns/pods" | jq '
            [ .items[].status
              | ((.containerStatuses // []) + (.initContainerStatuses // []))
              | .[]?
              | select(((.state.waiting.reason) // "") | test("ImagePullBackOff|ErrImagePull"))
            ] | length') 2>/dev/null || echo 0)"

        if [ "${stuck:-0}" -le 0 ]; then
            echo "app=$name ns=$ns: op Running > ${THRESHOLD}s but no image-pull-stuck pods — leaving it (likely a legitimate slow sync)."
            continue
        fi

        echo "app=$name ns=$ns: op Running > ${THRESHOLD}s with ${stuck} image-pull-stuck pod(s) -> terminating the wedged sync op."
        body='{"status":{"operationState":{"phase":"Terminating"}}}'
        base="/apis/argoproj.io/v1alpha1/namespaces/$ARGO_NS/applications/$name"
        # The stock ArgoCD Application CRD has no /status subresource, so the
        # merge-patch on the main resource updates status. Try the subresource
        # endpoint too in case an install enabled it; whichever isn't backed
        # returns a harmless 404/no-op.
        for ep in "$base" "$base/status"; do
            code="$(curl -sS -o /tmp/patch.out -w '%{http_code}' --cacert "$CA" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/merge-patch+json" \
                -X PATCH "$API$ep" -d "$body" || echo 000)"
            echo "  PATCH ${ep##*/v1alpha1} -> HTTP ${code}"
        done
    done
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: argocd-stuck-sync-watchdog
  namespace: argocd
spec:
  # Every 5 minutes — combined with the default 10-min WEDGE_THRESHOLD that
  # bounds recovery to ~10-15 min, vs the hours the natural retry loop takes.
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: argocd-stuck-sync-watchdog
          automountServiceAccountToken: true
          containers:
            - name: watchdog
              image: alpine:3.20
              imagePullPolicy: IfNotPresent
              env:
                # Operation must be Running at least this long before we act,
                # so a freshly-started (legitimate) sync is never touched.
                - name: WEDGE_THRESHOLD_SECONDS
                  value: "600"
                - name: PREVIEW_NS_PREFIX
                  value: "inv-vcl01-"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  apk add --no-cache curl jq >/dev/null
                  exec /bin/sh /script/watchdog.sh
              volumeMounts:
                - name: script
                  mountPath: /script
                  readOnly: true
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
          volumes:
            - name: script
              configMap:
                name: argocd-stuck-sync-watchdog
                defaultMode: 0755
