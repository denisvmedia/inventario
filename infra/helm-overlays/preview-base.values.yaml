# Shared overlay used by BOTH:
#   - infra/argocd/applicationset-pr.yaml (per-PR previews)
#   - infra/argocd/applicationset-master.yaml (master)
#
# Both Applications layer this file via ArgoCD's helm.valueFiles (referencing
# a second `ref: values` source so the file is pulled from the repo alongside
# the chart). Per-Application dynamic bits — image.tag pinned to the head SHA,
# the tailnet FQDN for ingress.hosts/tls, the per-PR tailscale.com/hostname
# annotation — are layered on top via helm.values (inline). Helm deep-merges
# objects so annotations combine cleanly; arrays (hosts, tls) come from the
# inline layer in full.
#
# Why one shared file instead of separate pr-preview / master overlays:
# the static portion is identical, and putting per-environment values
# (tailnet name) into a file ArgoCD reads from git would break the
# bootstrap.sh `<TAILNET>` substitution that lives at kubectl-apply time
# in infra/argocd/*.yaml. Keeping the static slice tailnet-agnostic here
# is the only consistent design.

image:
  repository: ghcr.io/denisvmedia/inventario
  # image.tag is layered on per-Application: PR Applications pin an
  # immutable `sha-<7>`, the master Application uses the moving `master`
  # tag and overrides pullPolicy to Always so k8s actually re-fetches the
  # digest. We DON'T set image.pullPolicy here on purpose — chart default
  # is IfNotPresent (right for immutable sha tags), and the master
  # Application explicitly overrides to Always for the moving tag.

# Combined-mode Deployment — API + workers in one pod. Single replica works
# for ephemeral previews where state lives in demo.* sidecars.
run:
  all:
    enabled: true
    replicaCount: 1

# In-cluster Postgres / Redis / MinIO for self-contained previews. No external
# dependencies, no persistence. Data is lost on pod restart — by design.
demo:
  postgresql:
    enabled: true
  redis:
    enabled: true
  minio:
    enabled: true

# Bootstrap + migrate runs via the chart's setup Job (templates/job-setup.yaml).
# Idempotent — re-applies safely.
#
# argocdMode=true drops the chart's helm.sh/hook annotation (Helm hooks don't
# map cleanly to ArgoCD phases — PostSync waits for Healthy main; main needs
# migrated schema; deadlock) and adds argocd.argoproj.io/sync-options:
# "Force=true,Replace=true" so ArgoCD can delete-then-create the immutable
# Job on each sync. Job applies in the default sync-wave alongside everything
# else; its existing pg_isready loop in the bootstrap init container handles
# waiting for Postgres. The main Deployment pod CrashLoops on bootstrap.go's
# schema-version guard until the Job has run migrations — same handoff as a
# non-ArgoCD `helm install` with the post-install hook. This mode also drops
# `ttlSecondsAfterFinished` on the Job (template-level) so ArgoCD selfHeal
# doesn't see drift and re-trigger migrations every 24h.
#
# initData.adminPassword: NOT set here. The chart's `env-default` of
# "admin123" fails the binary's password complexity check (≥8 chars +
# uppercase), so each consuming Application must wire a real password:
#   - infra/argocd/applicationset-master.yaml sets
#     `secrets.existingSecret: inventario-admin` so the chart reads
#     SETUP_ADMIN_PASSWORD from the sops-sourced Secret materialized in
#     inv-vcl01-master by infra/vm/scripts/apply-secrets.sh.
#   - infra/argocd/applicationset-pr.yaml inlines the well-known dev
#     password — tailnet-gated PR previews don't merit a per-PR Secret
#     (their namespaces are dynamic; #1883 explicitly accepts a shared
#     plaintext for tearable previews).
setupJob:
  argocdMode: true
  initData:
    # Populate the demo with example locations, areas, commodities, etc. so
    # the preview is interesting to browse. The chart's setup Job (after
    # migrations + admin user) spins up a temporary `inventario run` server
    # inside the Job pod and POSTs to `/api/v1/seed` with the admin email +
    # tenant slug. Idempotent on Helm upgrades (skipped via
    # SETUP_SKIP_SEED_ON_UPGRADE, but each PR preview is a fresh install so
    # we always seed). Negligible extra Job time (~15s).
    seedDatabase: true
    # Also publish the bundled fixture bytes (cover photos, invoices,
    # manuals) into the in-cluster MinIO bucket so items and the Files page
    # look lived-in instead of carrying empty file rows. Safe here: these
    # are tailnet-gated demo/preview namespaces, the embed bundle is ~130 KB,
    # and each install seeds exactly once. Maps to
    # INVENTARIO_SEED_ALLOW_BLOB_UPLOADS on the Job's temporary seed server.
    seedBlobUploads: true

# Defensive guard-rails per #1866: cap aggregate compute/storage/pod-count
# in every PR-preview namespace so one runaway pod can't starve other
# previews sharing the same 16 GiB VM. Sized for the demo bundle below
# (run all + postgres + redis + minio + transient setup / init-data /
# mc-bucket Jobs):
#   - Sum of always-on `limits.cpu` = 500m (inventario run all) + 500m
#     (demo.postgres) + 200m (demo.redis) + 500m (demo.minio) = 1700m;
#     `limits.cpu: "4"` leaves ~2300m headroom, enough for one rolling-
#     update surge replica (+500m) and up to three transient Job pods
#     defaulted by the chart's LimitRange (~500m each).
#   - Sum of always-on `limits.memory` = 512+512+128+512 = 1664Mi;
#     `limits.memory: "4Gi"` leaves ~2.4Gi headroom. WARNING: the
#     worst-case overlap (steady + surge + three Job pods getting the
#     LimitRange-default 512Mi each) lands around 3712Mi, ~384Mi shy of
#     the cap. Bump `limits.memory` (and `requests.memory`) here in
#     lockstep with any new chart-owned container that doesn't override
#     the LimitRange default.
#   - `requests.storage` covers the chart's single 10Gi uploads PVC with
#     room for an operator-applied debug PVC. demo.* PVCs are disabled in
#     this overlay (Postgres/MinIO use emptyDir), so 20Gi is generous.
# The LimitRange defaults from the chart (50m / 64Mi request, 500m /
# 512Mi limit, max 2 CPU / 2Gi) stay intact — they only kick in for ad-
# hoc kubectl-debug pods and the un-resourced init / sidecar containers
# in the chart's argocdMode Jobs.
quota:
  enabled: true
  hard:
    requests.cpu: "2"
    requests.memory: "2Gi"
    limits.cpu: "4"
    limits.memory: "4Gi"
    requests.storage: "20Gi"
    persistentvolumeclaims: "5"
    pods: "30"

# Expose via Tailscale Ingress, NOT LoadBalancer. The TS operator (#1855)
# provisions a tailnet proxy node from the Ingress + `className: tailscale`
# and handles cert termination outside the chart.
service:
  type: ClusterIP
  port: 3333

ingress:
  enabled: true
  className: tailscale
  annotations:
    # http-redirect from :80 to https://<FQDN>/ — built into TS operator,
    # validated in the #1867 spike. tailscale.com/hostname is layered
    # per-Application (PR number for previews, fixed `inv-vcl01-master`
    # for master).
    tailscale.com/http-redirect: "true"
