# ApplicationSet for the single long-lived `master` preview
# (`inv-vcl01-master`).
#
# Why a git-`files` generator and NOT `scmProvider` (the #1885 original):
# the repo owner `denisvmedia` is a GitHub *user*, not an org, and
# ArgoCD's `scmProvider.github` generator only lists *organization* repos
# (`GET /orgs/<name>/repos` → 404 for a user account). So the pre-existing
# scmProvider config never generated the Application on this account — the
# master preview silently disappeared from ArgoCD. The PR ApplicationSet
# sidesteps this by using the `pullRequest` generator (user-compatible),
# but there is no built-in "branch head SHA" generator, so for master we
# thread the head SHA through git instead.
#
# Mechanism (replaces scmProvider's `{{.sha}}`):
#   1. .github/workflows/docker.yml, after publishing the master image,
#      force-pushes a one-file orphan branch `argocd/master-pin` holding
#      `infra/argocd/master-image.json`:
#          { "sha": "<full-master-sha>", "imageTag": "sha-<7>" }
#   2. The git generator below reads that file off `argocd/master-pin` and
#      exposes `{{ .sha }}` / `{{ .imageTag }}`. A master push rewrites the
#      file, so the generated Application's image tag + chart revision
#      change → ArgoCD sees a real manifest diff → auto-syncs. Same
#      "real diff per commit" property #1885 wanted, without the org-only
#      scmProvider.
#   3. The pin branch never re-triggers CI (the docker workflow only fires
#      on push to `master`/tags), so there is no commit loop, and master
#      history stays clean (the SHA lives on a throwaway orphan branch).
#
# Auth: the git generator only needs read access to this one repo, which
# the existing `github-app-creds` repo-creds Secret already grants (the PR
# ApplicationSet relies on the same Secret). No org-scoped permission is
# required, unlike scmProvider.
#
# Consistency: chart + $values are both pinned to `{{ .sha }}` (a real
# master commit), so the chart, its values, and the image tag are all the
# exact commit the image was built from.
#
# Bootstrapping (one-time, post-merge): until the first master build
# creates `argocd/master-pin`, the generator has nothing to read and
# produces no Application. After that branch exists, (re-)run
# infra/vm/bootstrap.sh (or `kubectl apply -f`) so this ApplicationSet is
# registered. See infra/README.md §"master deployment".
#
# `<TAILNET>` is substituted by infra/vm/bootstrap.sh from the sops
# bundle's tailscale.tailnet_name at kubectl apply time.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: inventario-master-preview
  namespace: argocd
spec:
  # Go templates so `{{ .imageTag }}` / `{{ .sha }}` from the pin file
  # resolve in the template below.
  goTemplate: true
  # Fail rendering loudly on any undefined key (e.g. a malformed pin file
  # missing `sha`/`imageTag`) instead of silently emitting `<no value>`
  # and producing a broken Application. Same posture as applicationset-pr.yaml.
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/denisvmedia/inventario
        # CI-maintained pin branch (see header). Carries exactly one file,
        # rewritten on every master image publish.
        revision: argocd/master-pin
        files:
          - path: infra/argocd/master-image.json
        # Match the PR generator's cadence so a master push shows up in the
        # preview within ~a minute rather than the 3-minute default.
        requeueAfterSeconds: 60

  template:
    metadata:
      # Keep the same Application name the static manifest used so existing
      # tooling, dashboards, and links to /applications/inv-vcl01-master keep
      # working. Migration story from the pre-#1885 static Application of the
      # same name is documented in infra/README.md §"master deployment".
      name: inv-vcl01-master
      labels:
        inventario-preview: "true"
    spec:
      project: previews

      # Multi-source: source[0] is the chart pinned to the master commit
      # the image was built from (`{{ .sha }}` from the pin file); source[1]
      # provides the repo at that same commit for $values lookups so
      # valueFiles can reference files outside the chart path. Pinning both
      # to `{{ .sha }}` keeps chart + values + image consistent at the exact
      # commit the image was built from.
      sources:
        - repoURL: https://github.com/denisvmedia/inventario
          targetRevision: '{{ .sha }}'
          path: helm/inventario
          helm:
            valueFiles:
              - $values/infra/helm-overlays/preview-base.values.yaml
            # `{{ .imageTag }}` is the immutable `sha-<7>` tag docker.yml
            # published for this commit (see the pin file). The tag is
            # immutable per commit, so we inherit the chart's default
            # `IfNotPresent` pullPolicy — same posture as the PR
            # ApplicationSet, and unlike the pre-#1885 static manifest's
            # `pullPolicy: Always` (which existed only to bust the cache
            # behind the mutable `master` tag).
            values: |
              image:
                tag: '{{ .imageTag }}'
              # Source the admin seed password from the sops bundle (#1883).
              # `inventario-admin` is materialized in this namespace by
              # infra/vm/scripts/apply-secrets.sh from admin.password in
              # the encrypted bundle. The chart's setup Job reads
              # SETUP_ADMIN_PASSWORD from it; runtime workloads slurp the
              # rest of envFrom unchanged (the demo.* stack provides DSNs
              # inline via the deployment's env: block). When the bundle
              # provides jwt.secret / file_signing.key / oauth_state.key, the
              # same Secret also carries the matching INVENTARIO_RUN_JWT_SECRET /
              # INVENTARIO_RUN_FILE_SIGNING_KEY / INVENTARIO_RUN_OAUTH_STATE_KEY
              # so the apiserver's signing material (durable sessions +
              # back-office MFA, signed file URLs, in-flight OAuth state) is
              # stable across restarts (#1943); absent any, the apiserver falls
              # back to a random per-restart value for that key.
              secrets:
                existingSecret: inventario-admin
              # AI-vision photo-scan (#1976): enable Claude on this persistent
              # env. The API key is NOT inlined here — apply-secrets.sh
              # materializes it into the inventario-admin Secret from
              # `anthropic.api_key` in the sops bundle, and the chart loads it
              # via envFrom. ⚠️ ORDERING: the apiserver fails to boot when
              # provider=anthropic but the key env is empty (intentional
              # fail-loud in wireCommodityScan). Fill anthropic.api_key in the
              # bundle and run apply-secrets.sh BEFORE this commit syncs, or
              # this env CrashLoops. Flip to `none`/`mock` to defer the key.
              aivision:
                provider: anthropic
              ingress:
                annotations:
                  tailscale.com/hostname: inv-vcl01-master
                hosts:
                  - host: 'inv-vcl01-master.<TAILNET>.ts.net'
                    paths:
                      - path: /
                        pathType: Prefix
                tls:
                  - hosts:
                      - 'inv-vcl01-master.<TAILNET>.ts.net'
        - repoURL: https://github.com/denisvmedia/inventario
          targetRevision: '{{ .sha }}'
          ref: values

      destination:
        server: https://kubernetes.default.svc
        namespace: inv-vcl01-master

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        # Re-attempt a failed sync with backoff so a master push self-heals
        # across the same build/deploy race the PR previews hit: the pin file
        # flips to the new sha-<7> as soon as the image publish job force-
        # pushes it, but if a sync fires against an image that isn't fully
        # propagated yet the setup Job fails fast (activeDeadlineSeconds) and
        # retry re-syncs until it's pullable. Mirrors applicationset-pr.yaml.
        retry:
          limit: 10
          backoff:
            duration: 15s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
