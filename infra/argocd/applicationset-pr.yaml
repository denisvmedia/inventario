# ApplicationSet with GitHub PR generator. Creates one Application per open
# PR labeled `preview` on denisvmedia/inventario; removes the Application
# (and prunes its resources) when the label drops off or the PR closes.
#
# Authenticates via `appSecretName: github-app-creds` (Secret created by
# infra/vm/scripts/apply-secrets.sh from the sops bundle's github.app_*).
#
# `<TAILNET>` is the placeholder substituted by infra/vm/bootstrap.sh before
# kubectl apply, using tailscale.tailnet_name from the sops bundle.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: inventario-pr-previews
  namespace: argocd
spec:
  # Switch from the default fasttemplate engine to Go templates so we can use
  # `{{.number}}` / `{{.head_sha}}` / `{{.head_short_sha_7}}` syntax in the
  # template below. Without this, fasttemplate would substitute `{{number}}`
  # (no dot) and would silently pass `{{.number}}` through literally, breaking
  # Application name validation (RFC 1123 forbids `{}` chars).
  goTemplate: true
  # Fail rendering loudly on any undefined key in the template (e.g. a typo
  # like `{{.numbr}}` or a PR generator field rename in a future ArgoCD
  # version). Default behavior would emit `<no value>` and silently produce
  # broken Applications that fail at apply or — worse — succeed with
  # malformed resource names.
  goTemplateOptions:
    - missingkey=error
  generators:
    - pullRequest:
        github:
          owner: denisvmedia
          repo: inventario
          labels:
            - preview
          appSecretName: github-app-creds
        requeueAfterSeconds: 60

  template:
    metadata:
      name: 'inv-vcl01-pr{{.number}}'
      # Cascade-prune the Application's resources when the PR is unlabeled or
      # closed and the generator drops it. Without this finalizer the
      # ApplicationSet deletes only the Application object and leaves the
      # whole namespace's workloads (Deployments, demo Postgres/MinIO/Redis,
      # the Tailscale Ingress) orphaned — which is why stale inv-vcl01-pr*
      # namespaces used to pile up. Safe to enable now that
      # setupJob.activeDeadlineSeconds (helm) stops a stuck image pull from
      # wedging the sync op and thereby deadlocking this very finalizer.
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      labels:
        inventario-preview: "true"
        inventario-pr: '{{.number}}'
    spec:
      project: previews

      # Multi-source: source[0] is the chart at the PR's head SHA; source[1]
      # provides the repo for $values lookups so valueFiles can reference
      # files outside the chart path (`infra/helm-overlays/...`).
      sources:
        - repoURL: https://github.com/denisvmedia/inventario
          targetRevision: '{{.head_sha}}'
          path: helm/inventario
          helm:
            valueFiles:
              - $values/infra/helm-overlays/preview-base.values.yaml
            # Per-PR dynamic values layered on top of the shared overlay.
            # ApplicationSet substitutes {{.number}} / {{.head_sha}};
            # bootstrap.sh substitutes <TAILNET> at apply time.
            values: |
              image:
                tag: 'sha-{{ .head_short_sha_7 }}'
              # Well-known dev login for tailnet-gated PR previews. Per-PR
              # namespaces are created dynamically by this ApplicationSet,
              # so we can't pre-materialize a per-namespace Secret from the
              # sops bundle the way master does (see
              # infra/argocd/applicationset-master.yaml). #1883 explicitly
              # accepts a shared plaintext for tearable previews — rotation
              # is rare and the URL sits behind a Tailscale ACL.
              setupJob:
                initData:
                  adminPassword: "PreviewAdmin123"
                  # Well-known dev back-office operator login for tailnet-gated PR previews (#1967).
                  # Per-PR namespaces can't pull the sops inventario-admin Secret, so the chart
                  # renders its own Secret from this value (mirrors adminPassword above).
                  backofficeUserPassword: "PreviewOperator123"
              # AI-vision photo-scan (#1976): PR previews run the REAL Anthropic
              # provider so reviewers can test extraction on actual uploaded
              # photos. The key is NOT inlined here (public repo) — emberstack/
              # reflector (installed by vm-install.sh) copies the sops-sourced
              # `inventario-ai-vision` Secret into each inv-vcl01-pr{N} namespace
              # as it is created (see infra/vm/scripts/apply-secrets.sh), and the
              # chart's extraEnvFrom below loads it. ⚠️ Requires anthropic.api_key
              # in the sops bundle: with provider=anthropic and the reflected
              # Secret absent/empty the preview apiserver CrashLoops (fail-loud) —
              # there can be a brief CrashLoop right after namespace creation
              # until reflector copies the Secret — the kubelet then restarts the
              # pod and re-reads it. Flip provider back to `mock` to run keyless
              # with canned data.
              aivision:
                provider: anthropic
                # Public, unauthenticated landing-page photo-scan (#1988) so
                # reviewers can exercise the anonymous "add your first item"
                # AI flow on a preview. Safe here: previews are tailnet-gated
                # and the public endpoint has its own per-IP + global-daily
                # rate limiter on top of the global budget. (The FE Add-Item
                # CTA shows regardless — this only adds the AI accelerator.)
                publicScanEnabled: true
              extraEnvFrom:
                - secretRef:
                    name: inventario-ai-vision
                    optional: true
              ingress:
                annotations:
                  tailscale.com/hostname: 'inv-vcl01-pr{{.number}}'
                hosts:
                  - host: 'inv-vcl01-pr{{.number}}.<TAILNET>.ts.net'
                    paths:
                      - path: /
                        pathType: Prefix
                tls:
                  - hosts:
                      - 'inv-vcl01-pr{{.number}}.<TAILNET>.ts.net'
        - repoURL: https://github.com/denisvmedia/inventario
          targetRevision: '{{.head_sha}}'
          ref: values

      destination:
        server: https://kubernetes.default.svc
        namespace: 'inv-vcl01-pr{{.number}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        # Re-attempt a failed sync with backoff. This is what makes the
        # build/deploy race self-heal: the generator pins image.tag to the PR
        # head's sha-<7> the instant the commit lands, but CI publishes that
        # image a few minutes later. If the setup Job hits its
        # activeDeadlineSeconds before the image exists, the sync fails;
        # retry keeps re-syncing (and requeueAfterSeconds re-renders to the
        # newest head SHA) until the image is published — so the preview
        # converges on its own instead of going stuck-red or, worse,
        # undeletable.
        retry:
          limit: 10
          backoff:
            duration: 15s
            factor: 2
            maxDuration: 3m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
