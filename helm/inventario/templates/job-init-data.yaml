{{- /*
Separate init-data Job for argocdMode (#1884). Runs at sync-wave +5, i.e.
AFTER the app Deployment is Healthy and the schema has been migrated by
the Deployment's `migrate` init container. Creates the default tenant /
admin user (idempotent) and optionally seeds demo data via a temporary
`inventario run` server.

This intentionally lives in a separate template from job-setup.yaml so the
two argocdMode Jobs (bootstrap-only at wave -5, init-data at wave +5)
stay readable. The non-argocdMode path keeps everything in the existing
setup Job (templates/job-setup.yaml) — see that file for the Helm-hook
ordering it relies on.
*/}}
{{- if and .Values.setupJob.enabled .Values.setupJob.argocdMode }}
{{- $fullName := include "inventario.fullname" . -}}
{{- $secretName := include "inventario.secretName" . -}}
{{- $imageTag := default .Chart.AppVersion .Values.image.tag -}}
{{- $redisUrl := include "inventario.redisUrl" . -}}
{{- $usePersistentUploads := and .Values.persistence.enabled (hasPrefix "file://" (include "inventario.uploadLocation" .)) -}}
{{- $jobName := printf "%s-init-data" $fullName | trunc 63 | trimSuffix "-" -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $jobName }}
  labels:
    {{- include "inventario.labels" . | nindent 4 }}
    app.kubernetes.io/component: init-data
  annotations:
    # ArgoCD post-Deployment Job (#1884). Runs after the app Deployment is
    # Healthy (which only happens once its `migrate` init container brings
    # the schema up to date). This Job then calls `inventario db migrate
    # data` to ensure the default tenant / admin row exists, and on a fresh
    # install also seeds demo data via a temporary in-Job `inventario run`
    # server. Idempotent — admin/tenant rows are created with IF NOT
    # EXISTS semantics and the seed step honors SETUP_SKIP_SEED_ON_UPGRADE.
    # Replace=true delete-then-creates the immutable Job on each sync.
    "argocd.argoproj.io/sync-wave": "5"
    "argocd.argoproj.io/sync-options": "Force=true,Replace=true"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "inventario.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: init-data
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "inventario.serviceAccountName" . }}
      restartPolicy: OnFailure
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init-data
          image: {{ printf "%s:%s" .Values.image.repository $imageTag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              export INVENTARIO_DB_DSN="${MIGRATOR_DB_DSN:-$APP_DB_DSN}"
              i=1
              while [ "$i" -le 15 ]; do
                if inventario db migrate data \
                  --default-tenant-name="$INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_NAME" \
                  --default-tenant-slug="$INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_SLUG" \
                  --admin-email="$INVENTARIO_MIGRATE_DATA_ADMIN_EMAIL" \
                  --admin-password="$INVENTARIO_MIGRATE_DATA_ADMIN_PASSWORD" \
                  --admin-name="$INVENTARIO_MIGRATE_DATA_ADMIN_NAME"; then
                  break
                fi
                echo "Initial data attempt $i failed, retrying in 2 seconds..."
                i=$((i + 1))
                sleep 2
              done
              if [ "$i" -gt 15 ]; then
                echo "Initial data setup failed after 15 attempts"
                exit 1
              fi

              if [ "${SEED_DATABASE:-false}" != "true" ]; then
                echo "Skipping database seeding"
                exit 0
              fi

              if [ "${SETUP_SKIP_SEED_ON_UPGRADE:-false}" = "true" ]; then
                echo "Skipping database seeding during upgrade to avoid duplicate demo data"
                exit 0
              fi

              export INVENTARIO_DB_DSN="${INVENTARIO_SEED_DB_DSN:-$APP_DB_DSN}"
              seed_addr="${INVENTARIO_RUN_ADDR:-:3333}"
              case "$seed_addr" in
                :*)
                  seed_url="http://127.0.0.1${seed_addr}"
                  ;;
                0.0.0.0:*)
                  seed_url="http://127.0.0.1:${seed_addr#*:}"
                  ;;
                localhost:*|127.0.0.1:*)
                  seed_url="http://${seed_addr}"
                  ;;
                *)
                  echo "Unsupported INVENTARIO_RUN_ADDR '$seed_addr' for in-job seeding; falling back to http://127.0.0.1:3333"
                  seed_url="http://127.0.0.1:3333"
                  ;;
              esac

              inventario run &
              server_pid=$!
              trap 'kill "$server_pid" 2>/dev/null || true; wait "$server_pid" 2>/dev/null || true' EXIT

              j=1
              while [ "$j" -le 30 ]; do
                if curl -sf "${seed_url}/readyz" > /dev/null; then
                  break
                fi
                echo "Waiting for temporary server... attempt $j/30"
                j=$((j + 1))
                sleep 1
              done
              if [ "$j" -gt 30 ]; then
                echo "Temporary server did not become ready for seeding"
                exit 1
              fi

              seed_json=$(printf '{"user_email":"%s","tenant_slug":"%s"}' \
                "$INVENTARIO_MIGRATE_DATA_ADMIN_EMAIL" \
                "$INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_SLUG")
              printf '%s' "$seed_json" | curl -fsS -X POST \
                -H 'Content-Type: application/json' \
                --data-binary @- \
                "${seed_url}/api/v1/seed"
              echo

              kill "$server_pid" 2>/dev/null || true
              wait "$server_pid" 2>/dev/null || true
              trap - EXIT
          envFrom:
            - configMapRef:
                name: {{ $fullName }}-config
            - secretRef:
                name: {{ $secretName }}
          env:
            - name: APP_DB_DSN
              {{- if .Values.demo.postgresql.enabled }}
              value: {{ include "inventario.dbDsn" . | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: INVENTARIO_DB_DSN
              {{- end }}
            - name: MIGRATOR_DB_DSN
              {{- if .Values.demo.postgresql.enabled }}
              value: {{ include "inventario.migratorDsn" . | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MIGRATOR_DB_DSN
                  optional: true
              {{- end }}
            - name: INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_NAME
              value: {{ .Values.setupJob.initData.defaultTenantName | quote }}
            - name: INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_SLUG
              value: {{ .Values.setupJob.initData.defaultTenantSlug | quote }}
            - name: INVENTARIO_MIGRATE_DATA_ADMIN_EMAIL
              value: {{ .Values.setupJob.initData.adminEmail | quote }}
            - name: INVENTARIO_MIGRATE_DATA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: SETUP_ADMIN_PASSWORD
            - name: INVENTARIO_MIGRATE_DATA_ADMIN_NAME
              value: {{ .Values.setupJob.initData.adminName | quote }}
            - name: SEED_DATABASE
              value: {{ ternary "true" "false" .Values.setupJob.initData.seedDatabase | quote }}
            # SETUP_SKIP_SEED_ON_UPGRADE: in non-argocdMode this was driven by
            # .Release.IsUpgrade. ArgoCD doesn't expose Helm's upgrade flag in
            # the same way — and the Job is delete-then-created on every sync
            # under Replace=true regardless. The seed step here is gated by
            # `seedDatabase` alone; operators who don't want re-seeding on
            # subsequent syncs should leave seedDatabase=false in production
            # overlays (the seed itself is also a one-shot via /api/v1/seed
            # which the server only allows for the first install — see
            # /api/v1/seed handler).
            - name: SETUP_SKIP_SEED_ON_UPGRADE
              value: "false"
            # Opt the seed into writing the bundled fixture bytes (cover
            # photos / invoices / manuals) for whatever tenant we seed —
            # not just the well-known `test-org`. Set only here on the
            # Job's temporary seed server, never on the main Deployment,
            # so the public /api/v1/seed surface stays cost-bounded.
            - name: INVENTARIO_SEED_ALLOW_BLOB_UPLOADS
              value: {{ ternary "true" "false" .Values.setupJob.initData.seedBlobUploads | quote }}
            - name: INVENTARIO_SEED_DB_DSN
              {{- if .Values.demo.postgresql.enabled }}
              value: {{ include "inventario.dbDsn" . | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: INVENTARIO_DB_DSN
              {{- end }}
            # Point the temporary seed server at the SAME bucket the app
            # reads from (MinIO s3:// when demo.minio.enabled, the file://
            # uploads PVC otherwise). Hardcoding file:///app/uploads here
            # would strand seed blobs in the Job pod's emptyDir under the
            # MinIO demo, where the app can never read them.
            - name: INVENTARIO_RUN_UPLOAD_LOCATION
              value: {{ include "inventario.uploadLocation" . | quote }}
            {{- if .Values.demo.redis.enabled }}
            - name: INVENTARIO_RUN_TOKEN_BLACKLIST_REDIS_URL
              value: {{ $redisUrl | quote }}
            - name: INVENTARIO_RUN_AUTH_RATE_LIMIT_REDIS_URL
              value: {{ $redisUrl | quote }}
            - name: INVENTARIO_RUN_GLOBAL_RATE_LIMIT_REDIS_URL
              value: {{ $redisUrl | quote }}
            - name: INVENTARIO_RUN_CSRF_REDIS_URL
              value: {{ $redisUrl | quote }}
            - name: INVENTARIO_RUN_EMAIL_QUEUE_REDIS_URL
              value: {{ $redisUrl | quote }}
            {{- end }}
            {{- if .Values.demo.minio.enabled }}
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.demo.minio.rootUser | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.demo.minio.rootPassword | quote }}
            {{- end }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: tmp
              mountPath: /tmp
      containers:
        - name: complete
          image: "busybox:1.36"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "echo \"Init-data complete\" && exit 0"]
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: uploads
          {{- if $usePersistentUploads }}
          persistentVolumeClaim:
            claimName: {{ $fullName }}-uploads
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
{{- end }}
