{{- if not .Values.secrets.existingSecret }}
{{- $redisUrl := include "inventario.redisUrl" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "inventario.secretName" . }}
  labels:
    {{- include "inventario.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret
type: Opaque
data:
  INVENTARIO_DB_DSN: {{ include "inventario.dbDsn" . | b64enc | quote }}
  MIGRATOR_DB_DSN: {{ include "inventario.migratorDsn" . | b64enc | quote }}
  INVENTARIO_RUN_JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  INVENTARIO_RUN_FILE_SIGNING_KEY: {{ .Values.secrets.fileSigningKey | b64enc | quote }}
  INVENTARIO_RUN_TOKEN_BLACKLIST_REDIS_URL: {{ default .Values.secrets.tokenBlacklistRedisUrl $redisUrl | b64enc | quote }}
  INVENTARIO_RUN_AUTH_RATE_LIMIT_REDIS_URL: {{ default .Values.secrets.authRateLimitRedisUrl $redisUrl | b64enc | quote }}
  INVENTARIO_RUN_GLOBAL_RATE_LIMIT_REDIS_URL: {{ default .Values.secrets.globalRateLimitRedisUrl $redisUrl | b64enc | quote }}
  INVENTARIO_RUN_CSRF_REDIS_URL: {{ default .Values.secrets.csrfRedisUrl $redisUrl | b64enc | quote }}
  INVENTARIO_RUN_EMAIL_QUEUE_REDIS_URL: {{ default .Values.secrets.emailQueueRedisUrl $redisUrl | b64enc | quote }}
  INVENTARIO_RUN_SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | b64enc | quote }}
  INVENTARIO_RUN_SENDGRID_API_KEY: {{ .Values.secrets.sendgridApiKey | b64enc | quote }}
  INVENTARIO_RUN_MANDRILL_API_KEY: {{ .Values.secrets.mandrillApiKey | b64enc | quote }}
  AWS_ACCESS_KEY_ID: {{ ternary .Values.demo.minio.rootUser .Values.secrets.awsAccessKeyId .Values.demo.minio.enabled | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ ternary .Values.demo.minio.rootPassword .Values.secrets.awsSecretAccessKey .Values.demo.minio.enabled | b64enc | quote }}
  SETUP_ADMIN_PASSWORD: {{ .Values.setupJob.initData.adminPassword | b64enc | quote }}
  {{- if .Values.setupJob.bootstrap.superuserDsn }}
  SETUP_SUPERUSER_DSN: {{ .Values.setupJob.bootstrap.superuserDsn | b64enc | quote }}
  {{- end }}
{{- end }}
