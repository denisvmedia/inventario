{{- if and .Values.persistence.enabled (hasPrefix "file://" (include "inventario.uploadLocation" .)) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "inventario.fullname" . }}-uploads
  labels:
    {{- include "inventario.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
