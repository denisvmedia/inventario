{{- if .Values.demo.mailpit.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inventario.demoMailpitName" . }}
  labels:
    {{- include "inventario.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "inventario.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: demo-mailpit
  template:
    metadata:
      labels:
        {{- include "inventario.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: demo-mailpit
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mailpit
          image: {{ .Values.demo.mailpit.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            # In-memory ring buffer (no MP_DATABASE → nothing written to disk).
            - name: MP_MAX_MESSAGES
              value: {{ .Values.demo.mailpit.maxMessages | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: smtp
              containerPort: 1025
              protocol: TCP
            - name: http
              containerPort: 8025
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/v1/info
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/info
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.demo.mailpit.resources | nindent 12 }}
{{- end }}
