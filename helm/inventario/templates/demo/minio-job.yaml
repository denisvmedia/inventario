{{- if .Values.demo.minio.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "inventario.demoMinioBucketJobName" . }}
  labels:
    {{- include "inventario.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-minio
  annotations:
    {{- if .Values.setupJob.argocdMode }}
    # ArgoCD: a Helm post-install hook becomes a PostSync hook that runs AFTER
    # the Sync-phase init-data seed Job (sync-wave +5) — so the bucket wouldn't
    # exist when the seed writes blob bytes, leaving size_bytes=0 file rows.
    # Create the bucket as an early Sync-wave resource instead: after the MinIO
    # Deployment (-7), before setup/migrations (-5) and the init-data seed (+5).
    # The mc container's `until mc alias set … sleep 2` loop waits for MinIO.
    argocd.argoproj.io/sync-wave: "-6"
    argocd.argoproj.io/sync-options: "Force=true,Replace=true"
    {{- else }}
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    {{- end }}
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "inventario.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: demo-minio
    spec:
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MC_CONFIG_DIR
              value: /tmp/.mc
          envFrom:
            - secretRef:
                name: {{ include "inventario.demoMinioSecretName" . }}
          volumeMounts:
            - name: mc-config
              mountPath: /tmp/.mc
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set demo {{ include "inventario.minioEndpointUrl" . }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "Waiting for MinIO to become ready..."
                sleep 2
              done
              mc mb --ignore-existing demo/"$MINIO_BUCKET_NAME"
      volumes:
        - name: mc-config
          emptyDir: {}
{{- end }}
