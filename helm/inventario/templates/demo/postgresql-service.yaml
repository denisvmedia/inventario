{{- if .Values.demo.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inventario.demoPostgresName" . }}
  labels:
    {{- include "inventario.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-postgresql
spec:
  selector:
    {{- include "inventario.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: demo-postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
{{- end }}
