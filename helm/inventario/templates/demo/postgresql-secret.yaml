{{- if .Values.demo.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "inventario.demoPostgresSecretName" . }}
  labels:
    {{- include "inventario.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-postgresql
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.demo.postgresql.database | quote }}
  POSTGRES_USER: {{ .Values.demo.postgresql.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.demo.postgresql.password | quote }}
  POSTGRES_MIGRATOR_USER: {{ .Values.demo.postgresql.migratorUser | quote }}
  POSTGRES_MIGRATOR_PASSWORD: {{ .Values.demo.postgresql.migratorPassword | quote }}
{{- end }}
