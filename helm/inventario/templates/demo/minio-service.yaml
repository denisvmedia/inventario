{{- if .Values.demo.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inventario.demoMinioName" . }}
  labels:
    {{- include "inventario.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-minio
spec:
  selector:
    {{- include "inventario.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: demo-minio
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
{{- end }}
