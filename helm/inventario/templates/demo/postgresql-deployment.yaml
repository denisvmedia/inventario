{{- if .Values.demo.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inventario.demoPostgresName" . }}
  labels:
    {{- include "inventario.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-postgresql
  annotations:
    # Bring the demo Postgres up BEFORE the wave--5 bootstrap setup Job,
    # which connects to it on a fresh argocdMode install. Without this the
    # Job's bootstrap can't resolve the demo-postgres service ("no such
    # host"), never goes healthy, and ArgoCD never reaches wave 0 to create
    # Postgres — a deadlock that only bites FRESH installs (existing envs
    # keep a running Postgres across re-syncs). Same #1884 ordering gap as
    # the ServiceAccount (see templates/serviceaccount.yaml). -7 is before
    # the SA (-6) and the Job (-5); every demo-postgres resource shares it
    # so the Secret/ConfigMap/PVC exist when the Deployment starts. Inert
    # under plain `helm install`.
    argocd.argoproj.io/sync-wave: "-7"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "inventario.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: demo-postgresql
  template:
    metadata:
      {{- /*
        recreateOnDeploy (master only): an image-tag-keyed annotation that
        changes every master merge so this pod (and its emptyDir) is recreated
        — wiping demo state so master is fresh each merge. Emits nothing unless
        demo.recreateOnDeploy=true, and FAILS rendering if persistence is on
        (PVC-backed longevity must never be roll-wiped). See _helpers.tpl.
        spec.strategy is already Recreate above (single-writer emptyDir).
      */}}
      {{- $recreate := include "inventario.demoRecreatePodAnnotations" (dict "root" $ "store" "postgresql" "persistenceEnabled" .Values.demo.postgresql.persistence.enabled) }}
      {{- if $recreate }}
      annotations:
        {{- $recreate | nindent 8 }}
      {{- end }}
      labels:
        {{- include "inventario.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: demo-postgresql
    spec:
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: {{ .Values.demo.postgresql.image | quote }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsGroup: 999
            runAsNonRoot: true
            runAsUser: 999
          envFrom:
            - secretRef:
                name: {{ include "inventario.demoPostgresSecretName" . }}
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_INITDB_ARGS
              value: --encoding=UTF8 --lc-collate=C --lc-ctype=C
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ include "inventario.demoPostgresSecretName" . }}
                  key: POSTGRES_USER
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          resources:
            {{- toYaml .Values.demo.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d/01-create-users.sh
              subPath: 01-create-users.sh
              readOnly: true
      volumes:
        - name: postgres-data
          {{- if .Values.demo.postgresql.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "inventario.demoPostgresPvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: postgres-init
          configMap:
            name: {{ include "inventario.demoPostgresInitName" . }}
            defaultMode: 493
{{- end }}
