{{- if and .Values.demo.postgresql.enabled .Values.demo.postgresql.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "inventario.demoPostgresPvcName" . }}
  labels:
    {{- include "inventario.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-postgresql
  annotations:
    # Same early wave as the demo-postgres Deployment that binds it —
    # see postgresql-deployment.yaml (#1884).
    argocd.argoproj.io/sync-wave: "-7"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.demo.postgresql.persistence.size }}
  {{- with .Values.demo.postgresql.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
