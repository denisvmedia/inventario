{{- if .Values.setupJob.enabled }}
{{- $fullName := include "inventario.fullname" . -}}
{{- $secretName := include "inventario.secretName" . -}}
{{- $imageTag := default .Chart.AppVersion .Values.image.tag -}}
{{- $redisUrl := include "inventario.redisUrl" . -}}
{{- $setupHook := .Values.setupJob.hookOverride | default (ternary "post-install,pre-upgrade" "pre-install,pre-upgrade" .Values.demo.postgresql.enabled) -}}
{{- $usePersistentUploads := and .Values.persistence.enabled (hasPrefix "file://" (include "inventario.uploadLocation" .)) -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullName }}-setup
  labels:
    {{- include "inventario.labels" . | nindent 4 }}
    app.kubernetes.io/component: setup
  annotations:
    {{- if .Values.setupJob.argocdMode }}
    # ArgoCD-native ordering for in-place upgrades (#1884). Approach A:
    # this Job is now BOOTSTRAP-ONLY and runs at sync-wave -5 so the
    # migrator DB user exists before the app Deployment's `migrate` init
    # container needs it at wave 0. Schema migrations AND data migrations
    # both moved out of this Job:
    #   - schema migrations → app Deployment(s)' `migrate` init container
    #     (templates/_helpers.tpl: inventario.migrateInitContainer). Pin
    #     migrations to the same image revision that runs the new pod,
    #     eliminating the old-image / new-schema window.
    #   - data migrations + optional seed → separate init-data Job at
    #     sync-wave +5 (templates/job-init-data.yaml), runs after the
    #     Deployment is Healthy and the schema is up to date.
    # Force=true,Replace=true is still required because Jobs are immutable
    # in K8s and need delete-then-create on each sync (new image revision
    # produces a new Job pod that re-runs idempotent bootstrap).
    "argocd.argoproj.io/sync-wave": "-5"
    "argocd.argoproj.io/sync-options": "Force=true,Replace=true"
    {{- else }}
    # Default: helm install / upgrade hooks. Behaves as before for non-
    # ArgoCD consumers (the operator runs `helm` directly).
    "helm.sh/hook": {{ $setupHook | quote }}
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-failed
    {{- end }}
spec:
  backoffLimit: 3
  {{- /*
    Cap the Job's wall-clock so an unpullable image (e.g. a PR preview pinned
    to a sha- tag CI hasn't published yet / has GC'd) FAILS instead of sitting
    in ImagePullBackOff forever. A failed Job fails the sync op rather than
    leaving it Running, which is what otherwise deadlocks the
    resources-finalizer cascade and makes the Application undeletable. See
    values.yaml setupJob.activeDeadlineSeconds for the full rationale.

    Budget depends on what this Job actually does:
      - argocdMode  → bootstrap-only (migrate + init-data/seed run in the
        Deployment's migrate init container and the separate wave +5
        init-data Job), so the setup budget is just setupJob.activeDeadlineSeconds.
      - non-argocd  → this ONE Job runs bootstrap + migrate + init-data +
        (optional) seed sequentially, so its budget must cover BOTH phases.
        Hence the SUM (not the max): the phases run back-to-back, so the seed
        budget (setupJob.initData.activeDeadlineSeconds) is added on top of
        the bootstrap budget rather than competing with it.
    0 on both knobs leaves the cap unset (unbounded, old behavior).
  */}}
  {{- $deadline := int .Values.setupJob.activeDeadlineSeconds }}
  {{- if not .Values.setupJob.argocdMode }}
  {{- $deadline = add $deadline (int .Values.setupJob.initData.activeDeadlineSeconds) }}
  {{- end }}
  {{- if gt $deadline 0 }}
  activeDeadlineSeconds: {{ $deadline }}
  {{- end }}
  {{- if not .Values.setupJob.argocdMode }}
  # Auto-delete the Job 24h after it completes — keeps `kubectl get jobs`
  # clean for `helm install` consumers where the Job is a one-shot hook.
  #
  # Intentionally OMITTED in argocdMode: when ArgoCD's selfHeal=true sees
  # the Job missing (after TTL GC) but present in git, it recreates the
  # resource and migrations re-run every ~24h. Migrations are idempotent
  # so this is harmless but noisy. Keeping the Completed Job in place
  # means selfHeal sees no drift and only re-applies when an actual sync
  # is triggered (new commit, manual sync). Old Jobs are pruned naturally
  # whenever a new commit lands and ArgoCD's Replace=true delete-then-
  # creates them.
  ttlSecondsAfterFinished: 86400
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "inventario.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: setup
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "inventario.serviceAccountName" . }}
      restartPolicy: OnFailure
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- /* Don't emit `initContainers:` with no entries — happens when
             argocdMode=true AND bootstrap.enabled=false. An empty key is
             rejected by the k8s API. */}}
      {{- if or .Values.setupJob.bootstrap.enabled (not .Values.setupJob.argocdMode) }}
      initContainers:
        {{- if .Values.setupJob.bootstrap.enabled }}
        - name: bootstrap
          image: {{ printf "%s:%s" .Values.image.repository $imageTag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              if [ -n "${SETUP_SUPERUSER_DSN:-}" ]; then
                export INVENTARIO_DB_DSN="$SETUP_SUPERUSER_DSN"
              fi
              i=1
              while [ "$i" -le 30 ]; do
                if inventario db bootstrap apply \
                  --username="$INVENTARIO_BOOTSTRAP_USERNAME" \
                  --username-for-migrations="$INVENTARIO_BOOTSTRAP_USERNAME_FOR_MIGRATIONS"; then
                  echo "Bootstrap migrations completed successfully"
                  exit 0
                fi
                echo "Bootstrap attempt $i failed, retrying in 3 seconds..."
                i=$((i + 1))
                sleep 3
              done
              echo "Bootstrap failed after 30 attempts"
              exit 1
          env:
            - name: INVENTARIO_DB_DSN
              {{- if .Values.demo.postgresql.enabled }}
              value: {{ include "inventario.dbDsn" . | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: INVENTARIO_DB_DSN
              {{- end }}
            - name: SETUP_SUPERUSER_DSN
              {{- if .Values.demo.postgresql.enabled }}
              value: {{ include "inventario.superuserDsn" . | quote }}
              {{- else if .Values.setupJob.bootstrap.superuserDsn }}
              value: {{ .Values.setupJob.bootstrap.superuserDsn | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: SETUP_SUPERUSER_DSN
                  optional: true
              {{- end }}
            - name: INVENTARIO_BOOTSTRAP_USERNAME
              value: {{ .Values.setupJob.bootstrap.username | quote }}
            - name: INVENTARIO_BOOTSTRAP_USERNAME_FOR_MIGRATIONS
              value: {{ .Values.setupJob.bootstrap.usernameForMigrations | quote }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        {{- end }}
        {{- if not .Values.setupJob.argocdMode }}
        - name: migrate
          image: {{ printf "%s:%s" .Values.image.repository $imageTag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              export INVENTARIO_DB_DSN="${MIGRATOR_DB_DSN:-$APP_DB_DSN}"
              i=1
              while [ "$i" -le 15 ]; do
                if inventario db migrate up; then
                  echo "Schema migrations completed successfully"
                  exit 0
                fi
                echo "Migration attempt $i failed, retrying in 2 seconds..."
                i=$((i + 1))
                sleep 2
              done
              echo "Schema migrations failed after 15 attempts"
              exit 1
          env:
            - name: APP_DB_DSN
              {{- if .Values.demo.postgresql.enabled }}
              value: {{ include "inventario.dbDsn" . | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: INVENTARIO_DB_DSN
              {{- end }}
            - name: MIGRATOR_DB_DSN
              {{- if .Values.demo.postgresql.enabled }}
              value: {{ include "inventario.migratorDsn" . | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MIGRATOR_DB_DSN
                  optional: true
              {{- end }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        - name: init-data
          image: {{ printf "%s:%s" .Values.image.repository $imageTag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              export INVENTARIO_DB_DSN="${MIGRATOR_DB_DSN:-$APP_DB_DSN}"
              i=1
              while [ "$i" -le 15 ]; do
                if inventario db migrate data \
                  --default-tenant-name="$INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_NAME" \
                  --default-tenant-slug="$INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_SLUG" \
                  --admin-email="$INVENTARIO_MIGRATE_DATA_ADMIN_EMAIL" \
                  --admin-password="$INVENTARIO_MIGRATE_DATA_ADMIN_PASSWORD" \
                  --admin-name="$INVENTARIO_MIGRATE_DATA_ADMIN_NAME"; then
                  break
                fi
                echo "Initial data attempt $i failed, retrying in 2 seconds..."
                i=$((i + 1))
                sleep 2
              done
              if [ "$i" -gt 15 ]; then
                echo "Initial data setup failed after 15 attempts"
                exit 1
              fi

              # Auto-provision the back-office (platform-operator) identity for
              # /backoffice/login when enabled (#1967). Demo/preview only —
              # gated by backofficeUser.enabled. --ensure makes this a no-op
              # (exit 0) whenever ANY operator already exists, including one
              # seeded with a different email than this chart passes: a fresh
              # install (count=0) still CREATES the operator, while an
              # already-bootstrapped env (master/longevity) reports "nothing to
              # do" instead of failing the Job (which would red ArgoCD Degraded).
              # The bootstrap command reuses the INVENTARIO_DB_DSN exported above
              # (migrator DSN).
              if [ "${BACKOFFICE_USER_ENABLED:-false}" = "true" ]; then
                if [ -z "${INVENTARIO_BACKOFFICE_BOOTSTRAP_PASSWORD:-}" ]; then
                  echo "backofficeUser.enabled=true but BACKOFFICE_USER_PASSWORD is empty; refusing to provision an operator with an uncapturable auto-generated password (set setupJob.initData.backofficeUserPassword for PR previews, or the BACKOFFICE_USER_PASSWORD key in secrets.existingSecret / the sops bundle for master+longevity)"
                  exit 1
                fi
                k=1
                while [ "$k" -le 15 ]; do
                  if inventario backoffice bootstrap \
                    --email="$INVENTARIO_BACKOFFICE_BOOTSTRAP_EMAIL" \
                    --name="$INVENTARIO_BACKOFFICE_BOOTSTRAP_NAME" \
                    --role="$INVENTARIO_BACKOFFICE_BOOTSTRAP_ROLE" \
                    --password="$INVENTARIO_BACKOFFICE_BOOTSTRAP_PASSWORD" \
                    --mfa-enforced="$INVENTARIO_BACKOFFICE_BOOTSTRAP_MFA_ENFORCED" \
                    --ensure; then
                    break
                  fi
                  echo "Back-office bootstrap attempt $k failed, retrying in 2 seconds..."
                  k=$((k + 1))
                  sleep 2
                done
                if [ "$k" -gt 15 ]; then
                  echo "Back-office bootstrap failed after 15 attempts"
                  exit 1
                fi
              fi

              if [ "${SEED_DATABASE:-false}" != "true" ]; then
                echo "Skipping database seeding"
                exit 0
              fi

              if [ "${SETUP_SKIP_SEED_ON_UPGRADE:-false}" = "true" ]; then
                echo "Skipping database seeding during Helm upgrade to avoid duplicate demo data"
                exit 0
              fi

              export INVENTARIO_DB_DSN="${INVENTARIO_SEED_DB_DSN:-$APP_DB_DSN}"
              seed_addr="${INVENTARIO_RUN_ADDR:-:3333}"
              case "$seed_addr" in
                :*)
                  seed_url="http://127.0.0.1${seed_addr}"
                  ;;
                0.0.0.0:*)
                  seed_url="http://127.0.0.1:${seed_addr#*:}"
                  ;;
                localhost:*|127.0.0.1:*)
                  seed_url="http://${seed_addr}"
                  ;;
                *)
                  echo "Unsupported INVENTARIO_RUN_ADDR '$seed_addr' for in-job seeding; falling back to http://127.0.0.1:3333"
                  seed_url="http://127.0.0.1:3333"
                  ;;
              esac

              inventario run &
              server_pid=$!
              trap 'kill "$server_pid" 2>/dev/null || true; wait "$server_pid" 2>/dev/null || true' EXIT

              j=1
              while [ "$j" -le 30 ]; do
                if curl -sf "${seed_url}/readyz" > /dev/null; then
                  break
                fi
                echo "Waiting for temporary server... attempt $j/30"
                j=$((j + 1))
                sleep 1
              done
              if [ "$j" -gt 30 ]; then
                echo "Temporary server did not become ready for seeding"
                exit 1
              fi

              seed_json=$(printf '{"user_email":"%s","tenant_slug":"%s"}' \
                "$INVENTARIO_MIGRATE_DATA_ADMIN_EMAIL" \
                "$INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_SLUG")
              printf '%s' "$seed_json" | curl -fsS -X POST \
                -H 'Content-Type: application/json' \
                --data-binary @- \
                "${seed_url}/api/v1/seed"
              echo

              kill "$server_pid" 2>/dev/null || true
              wait "$server_pid" 2>/dev/null || true
              trap - EXIT
          envFrom:
            - configMapRef:
                name: {{ $fullName }}-config
            - secretRef:
                name: {{ $secretName }}
          env:
            # Same as job-init-data.yaml: the seed step boots a throwaway
            # `inventario run` server, which would inherit provider=anthropic
            # from the ConfigMap but has no API key here (extraEnvFrom is
            # Deployment-only), failing the boot (fail-loud). Seeding never uses
            # AI vision — force it off; explicit env overrides envFrom. (#1976)
            - name: INVENTARIO_RUN_AI_VISION_PROVIDER
              value: "none"
            - name: APP_DB_DSN
              {{- if .Values.demo.postgresql.enabled }}
              value: {{ include "inventario.dbDsn" . | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: INVENTARIO_DB_DSN
              {{- end }}
            - name: MIGRATOR_DB_DSN
              {{- if .Values.demo.postgresql.enabled }}
              value: {{ include "inventario.migratorDsn" . | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: MIGRATOR_DB_DSN
                  optional: true
              {{- end }}
            - name: INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_NAME
              value: {{ .Values.setupJob.initData.defaultTenantName | quote }}
            - name: INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_SLUG
              value: {{ .Values.setupJob.initData.defaultTenantSlug | quote }}
            - name: INVENTARIO_MIGRATE_DATA_ADMIN_EMAIL
              value: {{ .Values.setupJob.initData.adminEmail | quote }}
            - name: INVENTARIO_MIGRATE_DATA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: SETUP_ADMIN_PASSWORD
            - name: INVENTARIO_MIGRATE_DATA_ADMIN_NAME
              value: {{ .Values.setupJob.initData.adminName | quote }}
            # Back-office (platform-operator) auto-provisioning (#1967). The
            # shell step above only runs when BACKOFFICE_USER_ENABLED=true.
            # Demo/preview overlays flip backofficeUser.enabled on; production
            # leaves it false and provisions operators manually.
            - name: BACKOFFICE_USER_ENABLED
              value: {{ ternary "true" "false" .Values.backofficeUser.enabled | quote }}
            {{- if .Values.backofficeUser.enabled }}
            - name: INVENTARIO_BACKOFFICE_BOOTSTRAP_EMAIL
              value: {{ .Values.backofficeUser.email | quote }}
            - name: INVENTARIO_BACKOFFICE_BOOTSTRAP_NAME
              value: {{ .Values.backofficeUser.name | quote }}
            - name: INVENTARIO_BACKOFFICE_BOOTSTRAP_ROLE
              value: {{ .Values.backofficeUser.role | quote }}
            - name: INVENTARIO_BACKOFFICE_BOOTSTRAP_MFA_ENFORCED
              value: {{ ternary "true" "false" .Values.backofficeUser.mfaEnforced | quote }}
            - name: INVENTARIO_BACKOFFICE_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: BACKOFFICE_USER_PASSWORD
                  optional: true
            {{- end }}
            - name: SEED_DATABASE
              value: {{ ternary "true" "false" .Values.setupJob.initData.seedDatabase | quote }}
            # See job-init-data.yaml — opt the seed into writing bundled
            # fixture bytes for the seeded tenant. Default off; demo/eval
            # overlays flip it on.
            - name: INVENTARIO_SEED_ALLOW_BLOB_UPLOADS
              value: {{ ternary "true" "false" .Values.setupJob.initData.seedBlobUploads | quote }}
            - name: SETUP_SKIP_SEED_ON_UPGRADE
              value: {{ ternary "true" "false" .Release.IsUpgrade | quote }}
            - name: INVENTARIO_SEED_DB_DSN
              {{- if .Values.demo.postgresql.enabled }}
              value: {{ include "inventario.dbDsn" . | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: INVENTARIO_DB_DSN
              {{- end }}
            # Match the app's bucket so seed blobs land where the app reads
            # them (MinIO s3:// under the demo bundle, file:// PVC otherwise).
            - name: INVENTARIO_RUN_UPLOAD_LOCATION
              value: {{ include "inventario.uploadLocation" . | quote }}
            {{- if .Values.demo.redis.enabled }}
            - name: INVENTARIO_RUN_TOKEN_BLACKLIST_REDIS_URL
              value: {{ $redisUrl | quote }}
            - name: INVENTARIO_RUN_AUTH_RATE_LIMIT_REDIS_URL
              value: {{ $redisUrl | quote }}
            - name: INVENTARIO_RUN_GLOBAL_RATE_LIMIT_REDIS_URL
              value: {{ $redisUrl | quote }}
            - name: INVENTARIO_RUN_CSRF_REDIS_URL
              value: {{ $redisUrl | quote }}
            - name: INVENTARIO_RUN_EMAIL_QUEUE_REDIS_URL
              value: {{ $redisUrl | quote }}
            {{- end }}
            {{- if .Values.demo.minio.enabled }}
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.demo.minio.rootUser | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.demo.minio.rootPassword | quote }}
            {{- end }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: tmp
              mountPath: /tmp
        {{- end }}
      {{- end }}
      containers:
        - name: complete
          image: "busybox:1.36"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "echo \"Setup complete\" && exit 0"]
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: uploads
          {{- if $usePersistentUploads }}
          persistentVolumeClaim:
            claimName: {{ $fullName }}-uploads
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
{{- end }}
