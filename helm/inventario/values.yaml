# ============================================================
# Inventario Helm Chart — values.yaml
# ============================================================

# -- Container image configuration
image:
  # Repository for the Inventario image
  repository: ghcr.io/denisvmedia/inventario
  # Tag defaults to Chart.AppVersion when empty
  tag: ""
  # Pull policy: IfNotPresent | Always | Never
  pullPolicy: IfNotPresent
  # Optional list of image pull secrets
  pullSecrets: []

# ============================================================
# Run topology
# ============================================================
# Controls whether Inventario runs as one combined Deployment
# (`inventario run all`, the default) or as per-role Deployments
# (`run apiserver` + zero or more
# `run workers --workers-only=<group>`).
#
# Exactly ONE of the following must be active:
#   * run.all.enabled=true                (single Deployment)
#   * run.apiserver.enabled=true          (split Deployments —
#     workers are optional; pair with any subset of
#     run.workers.<group>.enabled=true to offload work)
#
# Workers-only renders (any run.workers.<group>.enabled=true while
# run.apiserver.enabled=false) are rejected at template time:
# there is nobody to serve the HTTP API, and the chart-managed
# Service / Ingress / NOTES would dangle.
#
# Enabling run.all together with any split role is also rejected.
#
# Per-role blocks (apiserver + each worker) deep-merge over the
# role's defaults from run.workers.common for workers, and over
# their own block for apiserver/all. Leave a field empty to use
# the default.
run:
  # ----------------------------------------------------------
  # Combined mode (run all): one Deployment, API + every worker.
  # ----------------------------------------------------------
  all:
    enabled: true
    # NOTE: More than 1 replica requires shared file storage
    # (S3/MinIO/GCS/Azure). Local file:// storage does NOT work
    # with replicaCount > 1.
    replicaCount: 1
    podAnnotations: {}
    podLabels: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    priorityClassName: ""
    # Extra args appended after "run all".
    extraArgs: []
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    livenessProbe:
      httpGet:
        path: /healthz
        port: 3333
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /readyz
        port: 3333
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
      # Leave null to disable; set to an int percent to enable.
      targetMemoryUtilizationPercentage: null
      # Additional metrics entries (autoscaling/v2 MetricSpec), for
      # example an external metric exposed by the app's /metrics
      # endpoint. Inventario DOES now ship Prometheus metrics on
      # /metrics (API :3333, each worker :3334) — see the top-level
      # `metrics:` block below. However, HPA on a custom metric still
      # requires a metrics adapter (e.g. prometheus-adapter) to surface
      # those series to the external.metrics.k8s.io API; this chart does
      # not install one, so the list below stays empty by default.
      # metrics:
      #   - type: External
      #     external:
      #       metric:
      #         name: inventario_email_queue_depth
      #         selector:
      #           matchLabels:
      #             worker: media
      #       target:
      #         type: AverageValue
      #         averageValue: "5"
      metrics: []
      behavior: {}

  # ----------------------------------------------------------
  # API-server-only mode (run apiserver). Pair with at least one
  # run.workers.<group>.enabled=true to get a working split
  # deployment.
  # ----------------------------------------------------------
  apiserver:
    enabled: false
    replicaCount: 1
    podAnnotations: {}
    podLabels: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    priorityClassName: ""
    # Extra args appended after "run apiserver".
    extraArgs: []
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    livenessProbe:
      httpGet:
        path: /healthz
        port: 3333
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /readyz
        port: 3333
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: null
      metrics: []
      behavior: {}

  # ----------------------------------------------------------
  # Per-worker-group Deployments. Each group renders its own
  # Deployment + headless Service (probe/metrics) when enabled.
  # Groups consolidate individual worker families sharing an
  # operational profile:
  #   archive       - exports, imports, restores
  #   emails        - SMTP delivery lifecycle
  #   housekeeping  - periodic maintenance (refresh-token GC, …)
  #   media         - thumbnails (CPU/RAM-heavy)
  #
  # CLI identifiers (passed to `run workers --workers-only=<id>`)
  # match the keys below. Legacy per-family names (exports, imports,
  # restores, thumbnails, token-cleanup) are still accepted on the CLI
  # for one release with a deprecation warning.
  # ----------------------------------------------------------
  workers:
    # Shared defaults. Each per-group block deep-merges over these.
    common:
      # Probe/metrics listener port inside the worker container.
      # Passed to workers as --probe-addr=:<probePort>.
      probePort: 3334
      podAnnotations: {}
      podLabels: {}
      nodeSelector: {}
      tolerations: []
      affinity: {}
      priorityClassName: ""
      # Extra args appended after "run workers --workers-only=<id>".
      extraArgs: []
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      livenessProbe:
        httpGet:
          path: /healthz
          port: probe
        initialDelaySeconds: 10
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /readyz
          port: probe
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 5
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: null
        metrics: []
        behavior: {}

    # Per-group overrides. Each block may override any key from
    # run.workers.common. Enable the Deployment with `enabled: true`.
    archive:
      # Bundles exports, imports, and restores. They share the archive
      # code path and a single queue-depth scaling signal.
      # NOTE: Each replica enforces its own app.maxConcurrentRestores
      # (and export/import) limit. Cluster-wide concurrency =
      # replicaCount * maxConcurrent per family. DB-level job locking
      # prevents duplicate work, but keep replicaCount=1 unless your DB
      # sizing supports the multiplied concurrency.
      enabled: false
    emails:
      enabled: false
    housekeeping:
      # Periodic maintenance (refresh-token GC, and follow-up cleanup
      # loops). Replica count should stay at 1; the group is tiny.
      enabled: false
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
    media:
      # Thumbnail generation (and future resize/OCR) is CPU/memory-heavy
      # — bump defaults over run.workers.common.
      enabled: false
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi

# ============================================================
# Metrics / scraping (#843)
# ============================================================
# Prometheus metrics / scraping (#843). The app always serves /metrics on the
# API port (3333) and each worker's probe port (3334); these toggles only
# control how an external Prometheus discovers the pods. Both default OFF.
metrics:
  # Add prometheus.io/* scrape annotations to API + worker pods so a vanilla
  # (operator-less) Prometheus kubernetes_sd job can discover them.
  podAnnotations:
    enabled: false
  # ServiceMonitor for the Prometheus Operator. OFF by default and additionally
  # guarded by a CRD-capability check, so enabling it without the operator is a
  # no-op rather than a render error.
  serviceMonitor:
    enabled: false
    interval: 15s
    scrapeTimeout: 10s
    # Extra labels for the ServiceMonitor (e.g. release: kube-prometheus-stack
    # so the operator selects it).
    labels: {}

# ============================================================
# Service (targets the apiserver endpoint — run.all or run.apiserver).
# ============================================================
service:
  # Service type: ClusterIP | NodePort | LoadBalancer
  type: ClusterIP
  # Port the service listens on (maps to container port 3333)
  port: 3333

# ============================================================
# Ingress
# ============================================================
ingress:
  enabled: false
  # Ingress class name (e.g. "nginx", "traefik")
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/proxy-body-size: "100m"
  hosts:
    - host: inventario.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: inventario-tls
  #   hosts:
  #     - inventario.example.com

# ============================================================
# ServiceAccount
# ============================================================
serviceAccount:
  # Whether to create a dedicated ServiceAccount
  create: true
  # Override the generated name (leave empty to auto-generate)
  name: ""
  annotations: {}

# ============================================================
# Application — non-sensitive settings (go into ConfigMap)
# Source of truth for env var names: docker-compose.yaml
# ============================================================
app:
  # Listen address for the HTTP server
  # Env: INVENTARIO_RUN_ADDR
  addr: ":3333"

  # File upload storage location. Supports:
  #   file:///app/uploads?create_dir=1  (local; requires persistence.enabled=true)
  #   s3://bucket?region=us-east-1      (AWS S3 or S3-compatible)
  #   azblob://container                (Azure Blob)
  #   gs://bucket                       (Google Cloud Storage)
  # When demo.minio.enabled=true this field is overridden automatically.
  # Env: INVENTARIO_RUN_UPLOAD_LOCATION
  uploadLocation: "file:///app/uploads?create_dir=1"

  # Signed file URL expiration duration (e.g. "15m", "1h")
  # Env: INVENTARIO_RUN_FILE_URL_EXPIRATION
  fileUrlExpiration: "15m"

  # Maximum simultaneous export jobs
  # Env: INVENTARIO_RUN_MAX_CONCURRENT_EXPORTS
  maxConcurrentExports: 3

  # Maximum simultaneous import jobs
  # Env: INVENTARIO_RUN_MAX_CONCURRENT_IMPORTS
  maxConcurrentImports: 1

  # Thumbnail generation — max parallel jobs per user
  # Env: INVENTARIO_RUN_THUMBNAIL_MAX_CONCURRENT_PER_USER
  thumbnailMaxConcurrentPerUser: 5

  # Thumbnail generation — max jobs per minute per user
  # Env: INVENTARIO_RUN_THUMBNAIL_RATE_LIMIT_PER_MINUTE
  thumbnailRateLimitPerMinute: 50

  # Thumbnail slot lease duration
  # Env: INVENTARIO_RUN_THUMBNAIL_SLOT_DURATION
  thumbnailSlotDuration: "30m"

  # Public base URL used in transactional email links (required for non-stub email providers)
  # Example: https://inventario.example.com
  # Env: INVENTARIO_RUN_PUBLIC_URL
  publicUrl: ""

  # Allowed CORS origins, comma-separated.
  # Leave empty to deny all cross-origin requests (recommended for production).
  # Env: INVENTARIO_RUN_ALLOWED_ORIGINS
  allowedOrigins: ""

  # Global per-IP API rate limit (requests per window).
  # Only applies to unauthenticated public routes (registration, password-reset,
  # currencies, seed). Auth and protected routes are exempt.
  # Env: INVENTARIO_RUN_GLOBAL_RATE_LIMIT
  globalRateLimit: 1000

  # Global rate limit window duration
  # Env: INVENTARIO_RUN_GLOBAL_RATE_WINDOW
  globalRateWindow: "1h"

  # Disable the global per-IP API rate limit entirely.
  # Set to true for private/internal deployments where rate limiting is handled
  # by an external proxy, or for testing purposes.
  # Env: INVENTARIO_RUN_GLOBAL_RATE_LIMIT_DISABLED
  globalRateLimitDisabled: false

  # Comma-separated trusted proxy CIDRs for real-IP resolution
  # Env: INVENTARIO_RUN_GLOBAL_RATE_TRUSTED_PROXIES
  globalRateTrustedProxies: ""

  # Timezone for the application container
  tz: "UTC"

# ============================================================
# Feature flags — toggle in-development surfaces without rebuilding.
# Each flag flips a corresponding INVENTARIO_RUN_FEATURE_* env var.
# Defaults reflect the maintainer's "ship-on" stance for features that
# have already gone GA; flip to false on operator-managed deployments
# that want the surface dark.
# ============================================================
features:
  # Currency-migration wizard, lock UX, banner, and history (epic #202 /
  # #1553). When false: the FE wizard CTA still renders but the BE
  # /currency-migrations endpoints return 404, the worker is disabled
  # (#1552), and migrations stay inert. Default true since the feature
  # shipped under #1604 — flip off only if your tenant policy requires
  # the surface dark.
  # Env: INVENTARIO_RUN_FEATURE_CURRENCY_MIGRATION
  currencyMigration: true

# ============================================================
# Email — non-sensitive settings (go into ConfigMap)
# ============================================================
email:
  # Provider: stub | smtp | sendgrid | ses | mandrill | mailchimp
  # "stub" logs emails to stdout; no external service needed.
  # Env: INVENTARIO_RUN_EMAIL_PROVIDER
  provider: "stub"

  # Sender address for all transactional emails
  # Env: INVENTARIO_RUN_EMAIL_FROM
  from: ""

  # Reply-To address (optional)
  # Env: INVENTARIO_RUN_EMAIL_REPLY_TO
  replyTo: ""

  # Number of background queue workers
  # Env: INVENTARIO_RUN_EMAIL_QUEUE_WORKERS
  queueWorkers: 5

  # Maximum delivery retries per failed message
  # Env: INVENTARIO_RUN_EMAIL_QUEUE_MAX_RETRIES
  queueMaxRetries: 3

  # Log full verification/reset URLs in stub mode (contains tokens — unsafe in shared logs)
  # Env: INVENTARIO_RUN_LOG_EMAIL_URLS
  logUrls: false

  smtp:
    # Env: INVENTARIO_RUN_SMTP_HOST
    host: ""
    # Env: INVENTARIO_RUN_SMTP_PORT
    port: 587
    # Env: INVENTARIO_RUN_SMTP_USERNAME
    username: ""
    # Env: INVENTARIO_RUN_SMTP_USE_TLS
    useTls: true

  sendgrid:
    # Env: INVENTARIO_RUN_SENDGRID_BASE_URL (leave empty for default)
    baseUrl: ""

  aws:
    # AWS region for SES
    # Env: INVENTARIO_RUN_AWS_REGION
    region: "us-east-1"

  mandrill:
    # Env: INVENTARIO_RUN_MANDRILL_BASE_URL (leave empty for default)
    baseUrl: ""

# ============================================================
# AI vision — photo-scan that prefills the Add-Item form (#1720).
# Non-sensitive knobs live here (ConfigMap); the per-provider API keys are
# secrets — see secrets.aiVisionAnthropicApiKey / secrets.aiVisionOpenaiApiKey.
# ============================================================
aivision:
  # Provider: none | mock | anthropic | openai
  #   none      — feature off; POST .../commodities/scan returns 503.
  #   mock      — deterministic canned result; no network, no API key.
  #   anthropic — Claude vision; REQUIRES secrets.aiVisionAnthropicApiKey.
  #   openai    — GPT-4o vision; REQUIRES secrets.aiVisionOpenaiApiKey.
  # ⚠️ The apiserver fails to boot when a real provider is selected but its key
  # is empty (fail-loud by design). Keep `none` unless the key is wired.
  # Env: INVENTARIO_RUN_AI_VISION_PROVIDER
  provider: "none"

  # Anthropic model id (used when provider=anthropic).
  # Env: INVENTARIO_RUN_AI_VISION_ANTHROPIC_MODEL
  anthropicModel: "claude-sonnet-4-6"

  # Anthropic API base URL override (empty = public api.anthropic.com).
  # Env: INVENTARIO_RUN_AI_VISION_ANTHROPIC_BASE_URL
  anthropicBaseUrl: ""

  # OpenAI model id (used when provider=openai).
  # Env: INVENTARIO_RUN_AI_VISION_OPENAI_MODEL
  openaiModel: "gpt-4o"

  # OpenAI API base URL override (empty = public api.openai.com).
  # Env: INVENTARIO_RUN_AI_VISION_OPENAI_BASE_URL
  openaiBaseUrl: ""

  # Per-call upstream timeout (e.g. "20s").
  # Env: INVENTARIO_RUN_AI_VISION_TIMEOUT
  timeout: "20s"

  # Max photos accepted per scan request.
  # Env: INVENTARIO_RUN_AI_VISION_MAX_PHOTOS
  maxPhotos: 5

  # Max bytes accepted per photo (default 10 MiB).
  # Env: INVENTARIO_RUN_AI_VISION_MAX_PHOTO_BYTES
  maxPhotoBytes: 10485760

  # Per-user hourly scan rate limit (0 disables the limit).
  # Env: INVENTARIO_RUN_AI_VISION_RATE_LIMIT_PER_HOUR
  rateLimitPerHour: 30

# ============================================================
# Extra envFrom sources appended verbatim to every app container's
# `envFrom` (combined, apiserver, and worker Deployments). Each entry is a
# standard EnvFromSource (secretRef / configMapRef). Use to inject env from
# Secrets/ConfigMaps this chart does not manage.
#
# PR previews (#1976) use this to pull the AI-vision API key: a secret
# reflector (emberstack/reflector) copies a sops-sourced Secret into each
# dynamically-created inv-vcl01-pr{N} namespace as `inventario-ai-vision`,
# and the deployment reads it via this list. `optional: true` keeps the pod
# schedulable before the reflected copy lands (the app still fails loud on an
# empty key, so set the key — see infra/argocd/applicationset-pr.yaml).
# ============================================================
extraEnvFrom: []
#  - secretRef:
#      name: inventario-ai-vision
#      optional: true

# ============================================================
# Secrets
# ============================================================
secrets:
  # Name of an EXISTING Kubernetes Secret to use instead of creating one.
  # When set, all inline values below are IGNORED.
  # The existing secret must contain the following keys (all optional except noted):
  #
  #   INVENTARIO_DB_DSN                      (REQUIRED unless demo.postgresql.enabled)
  #   MIGRATOR_DB_DSN                        (recommended for setupJob; falls back to INVENTARIO_DB_DSN when omitted)
  #   INVENTARIO_RUN_JWT_SECRET              (REQUIRED — min 32 chars)
  #   INVENTARIO_RUN_FILE_SIGNING_KEY        (REQUIRED — min 32 chars)
  #   INVENTARIO_RUN_TOKEN_BLACKLIST_REDIS_URL   (optional)
  #   INVENTARIO_RUN_AUTH_RATE_LIMIT_REDIS_URL   (optional)
  #   INVENTARIO_RUN_GLOBAL_RATE_LIMIT_REDIS_URL (optional)
  #   INVENTARIO_RUN_CSRF_REDIS_URL              (optional)
  #   INVENTARIO_RUN_EMAIL_QUEUE_REDIS_URL       (optional)
  #   INVENTARIO_RUN_SMTP_PASSWORD               (required for smtp provider)
  #   INVENTARIO_RUN_SENDGRID_API_KEY            (required for sendgrid provider)
  #   INVENTARIO_RUN_MANDRILL_API_KEY            (required for mandrill/mailchimp provider)
  #   INVENTARIO_RUN_AI_VISION_ANTHROPIC_API_KEY (required when aivision.provider=anthropic)
  #   INVENTARIO_RUN_AI_VISION_OPENAI_API_KEY    (required when aivision.provider=openai)
  #   SETUP_ADMIN_PASSWORD                       (required by job-setup if setupJob.enabled)
  #   SETUP_SUPERUSER_DSN                        (optional; used when setupJob.bootstrap.superuserDsn is managed outside the chart)
  #   AWS_ACCESS_KEY_ID                          (required for S3/MinIO upload)
  #   AWS_SECRET_ACCESS_KEY                      (required for S3/MinIO upload)
  existingSecret: ""

  # Inline secret values — stored in a Kubernetes Secret created by this chart.
  # NEVER commit real values here. Pass via --set-string or a secrets manager.

  # PostgreSQL connection DSN for the application (app user, not superuser).
  # Automatically constructed from demo.postgresql.* when demo.postgresql.enabled=true.
  # Env: INVENTARIO_DB_DSN
  dbDsn: ""

  # PostgreSQL connection DSN for schema migrations and initial data setup.
  # Automatically constructed from demo.postgresql.migrator* when demo.postgresql.enabled=true.
  # Falls back to dbDsn when left empty.
  # Env: MIGRATOR_DB_DSN
  migratorDbDsn: ""

  # JWT signing secret. Minimum 32 characters.
  # Generate with: openssl rand -hex 32
  # Env: INVENTARIO_RUN_JWT_SECRET
  jwtSecret: ""

  # File URL signing key. Minimum 32 characters.
  # Generate with: openssl rand -hex 32
  # Env: INVENTARIO_RUN_FILE_SIGNING_KEY
  fileSigningKey: ""

  # Redis URLs (leave empty to use in-memory fallback — NOT recommended for production).
  # Automatically set to demo Redis service when demo.redis.enabled=true.
  # Format: redis://:password@host:port/db
  tokenBlacklistRedisUrl: ""     # Env: INVENTARIO_RUN_TOKEN_BLACKLIST_REDIS_URL
  authRateLimitRedisUrl: ""      # Env: INVENTARIO_RUN_AUTH_RATE_LIMIT_REDIS_URL
  globalRateLimitRedisUrl: ""    # Env: INVENTARIO_RUN_GLOBAL_RATE_LIMIT_REDIS_URL
  csrfRedisUrl: ""               # Env: INVENTARIO_RUN_CSRF_REDIS_URL
  emailQueueRedisUrl: ""         # Env: INVENTARIO_RUN_EMAIL_QUEUE_REDIS_URL

  # Email provider secrets
  smtpPassword: ""               # Env: INVENTARIO_RUN_SMTP_PASSWORD
  sendgridApiKey: ""             # Env: INVENTARIO_RUN_SENDGRID_API_KEY
  mandrillApiKey: ""             # Env: INVENTARIO_RUN_MANDRILL_API_KEY

  # AI-vision provider secrets (#1720). Required only for the matching
  # aivision.provider; empty otherwise. See the `aivision:` block above.
  aiVisionAnthropicApiKey: ""    # Env: INVENTARIO_RUN_AI_VISION_ANTHROPIC_API_KEY
  aiVisionOpenaiApiKey: ""       # Env: INVENTARIO_RUN_AI_VISION_OPENAI_API_KEY

  # S3/MinIO credentials (required when app.uploadLocation uses s3://)
  # Automatically set from demo.minio.* when demo.minio.enabled=true.
  awsAccessKeyId: ""             # Env: AWS_ACCESS_KEY_ID
  awsSecretAccessKey: ""         # Env: AWS_SECRET_ACCESS_KEY

# ============================================================
# Setup Job — runs as a Helm pre-upgrade hook and as a pre-install hook by default.
# When demo.postgresql.enabled=true, fresh installs switch the setup job to post-install
# so the in-cluster demo database exists before bootstrap/migrate runs.
# Executes three sequential init containers:
#   1. bootstrap  — creates DB users (requires superuser DSN)
#   2. migrate    — applies schema migrations (idempotent)
#   3. init-data  — creates default tenant + admin user (idempotent)
# ============================================================
setupJob:
  enabled: true

  # Override the Helm hook annotation on the setup Job. The chart default is
  # `post-install,pre-upgrade` when demo.postgresql.enabled, or
  # `pre-install,pre-upgrade` otherwise. Set to a single hook (e.g.
  # `post-install`) to avoid one of the two phases. Empty preserves default.
  # NOTE: for ArgoCD deployments, prefer `argocdMode: true` below over
  # tweaking the helm hook — Helm hooks don't map cleanly to ArgoCD phases
  # (PreSync hooks run before non-hook resources exist; PostSync hooks
  # require Healthy main resources, deadlocking with schema-dependent apps).
  hookOverride: ""

  # ArgoCD-native mode (#1884 approach A — in-place upgrades safe across
  # new migrations). When true:
  #   - the `helm.sh/hook` annotation is dropped (Job is a regular
  #     Sync-phase resource);
  #   - the setup Job (templates/job-setup.yaml) becomes BOOTSTRAP-ONLY
  #     and runs at sync-wave -5, before the app Deployment;
  #   - schema migrations run from a `migrate` init container injected
  #     into every app Deployment (combined / apiserver / workers) at
  #     wave 0, coupling the schema upgrade to the same image revision
  #     the new pods are running — no old-image-vs-new-schema window;
  #   - data migrations + optional seed move to a separate init-data
  #     Job (templates/job-init-data.yaml) at sync-wave +5, which only
  #     runs after the Deployment is Healthy;
  #   - all Jobs carry `argocd.argoproj.io/sync-options:
  #     Force=true,Replace=true` so ArgoCD delete-then-creates the
  #     immutable Job objects on each sync.
  #
  # Migrations must remain backward-compatible with the previously
  # deployed image — during the rolling update there is a brief window
  # where old pods serve traffic against the newly migrated schema
  # (typical expand-contract requirement; not unique to this chart).
  #
  # This is the right setting for any ArgoCD-managed install; the only
  # reason it's not the default is to keep the chart drop-in compatible
  # with non-ArgoCD `helm install` flows that expect post-install hooks.
  # See helm/inventario/README.md → "ArgoCD-managed migrations".
  argocdMode: false

  # Hard wall-clock cap on the bootstrap/setup Job (templates/job-setup.yaml).
  #
  # WHY this exists: a setup Job pinned to an image tag that isn't in the
  # registry — e.g. a PR preview pinned to sha-<commit> while CI is still
  # building it, or after that tag was deleted — sits in ImagePullBackOff
  # forever. ImagePullBackOff never starts the container, so `backoffLimit`
  # is never consumed and the Job runs unbounded. In argocdMode (wave -5)
  # that wedges the sync operation ("waiting for healthy state of …-setup"),
  # and a perpetually-Running operation BLOCKS ArgoCD's resources-finalizer
  # cascade — making the whole Application undeletable (#1971 post-mortem).
  #
  # A deadline turns "hang forever" into "fail after N seconds": the sync op
  # fails instead of running, deletion is unblocked, and syncPolicy.retry on
  # the ApplicationSets re-attempts until the image lands so the env
  # self-heals. Set GENEROUSLY (> a cold CI build): while the pod sits in
  # ImagePullBackOff the kubelet keeps retrying the pull, so an image that is
  # merely still-building is picked up by the SAME Job attempt with zero
  # failures; the deadline only trips on a genuinely-missing image.
  # 0 disables the cap (restores the old unbounded behavior).
  activeDeadlineSeconds: 900

  bootstrap:
    # Whether to run the DB bootstrap step (creates migrator DB user).
    # Set to false if you manage DB users externally.
    enabled: true

    # Superuser DSN used for bootstrap (needs CREATEUSER privilege).
    # When unset, bootstrap falls back to INVENTARIO_DB_DSN.
    # Or provide via existingSecret key SETUP_SUPERUSER_DSN.
    # Env: SETUP_SUPERUSER_DSN (copied into INVENTARIO_DB_DSN for bootstrap only)
    superuserDsn: ""

    # Application DB username (already exists; bootstrap grants roles to it)
    # Env: INVENTARIO_BOOTSTRAP_USERNAME
    username: "inventario"

    # Migrator DB username to create/configure
    # Env: INVENTARIO_BOOTSTRAP_USERNAME_FOR_MIGRATIONS
    usernameForMigrations: "inventario_migrator"

  initData:
    # Wall-clock cap on the init-data Job (templates/job-init-data.yaml,
    # sync-wave +5). Same rationale as setupJob.activeDeadlineSeconds above
    # (a missing image must fail the Job instead of hanging the sync op and
    # blocking deletion), but larger because seeding — seedDatabase /
    # seedBlobUploads — legitimately takes longer (it starts a temporary
    # server in-pod and writes fixture blobs). 0 disables the cap.
    activeDeadlineSeconds: 1800

    # Default tenant display name
    # Env: INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_NAME
    defaultTenantName: "Default Organization"

    # Default tenant URL slug (must be lowercase, alphanumeric + hyphens)
    # Env: INVENTARIO_MIGRATE_DATA_DEFAULT_TENANT_SLUG
    defaultTenantSlug: "default"

    # Admin user email address
    # Env: INVENTARIO_MIGRATE_DATA_ADMIN_EMAIL
    adminEmail: "admin@example.com"

    # Admin user password — REQUIRED.
    # Set via --set setupJob.initData.adminPassword=<value>
    # Or provide via secrets.existingSecret key SETUP_ADMIN_PASSWORD.
    # Env: INVENTARIO_MIGRATE_DATA_ADMIN_PASSWORD
    adminPassword: ""

    # Admin user display name
    # Env: INVENTARIO_MIGRATE_DATA_ADMIN_NAME
    adminName: "Administrator"

    # Seed example commodities, locations, and system settings on first install.
    # WARNING: Temporarily starts the app server inside the job pod to call /api/v1/seed.
    # Env: SEED_DATABASE
    seedDatabase: false

    # Write the bundled fixture *bytes* (cover photos, invoices, manuals) into
    # the upload bucket during seeding, so items and the Files page look
    # lived-in instead of carrying empty/broken file rows. Only has effect
    # when seedDatabase=true.
    # Keep false in production: /api/v1/seed is unauthenticated, so enabling
    # blob writes for the default tenant widens the surface for bucket-spam.
    # Enable only for demo / evaluation installs (the in-cluster MinIO/file
    # bucket is the seed target). Maps to the server-side opt-in env var.
    # Env: INVENTARIO_SEED_ALLOW_BLOB_UPLOADS
    seedBlobUploads: false

    # Back-office (platform-operator) login password for /backoffice/login,
    # consumed by the setup / init-data Job's `inventario backoffice bootstrap
    # --password` step ONLY when backofficeUser.enabled=true (below). It is the
    # BACKOFFICE_USER_PASSWORD value the chart bakes into its Secret, the exact
    # mirror of adminPassword above. Empty by default; provide via
    # --set setupJob.initData.backofficeUserPassword=<value> or via
    # secrets.existingSecret key BACKOFFICE_USER_PASSWORD. Must satisfy the
    # password policy (8+ chars, upper, lower, digit). Production never enables
    # backofficeUser, so this stays empty there.
    backofficeUserPassword: ""

# ============================================================
# Back-office user auto-provisioning (#1967)
# ------------------------------------------------------------
# Auto-creates the platform-operator identity used by /backoffice/login, the
# same way setupJob.initData seeds the app admin. When enabled, the setup /
# init-data Job runs `inventario backoffice bootstrap` (idempotent on email).
#
# DISABLED by default and gated to demo/preview overlays ONLY. NEVER enable in
# production: there, operators are created manually via `inventario backoffice
# bootstrap` so the one-time password is never written to a Secret, and MFA is
# enrolled out-of-band via `inventario backoffice mfa setup`.
# ============================================================
backofficeUser:
  enabled: false
  # Operator login email + display name (non-secret; passed as --email/--name).
  email: "operator@example.com"
  name: "Platform Operator"
  # Role: platform_admin (full mutation rights) or support_agent.
  role: "platform_admin"
  # mfaEnforced=false provisions a PASSWORD-ONLY operator so the seeded account
  # can sign in on a demo env with no authenticator app. A Helm Job has no
  # interactive terminal to complete TOTP enrollment, and an MFA-enforced
  # operator with no secret row fails closed with HTTP 501 at /backoffice/login
  # (the #1967 demo lockout). Leave false for demo; production never enables
  # this block at all.
  mfaEnforced: false

# ============================================================
# Namespace ResourceQuota + LimitRange (#1866)
# ------------------------------------------------------------
# Off by default. Turn on when the chart is installed into a
# namespace that needs defensive guard-rails against a single
# runaway pod / PVC starving other workloads — the canonical
# case is PR-preview namespaces sharing one VM (the shared
# overlay infra/helm-overlays/preview-base.values.yaml turns
# this on and sizes the caps for the demo-bundle pod-set).
#
# When enabled, the chart renders:
#   - a ResourceQuota covering compute (requests + limits),
#     storage (requests + PVC count), and a pod-count ceiling;
#   - an optional LimitRange that supplies per-container
#     defaults + a per-container max so an ad-hoc pod
#     (kubectl debug, an operator-applied tool) can't bypass
#     the quota by omitting resources entirely.
#
# Chart-owned pods (apiserver / workers / demo / setup Jobs)
# all set explicit requests + limits; the LimitRange defaults
# only kick in for pods that don't, but having both pieces in
# the same template keeps the safety contract complete.
# ============================================================
quota:
  enabled: false

  # ResourceQuota.spec.hard — every key here passes straight
  # into spec.hard. Values use the standard k8s resource format
  # (CPU as cores or m, memory/storage with Ki/Mi/Gi/Ti).
  # Sized for a single combined-mode Deployment with external
  # Postgres/Redis/S3 (no demo sidecars). Override per overlay
  # for installs that enable demo.* or split mode.
  #
  # Operator note: keys here use dotted names (`requests.cpu`)
  # to match k8s ResourceQuota.spec.hard verbatim. Overriding
  # via `--set` requires escaping the dot, or Helm will create
  # a nested map and emit an unrecognized quota resource:
  #   --set 'quota.hard.requests\.cpu=2'      ✓ correct
  #   --set quota.hard.requests.cpu=2          ✗ silent footgun
  # Prefer `--values` (or a values file) for any non-trivial
  # override.
  hard:
    requests.cpu: "1500m"
    requests.memory: "2Gi"
    limits.cpu: "3"
    limits.memory: "3Gi"
    requests.storage: "10Gi"
    persistentvolumeclaims: "5"
    pods: "20"

  limitRange:
    # Set to false to skip the LimitRange while keeping the
    # ResourceQuota. Practical only when the operator has a
    # cluster-level LimitRange already in place.
    enabled: true

    # Per-container defaults applied to any container missing
    # requests/limits. Kept generous so chart-owned containers
    # are never reshaped — only ad-hoc pods get filled in.
    container:
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      default:
        cpu: "500m"
        memory: "512Mi"
      # Hard per-container ceiling. Keep at least as large as
      # the biggest run.workers.<group>.resources.limits in
      # the install (run.workers.media defaults to 1000m/1Gi).
      max:
        cpu: "2"
        memory: "2Gi"

# ============================================================
# Persistent Volume for /app/uploads (local file storage)
# Only relevant when app.uploadLocation starts with "file://"
# and demo.minio.enabled=false.
# ============================================================
persistence:
  enabled: true
  storageClass: ""        # Empty = cluster default StorageClass
  accessMode: ReadWriteOnce
  size: 10Gi

# ============================================================
# Security context applied to all containers
# ============================================================
podSecurityContext:
  fsGroup: 1001

containerSecurityContext:
  runAsUser: 1001
  runAsGroup: 1001
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# ============================================================
# DEMO — in-cluster dependencies for evaluation / CI
#
# ⚠️  WARNING: Demo components are NOT production-ready.
#    - Passwords are trivial defaults — change them even for demos.
#    - Persistence is disabled by default (data lost on pod restart).
#    - No clustering, no replication, no backup.
#
# When a demo component is enabled, the chart automatically wires
# the corresponding connection settings into the app's ConfigMap/Secret.
# You do NOT need to set the matching secrets.* fields manually.
# ============================================================
demo:
  postgresql:
    # Enable an in-cluster PostgreSQL instance
    enabled: false

    image: postgres:17-alpine

    # Database name
    database: inventario
    # Application DB user (read/write access)
    username: inventario
    password: inventario_password
    # Migrator DB user (schema change access; created by setup job bootstrap step)
    migratorUser: inventario_migrator
    migratorPassword: inventario_migrator_password

    persistence:
      # false = emptyDir (data lost on pod restart)
      # true  = PersistentVolumeClaim
      enabled: false
      storageClass: ""
      size: 5Gi

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi



  redis:
    # Enable an in-cluster Redis instance.
    # When enabled, ALL four Redis URLs (token-blacklist, auth-rate-limit,
    # global-rate-limit, csrf, email-queue) are pointed at this instance.
    enabled: false

    image: redis:8-alpine
    # Redis runs without persistence in demo mode (--save "" flag)

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  minio:
    # Enable an in-cluster MinIO instance as S3-compatible object storage.
    # When enabled:
    #   - app.uploadLocation is overridden to point at this MinIO instance
    #   - AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY are set from rootUser/rootPassword
    #   - A separate init Job creates the bucket for the app
    enabled: false

    image: minio/minio:RELEASE.2025-01-20T14-49-07Z

    # Image for the `mc` client run by the one-shot bucket-create Job.
    # Pinned to an immutable RELEASE tag (NOT :latest): in argocdMode that Job
    # sits on an early sync-wave on the critical path, so a floating-tag drift
    # or a transient registry hiccup must not be able to wedge the sync. Bump
    # deliberately alongside `image` above.
    mcImage: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z

    rootUser: minioadmin
    rootPassword: minioadmin123

    # Name of the bucket to create and use
    bucket: inventario
    # Object key prefix used by the app within the demo bucket
    prefix: uploads/

    persistence:
      enabled: false
      storageClass: ""
      size: 20Gi

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # One-shot Job that creates the bucket. In argocdMode it runs at an early
    # sync-wave (-6) on the critical path, so an unpullable mc image or a MinIO
    # that never becomes ready must FAIL the Job (and surface a fast sync error)
    # instead of hanging forever — a hung Job stalls the ArgoCD sync op and
    # blocks namespace deletion (the undeletable-preview class fixed in
    # #1974/#1971). Same rationale as setupJob.activeDeadlineSeconds; creating a
    # bucket is near-instant once MinIO is up, so 300s is generous. 0 disables.
    bucketJob:
      activeDeadlineSeconds: 300

  mailpit:
    # Enable an in-cluster Mailpit mail-trap (SMTP catch-all + web UI) for
    # demo / preview environments. When enabled:
    #   - the app's email provider is FORCED to smtp pointed at this sidecar
    #     (:1025, no auth, no TLS) in templates/configmap.yaml, so
    #     verification / invite / reset emails are captured instead of being
    #     black-holed by the stub provider;
    #   - app.publicUrl falls back to https://<first ingress host> (see the
    #     inventario.publicUrl helper) so the links inside those emails resolve;
    #   - set email.from to a non-empty bare address (the async email service
    #     rejects an empty FROM for non-stub providers).
    # Messages live in an in-memory ring buffer (emptyDir) — never persisted,
    # never backed up, even in the longevity environment.
    enabled: false

    image: axllent/mailpit:v1.21

    # Max retained messages (ring buffer); mirrors docker-compose's
    # MP_MAX_MESSAGES. Env: MP_MAX_MESSAGES on the Mailpit container.
    maxMessages: 500

    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

    ingress:
      # Publish the Mailpit web UI (:8025) as its OWN Tailscale node, sibling to
      # the app's ingress. Host + tailscale.com/hostname are derived as
      # "mail-"<app ingress host> by the inventario.mailpitIngressHost /
      # mailpitTsHostname helpers, so no per-environment values are required.
      enabled: false
      className: tailscale
      # Explicit overrides (leave empty to derive from the app ingress host):
      #   host:       full FQDN, e.g. mail-inv-vcl01-master.<tailnet>.ts.net
      #   tsHostname: tailscale.com/hostname (first DNS label, no suffix)
      # If you set `host` here but leave the app's ingress.hosts empty, also set
      # app.publicUrl explicitly — it derives from the app host, not this one.
      host: ""
      tsHostname: ""
      # Extra annotations merged onto the derived tailscale.com/hostname.
      annotations:
        tailscale.com/http-redirect: "true"
